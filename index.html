<style>

*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg2);color:var(--t1);line-height:1.5;overflow:hidden;height:100vh}

.bt-s{padding:4px 10px;font-size:12px}.bt-g{background:var(--gn-bg);border-color:var(--gn);color:var(--gn)}.bt-i{padding:6px 10px;font-size:16px}

.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

.modal-b{padding:16px 18px}
.modal-f{padding:12px 18px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}

.user-badge:hover{background:var(--bd)}

.tab-row{display:flex;gap:2px;border-bottom:1px solid var(--bd);margin-bottom:10px}
.tab-row button{padding:6px 12px;font-size:12px;border:none;background:none;color:var(--t3);cursor:pointer;font-weight:600;border-bottom:2px solid transparent;font-family:inherit}
.tab-row button.on{color:var(--ac);border-bottom-color:var(--ac)}
.lock-badge{display:inline-flex;align-items:center;font-size:10px;color:var(--t4)}
.disabled-ctrl{opacity:.45;cursor:not-allowed!important;pointer-events:none}
</style>

/* ═══ MILESTONE TIMELINE ═══ */
function MilestoneTimeline({milestones,versions}){
  const[scale,setScale]=useState(30);
  const[filters,setFilters]=useState({milestone:true,build:true,qa:true,update:true,season:true});
  const ref=useRef(null);const wrapRef=useRef(null);const dragState=useRef(null);
  useEffect(()=>{const el=wrapRef.current;if(!el)return;const h=e=>{if(!e.ctrlKey)return;e.preventDefault();setScale(s=>Math.max(30,Math.min(50,s+(e.deltaY<0?0.2:-0.2))))};el.addEventListener("wheel",h,{passive:false});return()=>el.removeEventListener("wheel",h)},[]);

    const onDown=e=>{if(e.button!==0)return;e.preventDefault();dragState.current={x:e.clientX,sl:el.scrollLeft};el.style.cursor="grabbing"};

    const onUp=()=>{if(dragState.current){dragState.current=null;el.style.cursor=""}};
    el.addEventListener("mousedown",onDown);window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return()=>{el.removeEventListener("mousedown",onDown);window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp)};
  },[]);
  const startDate=new Date(2026,3,1);const endDate=new Date(2027,5,1);
  const totalDays=Math.ceil((endDate-startDate)/(24*60*60*1000));
  const baseWidth=totalDays*1.2;const width=baseWidth*scale;
  const dateToX=d=>{const diff=(new Date(d)-startDate)/(24*60*60*1000);return(diff/totalDays)*width};
  const todayX=dateToX(new Date());
  const filtered=(milestones||[]).filter(m=>filters[m.type]!==false);
  const toggleF=k=>setFilters(p=>({...p,[k]:!p[k]}));
  const typeLabel={milestone:"론칭",build:"빌드",qa:"QA",update:"업데이트",season:"시즌"};
  const DOW=["일","월","화","수","목","금","토"];
  const months=useMemo(()=>{const m=[];let d=new Date(startDate);while(d<endDate){m.push({date:new Date(d),label:(d.getMonth()+1)+"월",year:d.getFullYear()});d=new Date(d.getFullYear(),d.getMonth()+1,1)}return m},[]);
  const days=useMemo(()=>{if(scale<2)return[];const d=[];let cur=new Date(startDate);while(cur<endDate){d.push(new Date(cur));cur=new Date(cur.getTime()+24*60*60*1000)}return d},[scale]);
  const showDow=scale>=5;
  const tlHeight=scale>=2?80:64;

  return<div ref={wrapRef} style={{background:"var(--bg)",border:"1px solid var(--bd)",borderRadius:"var(--r)",marginBottom:10,overflow:"hidden",flexShrink:0}}>

      <span style={{fontSize:12,fontWeight:700,color:"var(--t2)"}}>타임라인</span>
      <div style={{display:"flex",gap:3}}>
        {Object.entries(typeLabel).map(([k,v])=><button key={k} className={"bt bt-s"+(filters[k]?" on":"")} onClick={()=>toggleF(k)} style={{fontSize:10,padding:"2px 8px"}}>{v}</button>)}
      </div>
      <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:10,color:"var(--t4)"}}>스케일 (Ctrl+스크롤)</span>
        <input type="range" min="30" max="50" step="0.1" value={scale} onChange={e=>setScale(+e.target.value)} style={{width:80,accentColor:"var(--ac)"}}/>
        <span style={{fontSize:10,color:"var(--t4)",minWidth:28}}>{scale.toFixed(1)}x</span>
      </div>
    </div>
    <div ref={ref} style={{overflowX:"auto",overflowY:"hidden",padding:"0 0 6px"}}>
      <div style={{position:"relative",width,height:tlHeight,minWidth:"100%"}}>
        {/* Month labels - row 1 */}
        {months.map((m,i)=>{const x=dateToX(m.date);const nextM=i<months.length-1?dateToX(months[i+1].date):width;
          return<div key={"m"+i} style={{position:"absolute",left:x,width:nextM-x,height:18,borderRight:"1px solid var(--bd)",borderBottom:"1px solid var(--bg3)",display:"flex",alignItems:"center",paddingLeft:6}}>
            <span style={{fontSize:10,color:"var(--t2)",fontWeight:700}}>{m.year}년 {m.label}</span>
          </div>})}
        {/* Day labels - row 2 (visible at scale >= 2) */}
        {days.map((d,i)=>{const x=dateToX(d);const isWeekend=d.getDay()===0||d.getDay()===6;const isFirst=d.getDate()===1;
          return<div key={"d"+i} style={{position:"absolute",left:x,top:18,width:Math.max(8,(width/totalDays)-1),height:showDow?22:16,borderRight:isFirst?"1px solid var(--bd)":"1px solid var(--bg3)",background:isWeekend?"var(--rd-bg)":"transparent",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
            <span style={{fontSize:8,color:isWeekend?"var(--rd)":"var(--t4)",fontWeight:isFirst?700:400}}>{d.getDate()}</span>
            {showDow&&<span style={{fontSize:7,color:isWeekend?"var(--rd)":"var(--t4)"}}>{DOW[d.getDay()]}</span>}
          </div>})}
        {/* Today marker */}
        {todayX>0&&todayX<width&&<div style={{position:"absolute",left:todayX,top:0,bottom:0,width:2,background:"var(--rd)",zIndex:3}}>
          <div style={{position:"absolute",top:0,left:4,fontSize:9,fontWeight:700,color:"var(--rd)",background:"var(--bg)",padding:"0 3px",borderRadius:2,whiteSpace:"nowrap"}}>TODAY</div>
        </div>}
        {/* Version lines */}
        {(versions||[]).filter(v=>v.target_date).map((v,i)=>{
          const x=dateToX(v.target_date);if(x<0||x>width)return null;
          return<div key={v.id} style={{position:"absolute",left:x,top:scale>=2?40:20,bottom:0,width:2,background:"var(--pu)",opacity:.3,zIndex:1}}>
            <div style={{position:"absolute",top:2,left:4,fontSize:9,fontWeight:600,color:"var(--pu)",whiteSpace:"nowrap",background:"var(--bg)",padding:"0 3px",borderRadius:2}}>{v.label}</div>
          </div>})}
        {/* Milestone dots */}
        {filtered.map(ms=>{const x=dateToX(ms.date);if(x<0||x>width)return null;const tc=MC[ms.type]||"var(--t4)";
          return<div key={ms.id} style={{position:"absolute",left:x-5,top:tlHeight-28,textAlign:"center",zIndex:2}}>
            <div style={{width:10,height:10,borderRadius:"50%",background:tc,margin:"0 auto 2px",border:"2px solid var(--bg)"}}/>
            <div style={{fontSize:8,color:tc,fontWeight:600,whiteSpace:"nowrap",transform:"translateX(-40%)"}}>{ms.label}</div>
          </div>})}
      </div>
    </div>
  </div>
}

const HOL_COLORS={KR:"#dc2626",US:"#2563eb",JP:"#db2777",TW:"#059669",HK:"#d97706",IN:"#7c3aed",TH:"#0284c7"};
const HOL_LABELS={KR:"한국",US:"서양",JP:"일본",TW:"대만",HK:"홍콩",IN:"인도",TH:"태국"};

function GanttView({tasks,workers,milestones,parts,contents}){
  const[teamFilter,setTF]=useState("all");
  const[partFilter,setPF]=useState("all");
  const[collapsed,setCol]=useState({});
  const[expandedW,setExpW]=useState({}); // worker id -> show individual task rows
  const[expandedT,setExpT]=useState({}); // task id -> show sub-tasks
  const[tooltip,setTip]=useState(null);
  const[ganttScale,setGS]=useState(30);
  const[holFilter,setHolF]=useState({KR:true,US:false,JP:true,TW:false,HK:false,IN:false,TH:false});
  const[showHol,setShowHol]=useState(true);
  const[showDone,setShowDone]=useState(false);
  const[workerPopup,setWP]=useState(null); // {worker, tasks, x, y}
  const chartRef=useRef(null);const ganttWrapRef=useRef(null);const namesRef=useRef(null);const ganttDrag=useRef(null);
  // Right-click drag scroll for gantt chart
  useEffect(()=>{const el=chartRef.current;if(!el)return;
    const onDown=e=>{if(e.button!==0)return;e.preventDefault();ganttDrag.current={x:e.clientX,y:e.clientY,sl:el.scrollLeft,st:el.scrollTop};el.style.cursor="grabbing"};
    const onMove=e=>{if(!ganttDrag.current)return;el.scrollLeft=ganttDrag.current.sl-(e.clientX-ganttDrag.current.x);el.scrollTop=ganttDrag.current.st-(e.clientY-ganttDrag.current.y)};
    const onUp=()=>{if(ganttDrag.current){ganttDrag.current=null;el.style.cursor=""}};
    el.addEventListener("mousedown",onDown);window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return()=>{el.removeEventListener("mousedown",onDown);window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp)};
  },[]);
  // Sync vertical scroll between names and chart
  useEffect(()=>{
    const n=namesRef.current,c=chartRef.current;if(!n||!c)return;let syncing=false;
    const syncN=()=>{if(syncing)return;syncing=true;c.scrollTop=n.scrollTop;syncing=false};
    const syncC=()=>{if(syncing)return;syncing=true;n.scrollTop=c.scrollTop;syncing=false};
    n.addEventListener("scroll",syncN);c.addEventListener("scroll",syncC);
    return()=>{n.removeEventListener("scroll",syncN);c.removeEventListener("scroll",syncC)};
  },[]);
  useEffect(()=>{const el=ganttWrapRef.current;if(!el)return;const h=e=>{if(!e.ctrlKey)return;e.preventDefault();setGS(s=>Math.max(30,Math.min(50,s+(e.deltaY<0?0.2:-0.2))))};el.addEventListener("wheel",h,{passive:false});return()=>el.removeEventListener("wheel",h)},[]);
  useEffect(()=>{if(!workerPopup)return;const h=e=>{if(!e.target.closest('[style*="z-index: 200"]')&&!e.target.closest('.gantt-name'))setWP(null)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[workerPopup]);

  // Timeline config - day-based like MilestoneTimeline
  const startDate=new Date(2026,3,1); // Apr 1
  const endDate=new Date(2027,1,1); // Feb 1
  const totalDays=Math.ceil((endDate-startDate)/(24*60*60*1000));
  const dayWidth=ganttScale*1.2; // matches MilestoneTimeline baseWidth formula
  const totalWidth=totalDays*dayWidth;
  const rowH=32;
  const DOW=["일","월","화","수","목","금","토"];

  // Generate days
  const days=useMemo(()=>{const d=[];let cur=new Date(startDate);while(cur<endDate){d.push(new Date(cur));cur=new Date(cur.getTime()+24*60*60*1000)}return d},[]);

  // Generate months from days
  const months=useMemo(()=>{
    const m=[];let cur=null;
    days.forEach((d,i)=>{
      const mo=d.getMonth();const yr=d.getFullYear();const key=yr+"-"+mo;
      if(key!==cur){m.push({month:mo,year:yr,startIdx:i,days:1,label:(mo+1)+"월"});cur=key}
      else{m[m.length-1].days++}
    });
    return m;
  },[days]);

  // Holiday lookup for gantt
  const holDates=useMemo(()=>{
    const s=new Set();
    Object.entries(HOLIDAYS).filter(([k])=>holFilter[k]).forEach(([country,hols])=>{
      hols.forEach(h=>s.add(h.d));
    });
    return s;
  },[holFilter]);

  // Forced part lead names (planning team)
  const FORCED_LEADS={"combat":"정하진","level":"정성민","field":"박찬현","quest":"권재만"};

  // Group workers by part, filtered, part leads first
  const groupedWorkers=useMemo(()=>{
    const filtered=(workers||[]).filter(w=>{
      if(teamFilter!=="all"&&TEAM_MAP[w.part_id]!==teamFilter)return false;
      if(partFilter!=="all"&&w.part_id!==partFilter)return false;
      return true;
    });
    const g={};
    filtered.forEach(w=>{
      const pid=w.part_id||"other";
      if(!g[pid])g[pid]=[];
      g[pid].push(w);
    });
    // Sort: part leads first, then forced leads, then alphabetical
    Object.keys(g).forEach(pid=>{
      g[pid].sort((a,b)=>{
        const aLead=a.is_part_lead||a.name===FORCED_LEADS[pid]?1:0;
        const bLead=b.is_part_lead||b.name===FORCED_LEADS[pid]?1:0;
        if(bLead!==aLead)return bLead-aLead;
        return(a.name||"").localeCompare(b.name||"");
      });
    });
    return g;
  },[workers,teamFilter,partFilter]);

  // Map tasks to workers (including multi-assignees), optionally filtering done
  const workerTasks=useMemo(()=>{
    const m={};const added=new Set();
    const filtered=(tasks||[]).filter(t=>showDone||t.status!=="done");
    filtered.forEach(t=>{
      if(t.assignee_id){if(!m[t.assignee_id])m[t.assignee_id]=[];m[t.assignee_id].push(t);added.add(t.assignee_id+'::'+t.id)}
      if(t.task_assignees){for(const ta of t.task_assignees){const k=ta.worker_id+'::'+t.id;if(!added.has(k)){if(!m[ta.worker_id])m[ta.worker_id]=[];m[ta.worker_id].push({...t,_is_secondary:ta.worker_id!==t.assignee_id});added.add(k)}}}
    });
    return m;
  },[tasks,showDone]);

  // Position calc - day based
  const dateToX=(date)=>{
    if(!date)return null;
    const d=new Date(date);
    const diff=(d-startDate)/(24*60*60*1000);
    return diff*dayWidth;
  };

  const todayX=dateToX(new Date());

  const toggleExpW=id=>setExpW(p=>({...p,[id]:!p[id]}));

  // Build rows (with expanded worker sub-rows)
  const rows=useMemo(()=>{
    const r=[];
    Object.entries(groupedWorkers).forEach(([pid,wkrs])=>{
      r.push({type:"header",pid,label:PART_LABELS[pid]||pid,count:wkrs.length});
      if(!collapsed[pid]){
        wkrs.forEach(w=>{
          const all=(workerTasks[w.id]||[]);
          const top=all.filter(t=>!t.parent_task_id);
          const childrenByParent={};all.forEach(t=>{if(t.parent_task_id){if(!childrenByParent[t.parent_task_id])childrenByParent[t.parent_task_id]=[];childrenByParent[t.parent_task_id].push(t)}});
          r.push({type:"worker",worker:w,tasks:top,expanded:!!expandedW[w.id]});
          if(expandedW[w.id]){
            top.forEach(t=>{
              const kids=childrenByParent[t.id]||[];
              r.push({type:"task",task:{...t,_child_count:kids.length},worker:w});
              if(expandedT[t.id])kids.forEach(c=>r.push({type:"task",task:c,worker:w,_is_child:true}));
            });
          }
        });
      }
    });
    return r;
  },[groupedWorkers,collapsed,workerTasks,expandedW,expandedT]);

  const toggleCollapse=(pid)=>setCol(p=>({...p,[pid]:!p[pid]}));

  const teams=[...new Set(Object.values(TEAM_MAP))];
  const availParts=Object.keys(groupedWorkers);

  return<div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
    {/* Filters row 1 */}
    <div style={{padding:"8px 16px",borderBottom:"1px solid var(--bg3)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
      <span style={{fontSize:14,fontWeight:700}}>간트 차트</span>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <span style={{fontSize:12,color:"var(--t3)"}}>팀:</span>
        <select value={teamFilter} onChange={e=>setTF(e.target.value)} style={{fontSize:12,padding:"4px 8px",border:"1px solid var(--bd)",borderRadius:5,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">전체</option>
          {teams.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <span style={{fontSize:12,color:"var(--t3)"}}>파트:</span>
        <select value={partFilter} onChange={e=>setPF(e.target.value)} style={{fontSize:12,padding:"4px 8px",border:"1px solid var(--bd)",borderRadius:5,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">전체</option>
          {Object.keys(PART_LABELS).map(p=><option key={p} value={p}>{PART_LABELS[p]}</option>)}
        </select>
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
        <span style={{fontSize:11,color:"var(--t4)"}}>줌</span>
        <input type="range" min="30" max="50" step="0.1" value={ganttScale} onChange={e=>setGS(+e.target.value)} style={{width:80,accentColor:"var(--ac)"}}/>
        <span style={{fontSize:10,color:"var(--t4)",minWidth:28}}>{ganttScale.toFixed(1)}x</span>
        <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"var(--t3)",cursor:"pointer",marginLeft:8}}>
          <input type="checkbox" checked={showDone} onChange={e=>setShowDone(e.target.checked)} style={{accentColor:"var(--gn)"}}/>
          완료 일감 표시
        </label>
        <div style={{display:"flex",gap:6,marginLeft:8,fontSize:11}}>
          <span><span className="dot" style={{background:BAR_C.progress,marginRight:3,verticalAlign:"middle"}}/>진행</span>
          <span><span className="dot" style={{background:BAR_C.waiting,marginRight:3,verticalAlign:"middle"}}/>대기</span>
          <span><span className="dot" style={{background:BAR_C.done,marginRight:3,verticalAlign:"middle"}}/>완료</span>
        </div>
      </div>
    </div>
    {/* Filters row 2 - holidays */}
    <div style={{padding:"4px 16px 6px",borderBottom:"1px solid var(--bd)",display:"flex",gap:6,alignItems:"center",flexShrink:0}}>
      <button className={"bt bt-s"+(showHol?" on":"")} onClick={()=>setShowHol(!showHol)} style={{fontSize:10,padding:"2px 8px"}}>공휴일</button>
      {showHol&&Object.entries(HOL_LABELS).map(([k,v])=><button key={k} className={"bt bt-s"} onClick={()=>setHolF(p=>({...p,[k]:!p[k]}))}
        style={{fontSize:10,padding:"2px 8px",background:holFilter[k]?HOL_COLORS[k]+"18":"var(--bg)",color:holFilter[k]?HOL_COLORS[k]:"var(--t4)",borderColor:holFilter[k]?HOL_COLORS[k]+"40":"var(--bd)"}}>{v}</button>)}
    </div>

    {/* Gantt body */}
    <div className="gantt-wrap" ref={ganttWrapRef}>
      {/* Left: names */}
      <div className="gantt-names" ref={namesRef}>
        <div style={{height:48,borderBottom:"1px solid var(--bd)",display:"flex",alignItems:"center",padding:"0 12px",fontSize:12,fontWeight:600,color:"var(--t3)",position:"sticky",top:0,background:"var(--bg)",zIndex:4}}>작업자</div>
        {rows.map((r,i)=>r.type==="header"?
          <div key={"h"+r.pid} className="gantt-name part-header" onClick={()=>toggleCollapse(r.pid)}>
            <span style={{marginRight:6}}>{collapsed[r.pid]?"▶":"▼"}</span>{r.label} ({r.count})
          </div>:r.type==="task"?
          <div key={"t"+r.task.id} className="gantt-name" style={{paddingLeft:28,fontSize:11,color:"var(--t3)"}}>
            <D s={r.task.status}/><span style={{marginLeft:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.task.title||r.task.task_name}</span>
          </div>:
          <div key={"w"+r.worker.id} className="gantt-name" style={{cursor:"pointer",display:"flex",alignItems:"center",gap:2}} onClick={e=>{
            if(e.target.closest('.exp-btn')){toggleExpW(r.worker.id);return}
            const rect=e.currentTarget.getBoundingClientRect();
            setWP({worker:r.worker,tasks:r.tasks,x:rect.right+8,y:rect.top})}}>
            <span className="exp-btn" onClick={e=>{e.stopPropagation();toggleExpW(r.worker.id)}} style={{fontSize:9,color:"var(--t4)",cursor:"pointer",padding:"0 2px",flexShrink:0}}>{r.expanded?"▼":"▶"}</span>
            {(r.worker.is_part_lead||FORCED_LEADS[r.worker.part_id]===r.worker.name)&&<span style={{color:"var(--or)",flexShrink:0}}>★</span>}
            <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.worker.name}</span>
            <span style={{fontSize:10,color:"var(--t4)",marginLeft:"auto",flexShrink:0}}>({r.tasks.length})</span>
          </div>
        )}
      </div>

      {/* Right: chart */}
      <div className="gantt-chart" ref={chartRef}>
        {/* Header with months/weeks */}
        {/* Header: month row + day/dow row */}
        <div style={{position:"sticky",top:0,zIndex:5,background:"var(--bg)",width:totalWidth}}>
          {/* Month row */}
          <div style={{display:"flex",borderBottom:"1px solid var(--bd)",height:22}}>
            {months.map((m,i)=><div key={i} style={{width:m.days*dayWidth,borderRight:"1px solid var(--bd)",display:"flex",alignItems:"center",paddingLeft:6,flexShrink:0}}>
              <span style={{fontSize:11,fontWeight:700,color:"var(--t1)"}}>{m.year}년 {m.label}</span>
            </div>)}
          </div>
          {/* Day + DOW row */}
          <div style={{display:"flex",borderBottom:"1px solid var(--bd)",height:26}}>
            {days.map((d,i)=>{const isWE=d.getDay()===0||d.getDay()===6;const ds=d.toISOString().slice(0,10);const isHol=holDates.has(ds);const isFirst=d.getDate()===1;
              return<div key={i} style={{width:dayWidth,flexShrink:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRight:isFirst?"1px solid var(--bd)":"1px solid var(--bg3)",background:isHol?"#fef2f2":isWE?"#fef2f2":"transparent"}}>
                <span style={{fontSize:9,color:isHol||isWE?"var(--rd)":"var(--t3)",fontWeight:isFirst?700:400}}>{d.getDate()}</span>
                <span style={{fontSize:7,color:isHol||isWE?"var(--rd)":"var(--t4)"}}>{DOW[d.getDay()]}</span>
              </div>})}
          </div>
        </div>

        {/* Rows */}
        <div style={{position:"relative",width:totalWidth}}>
          {/* Day grid lines */}
          {days.map((d,i)=>{const isWE=d.getDay()===0||d.getDay()===6;const isFirst=d.getDate()===1;
            return<div key={i} style={{position:"absolute",left:i*dayWidth,top:0,width:isFirst?1:0.5,height:rows.length*rowH,background:isFirst?"var(--bd)":isWE?"var(--rd-bg)":"var(--bg3)",opacity:isFirst?1:0.5}}/>})}

          {/* Holiday lines */}
          {showHol&&Object.entries(HOLIDAYS).filter(([k])=>holFilter[k]).map(([country,days])=>
            days.map(h=>{const x=dateToX(h.d);if(x===null||x<0||x>totalWidth)return null;
              return<div key={country+h.d} style={{position:"absolute",left:x,top:0,height:rows.length*rowH,width:1,background:HOL_COLORS[country],opacity:.2,zIndex:0}} title={h.n+" ("+HOL_LABELS[country]+")"}/>
            }))}

          {/* Milestone lines */}
          {(milestones||[]).map(ms=>{
            const x=dateToX(ms.date);if(x===null||x<0||x>totalWidth)return null;
            const tc=MC[ms.type]||"var(--t4)";
            return<div key={ms.id} style={{position:"absolute",left:x,top:0,height:rows.length*rowH,width:2,background:tc,opacity:.4,zIndex:1}}>
              <div style={{position:"absolute",top:-2,left:4,fontSize:9,fontWeight:600,color:tc,whiteSpace:"nowrap",background:"rgba(255,255,255,.8)",padding:"0 3px",borderRadius:2}}>{ms.label}</div>
            </div>

            <div style={{position:"absolute",top:-2,left:4,fontSize:9,fontWeight:700,color:"var(--rd)",background:"rgba(255,255,255,.9)",padding:"0 4px",borderRadius:2}}>TODAY</div>
          </div>}

          {/* Task bars */}
          {rows.map((r,ri)=>{
            if(r.type==="header")return<div key={"hr"+ri} style={{height:rowH,background:"var(--bg3)",borderBottom:"1px solid var(--bd)"}}/>;
            if(r.type==="task"){
              const t=r.task;let x1=dateToX(t.start_date);let x2=dateToX(t.end_date);
              const isOngoing=t.start_date==null&&t.end_date==null;
              if(isOngoing){x1=todayX;x2=todayX+dayWidth*30}
              else if(x1===null&&x2!==null)x1=x2-dayWidth*7;
              if(x1===null)return<div key={"tr"+ri} className="gantt-row"/>;
              if(x2===null&&t.estimated_days)x2=x1+t.estimated_days*dayWidth;if(x2===null)x2=x1+dayWidth*7;
              const w=Math.max(20,x2-x1);const bc=BAR_C[t.status]||BAR_C.waiting;
              const isC=!!r._is_child;const kidCount=t._child_count||0;
              return<div key={"tr"+ri} className="gantt-row" style={{position:"relative",background:isC?"var(--bg3)":"var(--bg2)"}}>
                {!isC&&kidCount>0&&<button onClick={()=>setExpT(p=>({...p,[t.id]:!p[t.id]}))} style={{position:"absolute",left:4,top:4,background:"var(--ac)",color:"#fff",border:"none",borderRadius:3,fontSize:9,cursor:"pointer",padding:"1px 5px",zIndex:2}}>{expandedT[t.id]?"▼":"▶"}+{kidCount}</button>}
                <div className="gantt-bar" style={{left:x1+(isC?16:0),top:6,width:w,background:bc,opacity:isC?.55:.85,border:isC?`1px dashed ${bc}`:undefined,height:isC?12:undefined}}
                  onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,task:t})} onMouseLeave={()=>setTip(null)}>
                  {w>60?(isC?"└ ":"")+(t.title||t.task_name||""):""}</div>
              </div>
            }
            return<div key={"wr"+ri} className="gantt-row" style={{position:"relative"}}>
              {r.tasks.map((t,ti)=>{
                let x1=dateToX(t.start_date);
                let x2=dateToX(t.end_date);
                const isOngoing=t.start_date==null&&t.end_date==null;
                if(isOngoing){x1=todayX;x2=todayX+dayWidth*30}
                else if(x1===null&&x2!==null)x1=x2-dayWidth*7;
                if(x1===null)return null;
                if(x2===null&&t.estimated_days)x2=x1+t.estimated_days*dayWidth;
                if(x2===null)x2=x1+dayWidth*7;
                const w=Math.max(20,x2-x1);
                const bc=BAR_C[t.status]||BAR_C.waiting;
                return<div key={t.id+(t._is_secondary?'-s':'')} className="gantt-bar"
                  style={{left:x1,top:6,width:w,background:t._is_secondary?`repeating-linear-gradient(135deg,${bc},${bc} 4px,transparent 4px,transparent 8px)`:bc,border:t._is_secondary?`1px dashed ${bc}`:undefined,opacity:t._is_secondary?.65:undefined}}
                  onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,task:t})}
                  onMouseLeave={()=>setTip(null)}>
                  {w>60?(t.title||t.task_name||""):""}</div>
              })}
            </div>
          })}
        </div>
      </div>
    </div>

    {/* Worker popup */}
    {workerPopup&&<div style={{position:"fixed",left:Math.min(workerPopup.x,window.innerWidth-340),top:Math.min(workerPopup.y,window.innerHeight-300),width:320,maxHeight:280,background:"var(--bg)",border:"1px solid var(--bd)",borderRadius:"var(--r)",boxShadow:"var(--sh2)",zIndex:200,overflow:"hidden",display:"flex",flexDirection:"column"}}>
      <div style={{padding:"10px 12px",borderBottom:"1px solid var(--bg3)",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
        <div><span style={{fontSize:14,fontWeight:700}}>{workerPopup.worker.name}</span>
          {workerPopup.worker.is_part_lead&&<span style={{color:"var(--or)",fontSize:11,marginLeft:4}}>파트장</span>}
          <div style={{fontSize:11,color:"var(--t4)"}}>{PART_LABELS[workerPopup.worker.part_id]||workerPopup.worker.part_id} - {workerPopup.tasks.length}건</div>
        </div>
        <button onClick={()=>setWP(null)} style={{background:"none",border:"none",fontSize:16,color:"var(--t4)",cursor:"pointer"}}>✕</button>
      </div>
      <div style={{overflow:"auto",padding:"6px 12px 10px",flex:1}}>
        {workerPopup.tasks.length===0?<div style={{fontSize:12,color:"var(--t4)",padding:8}}>배정된 태스크 없음</div>:
          workerPopup.tasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 0",borderBottom:"1px solid var(--bg3)"}}>
            <D s={t.status}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,color:"var(--t1)",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.title||t.task_name}</div>
              <div style={{fontSize:10,color:"var(--t4)"}}>{t.contents?.name||""} - {t.start_date||"?"} ~ {t.end_date||"?"} - {t.estimated_days||"?"}일</div>
            </div>
            <span style={{fontSize:10,color:SC[t.status]||"var(--t4)",fontWeight:600,flexShrink:0}}>{SL[t.status]||t.status}</span>
          </div>)}
      </div>
    </div>}

    {/* Tooltip */}
    {tooltip&&<div className="tooltip" style={{left:tooltip.x+12,top:tooltip.y-10}}>
      <div style={{fontWeight:700,marginBottom:2}}>{tooltip.task.title||tooltip.task.task_name}</div>
      <div style={{fontSize:11,opacity:.8}}>
        {tooltip.task.contents?.name&&<div>콘텐츠: {tooltip.task.contents.name}</div>}
        <div>상태: {SL[tooltip.task.status]||tooltip.task.status}</div>
        {tooltip.task.start_date&&<div>시작: {tooltip.task.start_date}</div>}
        {tooltip.task.end_date&&<div>종료: {tooltip.task.end_date}</div>}
        {tooltip.task.estimated_days&&<div>소요: {tooltip.task.estimated_days}일</div>}
        {tooltip.task.task_assignees&&tooltip.task.task_assignees.length>1&&<div>담당: {tooltip.task.task_assignees.map(ta=>ta.workers?.name).filter(Boolean).join(', ')}</div>}
      </div>
    </div>}
  </div>
}

/* ═══ TASK SHEET ═══ */
function TaskSheet({tasks,workers,contents,versions}){
  const[teamTab,setTT]=useState("all");
  const[partFilter,setPF]=useState("all");
  const[statusFilter,setSF]=useState("all");
  const[assigneeFilter,setAF]=useState("all");
  const[collapsed,setCol]=useState(null); // null = not initialized yet
  const[partOrder,setPartOrder]=useState(null); // custom part ordering
  const[taskExpanded,setTE]=useState({}); // task-level expand (sub-tasks)

  // Group tasks by team->part->worker
  const grouped=useMemo(()=>{
    const wMap={};(workers||[]).forEach(w=>wMap[w.id]=w);
    const cMap={};(contents||[]).forEach(c=>cMap[c.id]=c);
    const rows=(tasks||[]).map(t=>{
      const w=wMap[t.assignee_id]||{};const c=cMap[t.content_id]||t.contents||{};
      const team=TEAM_MAP[w.part_id]||"기타";const part=PART_LABELS[w.part_id]||w.part_id||"미배정";
      const ver=(versions||[]).find(v=>v.id===c.version_id);
      const qaDeadline=ver?.target_date?new Date(new Date(ver.target_date).getTime()-30*24*60*60*1000):null;
      const endD=t.end_date?new Date(t.end_date):null;
      const risk=(!endD||!qaDeadline)?"":t.status==="done"?"안정":endD>qaDeadline?"위험":"안정";
      const allAssignees=(t.task_assignees||[]).map(ta=>ta.workers).filter(Boolean);
      const assigneeDisplay=allAssignees.length>1?(allAssignees[0].name+' +'+(allAssignees.length-1)):(w.name||t.workers?.name||"미배정");
      const assigneeTooltip=allAssignees.length>1?allAssignees.map(a=>a.name).join(', '):null;
      return{...t,workerName:w.name||t.workers?.name||"미배정",assigneeDisplay,assigneeTooltip,allAssigneeNames:allAssignees.map(a=>a.name),team,part,contentName:c.name||t.contents?.name||"",contentType:c.type||"",partId:w.part_id||"",risk,qaDeadline};
    });
    // Build parent/children map
    const byId=new Map();rows.forEach(r=>byId.set(r.id,r));
    const childrenMap=new Map();
    rows.forEach(r=>{if(r.parent_task_id){if(!childrenMap.has(r.parent_task_id))childrenMap.set(r.parent_task_id,[]);childrenMap.get(r.parent_task_id).push(r)}});
    rows.forEach(r=>r._children=childrenMap.get(r.id)||[]);
    // Filter helper
    const matchRow=(r)=>{
      if(teamTab!=="all"&&r.team!==teamTab)return false;
      if(partFilter!=="all"&&r.partId!==partFilter)return false;
      if(statusFilter!=="all"&&r.status!==statusFilter)return false;
      if(assigneeFilter!=="all"&&r.workerName!==assigneeFilter&&!(r.allAssigneeNames||[]).includes(assigneeFilter))return false;
      return true;
    };
    // Include top-level rows if itself matches OR any child matches (force parent visible)
    const filtered=rows.filter(r=>!r.parent_task_id).filter(r=>matchRow(r)||(r._children||[]).some(matchRow));
    const g={};filtered.forEach(r=>{const k=r.part;if(!g[k])g[k]=[];g[k].push(r)});
    return g;
  },[tasks,workers,contents,teamTab,partFilter,statusFilter,assigneeFilter]);

  // Initialize collapsed (all collapsed by default) and part order
  const partKeys=useMemo(()=>Object.keys(grouped),[grouped]);
  useEffect(()=>{if(collapsed===null&&partKeys.length>0){const c={};partKeys.forEach(k=>c[k]=true);setCol(c)}},[partKeys]);
  useEffect(()=>{if(partOrder===null&&partKeys.length>0)setPartOrder(partKeys)},[partKeys]);

  const teamKeys=[...new Set(Object.values(TEAM_MAP))].sort();
  const assignees=[...new Set((tasks||[]).flatMap(t=>{const names=[t.workers?.name];if(t.task_assignees)t.task_assignees.forEach(ta=>{if(ta.workers?.name)names.push(ta.workers.name)});return names}).filter(Boolean))].sort();
  const totalFiltered=Object.values(grouped).reduce((s,arr)=>s+arr.length,0);
  const toggleC=k=>setCol(p=>({...p,[k]:!p[k]}));

  // Part reorder
  const movePart=(part,dir)=>{
    setPartOrder(prev=>{const arr=[...(prev||partKeys)];const i=arr.indexOf(part);if(i<0)return arr;const ni=i+dir;if(ni<0||ni>=arr.length)return arr;[arr[i],arr[ni]]=[arr[ni],arr[i]];return arr});
  };
  // Sorted entries
  const sortedParts=useMemo(()=>{
    const order=partOrder||partKeys;
    // Include any new parts not in order
    const all=[...order,...partKeys.filter(k=>!order.includes(k))];
    return all.filter(k=>grouped[k]);
  },[partOrder,partKeys,grouped]);

  return<div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
    {/* Filters */}
    <div style={{padding:"8px 16px",borderBottom:"1px solid var(--bd)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
      <span style={{fontSize:14,fontWeight:700}}>업무 시트</span>
      <span style={{fontSize:12,color:"var(--t4)"}}>{totalFiltered}건</span>
      <div style={{display:"flex",gap:4,marginLeft:8}}>
        <button className={"bt bt-s"+(teamTab==="all"?" on":"")} onClick={()=>setTT("all")}>전체</button>
        {teamKeys.map(t=><button key={t} className={"bt bt-s"+(teamTab===t?" on":"")} onClick={()=>setTT(t)}>{t}</button>)}
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
        <select value={partFilter} onChange={e=>setPF(e.target.value)} style={{fontSize:11,padding:"3px 6px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">파트 전체</option>
          {Object.keys(PART_LABELS).map(p=><option key={p} value={p}>{PART_LABELS[p]}</option>)}
        </select>
        <select value={statusFilter} onChange={e=>setSF(e.target.value)} style={{fontSize:11,padding:"3px 6px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">상태 전체</option>
          <option value="progress">진행 중</option><option value="waiting">대기</option><option value="done">완료</option><option value="blocked">차단</option>
        </select>
        <select value={assigneeFilter} onChange={e=>setAF(e.target.value)} style={{fontSize:11,padding:"3px 6px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">담당자 전체</option>
          {assignees.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
      </div>
    </div>

    {/* Table */}
    <div style={{overflow:"auto",flex:1,padding:"0 4px"}}>
      {/* Header */}
      <div style={{display:"grid",gridTemplateColumns:"32px 70px 64px 120px 1fr 80px 80px 50px 72px",gap:4,padding:"8px 12px",borderBottom:"2px solid var(--bd)",fontSize:11,fontWeight:700,color:"var(--t3)",position:"sticky",top:0,background:"var(--bg)",zIndex:3}}>
        <span>#</span><span>파트</span><span>담당자</span><span>카테고리</span><span>세부 내용</span><span>시작일</span><span>완료일</span><span>소요</span><span>일정 위험도</span>
      </div>
      {sortedParts.map((part,pi)=>{const rows=grouped[part];return<div key={part}>
        <div style={{padding:"8px 12px",background:"var(--bg3)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid var(--bd)"}} onClick={()=>toggleC(part)}>
          <span style={{fontSize:10,color:"var(--t4)"}}>{(collapsed||{})[part]?"▶":"▼"}</span>
          <span style={{fontSize:12,fontWeight:700,color:"var(--t1)"}}>{part}</span>
          <B ch={rows.length+"건"} c="b-a"/>
          <span style={{marginLeft:"auto",display:"flex",gap:2}} onClick={e=>e.stopPropagation()}>
            {pi>0&&<button onClick={()=>movePart(part,-1)} style={{background:"none",border:"1px solid var(--bd)",borderRadius:3,fontSize:10,color:"var(--t4)",cursor:"pointer",padding:"0 4px",lineHeight:"18px"}}>▲</button>}
            {pi<sortedParts.length-1&&<button onClick={()=>movePart(part,1)} style={{background:"none",border:"1px solid var(--bd)",borderRadius:3,fontSize:10,color:"var(--t4)",cursor:"pointer",padding:"0 4px",lineHeight:"18px"}}>▼</button>}
          </span>
        </div>
        {!(collapsed||{})[part]&&rows.map((t,i)=>{
          const tm=TM[t.contentType]||{};
          const hasChildren=(t._children||[]).length>0;
          const isExp=!!taskExpanded[t.id];
          const renderRow=(tt,isChild)=>{
            const ctm=TM[tt.contentType]||{};
            return<div key={tt.id} style={{display:"grid",gridTemplateColumns:"32px 70px 64px 120px 1fr 80px 80px 50px 72px",gap:4,padding:"6px 12px",borderBottom:"1px solid var(--bg3)",alignItems:"center",fontSize:12,background:isChild?"var(--bg2)":undefined,paddingLeft:isChild?24:12}}>
              <span style={{color:"var(--t4)",display:"flex",alignItems:"center",gap:2}}>{!isChild&&hasChildren?<button onClick={(e)=>{e.stopPropagation();setTE(p=>({...p,[t.id]:!p[t.id]}))}} style={{background:"none",border:"none",fontSize:10,cursor:"pointer",color:"var(--t3)",padding:0}}>{isExp?"▼":"▶"}</button>:isChild?<span style={{color:"var(--t4)"}}>└</span>:null}{isChild?"":i+1}{!isChild&&hasChildren?<span style={{fontSize:9,color:"var(--ac)",marginLeft:2}}>+{(t._children||[]).length}</span>:null}</span>
              <span style={{color:"var(--t3)",fontSize:11}}>{tt.part}</span>
              <span style={{color:"var(--t2)",fontSize:11}} title={tt.assigneeTooltip||tt.workerName}>{tt.assigneeDisplay||tt.workerName}</span>
              <span style={{color:ctm.c||"var(--t2)",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ctm.i||""} {tt.contentName}</span>
              <span style={{color:"var(--t1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={tt.title||tt.task_name}>{tt.title||tt.task_name}</span>
              <span style={{fontSize:11,color:"var(--t4)"}}>{tt.start_date||"-"}</span>
              <span style={{fontSize:11,color:"var(--t4)"}}>{tt.end_date||"상시"}</span>
              <span style={{fontSize:11,color:"var(--t4)",textAlign:"right"}}>{tt.days?tt.days+"일":"-"}</span>
              <span style={{fontSize:10}}>{tt.risk?<B ch={tt.risk} c={tt.risk==="위험"?"b-r":"b-g"}/>:"-"}</span>
            </div>
          };
          return<React.Fragment key={t.id}>
            {renderRow(t,false)}
            {isExp&&(t._children||[]).map(c=>renderRow(c,true))}
          </React.Fragment>
        })}
      </div>})}
    </div>
  </div>
}

/* ═══ BUILD VIEW (Phase D) ═══ */
function BuildView({contents,tasks,versions,milestones,workers}){
  const[selVer,setSelVer]=useState("all");
  const[expandedIds,setExpandedIds]=useState({});
  const[exportModal,setExportModal]=useState(null);

  const toggleExpand=(id)=>setExpandedIds(p=>({...p,[id]:!p[id]}));

  // Group contents by version
  const versionGroups=useMemo(()=>{
    const groups={};
    (versions||[]).forEach(v=>{groups[v.id]={version:v,contents:[],taskCount:0,doneCount:0}});
    groups["unassigned"]={version:{id:"unassigned",label:"미배정",target_date:null,sort_order:999},contents:[],taskCount:0,doneCount:0};
    (contents||[]).forEach(c=>{
      const vid=c.version_id||"unassigned";
      if(!groups[vid])groups[vid]={version:{id:vid,label:vid,target_date:null},contents:[],taskCount:0,doneCount:0};
      const cTasks=(tasks||[]).filter(t=>t.content_id===c.id||(t.contents&&t.contents.name===c.name));
      const done=cTasks.filter(t=>t.status==="done").length;
      groups[vid].contents.push({...c,_tasks:cTasks,_done:done,_total:cTasks.length});
      groups[vid].taskCount+=cTasks.length;
      groups[vid].doneCount+=done;
    });
    return Object.values(groups)
      .filter(g=>g.contents.length>0)
      .sort((a,b)=>(a.version.sort_order||999)-(b.version.sort_order||999));
  },[contents,tasks,versions]);

  const filtered=selVer==="all"?versionGroups:versionGroups.filter(g=>g.version.id===selVer);

  // Build note export
  const generateBuildNote=(group)=>{
    const v=group.version;
    const lines=[];
    lines.push("# "+v.label+(v.target_date?" ("+v.target_date+")":""));
    lines.push("");

    // Group contents by type
    const byType={};
    group.contents.forEach(c=>{
      const tm=TM[c.type]||{l:c.type||"기타",i:""};
      const key=tm.l;
      if(!byType[key])byType[key]=[];
      byType[key].push(c);
    });

    for(const[type,items] of Object.entries(byType)){
      lines.push("## "+type);
      items.forEach(c=>{
        const gi=GATES.findIndex(g=>g.id===c.gate);
        const gateLabel=GATES[gi]?(GATES[gi].l+" "+GATES[gi].s):(c.gate||"?");
        const progress=c._total>0?Math.round(c._done/c._total*100):0;
        lines.push("- **"+c.name+"** ["+gateLabel+"] "+progress+"% ("+c._done+"/"+c._total+")");
        if(c._tasks?.length){
          c._tasks.forEach(t=>{
            const st=SL[t.status]||t.status;
            const w=(workers||[]).find(x=>x.id===(t.assignee_id||(t.workers&&t.workers.id)));
            const assignee=w?w.name:(t.workers?.name||"");
            let line="  - "+st+": "+(t.title||"");
            if(assignee)line+=" ("+assignee+")";
            if(t.start_date&&t.end_date)line+=" "+t.start_date+"~"+t.end_date;
            if(t.jira_url)line+=" ["+t.jira_url.split("/").pop()+"]";
            lines.push(line);
          });
        }
      });
      lines.push("");
    }

    // Summary stats
    lines.push("---");
    lines.push("총 콘텐츠: "+group.contents.length+"건 / 태스크: "+group.taskCount+"건 (완료 "+group.doneCount+"건, "+Math.round(group.doneCount/Math.max(group.taskCount,1)*100)+"%)");
    return lines.join("\n");
  };

  const copyBuildNote=(group)=>{
    const note=generateBuildNote(group);
    navigator.clipboard.writeText(note).then(()=>setExportModal(group.version.label));
    setTimeout(()=>setExportModal(null),2000);
  };

  const overallStats=useMemo(()=>{
    const s={contents:0,tasks:0,done:0,jira:0};
    filtered.forEach(g=>{s.contents+=g.contents.length;s.tasks+=g.taskCount;s.done+=g.doneCount;
      g.contents.forEach(c=>c._tasks?.forEach(t=>{if(t.jira_url)s.jira++}))});
    return s;
  },[filtered]);

  return<div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    {/* Header + filters */}
    <div style={{padding:"12px 16px",borderBottom:"1px solid var(--bd)",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",flexShrink:0}}>
      <span style={{fontSize:14,fontWeight:700,color:"var(--t1)"}}>빌드별 스펙</span>
      <button className={"bt bt-s"+(selVer==="all"?" on":"")} onClick={()=>setSelVer("all")}>전체</button>
      {(versions||[]).map(v=><button key={v.id} className={"bt bt-s"+(selVer===v.id?" on":"")} onClick={()=>setSelVer(v.id)}>{v.label}</button>)}
      <div style={{marginLeft:"auto",fontSize:11,color:"var(--t4)"}}>
        {overallStats.contents}건 콘텐츠 / {overallStats.tasks}건 태스크 ({overallStats.done}건 완료, {Math.round(overallStats.done/Math.max(overallStats.tasks,1)*100)}%)

      {filtered.map(group=>{

        const progress=group.taskCount>0?Math.round(group.doneCount/group.taskCount*100):0;
        const daysLeft=v.target_date?Math.ceil((new Date(v.target_date)-new Date())/(24*60*60*1000)):null;
        const urgent=daysLeft!==null&&daysLeft<=14&&progress<80;

        return<div key={v.id} style={{marginBottom:16,border:"1px solid var(--bd)",borderRadius:"var(--r)",background:"var(--bg)",overflow:"hidden"}}>
          {/* Version header */}
          <div style={{padding:"10px 16px",background:urgent?"var(--rd-bg)":"var(--bg3)",display:"flex",alignItems:"center",gap:10,borderBottom:"1px solid var(--bd)"}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:15,fontWeight:700,color:"var(--t1)"}}>{v.label}</span>
                {v.target_date&&<span style={{fontSize:12,color:"var(--t3)"}}>{v.target_date}</span>}
                {daysLeft!==null&&<span className={"b "+(daysLeft<=0?"b-r":daysLeft<=14?"b-o":daysLeft<=30?"b-a":"b-g")}>
                  {daysLeft<=0?"지남":"D-"+daysLeft}
                </span>}
                <span style={{fontSize:11,color:"var(--t4)"}}>{group.contents.length}건 콘텐츠 / {group.taskCount}건 태스크</span>
              </div>
              {/* Progress bar */}
              <div style={{display:"flex",gap:2,marginTop:6,height:6}}>
                {group.taskCount>0?<>
                  <div style={{width:progress+"%",background:"var(--gn)",borderRadius:3,transition:"width .3s"}}/>
                  <div style={{flex:1,background:"var(--bg3)",borderRadius:3}}/>
                </>:<div style={{flex:1,background:"var(--bg3)",borderRadius:3}}/>}
              </div>
              <div style={{fontSize:10,color:"var(--t4)",marginTop:3}}>{progress}% 완료 ({group.doneCount}/{group.taskCount})</div>
            </div>
            <button className="bt bt-s" onClick={()=>copyBuildNote(group)} title="빌드 노트를 클립보드에 복사">
              {exportModal===v.label?"복사됨!":"📋 빌드 노트"}
            </button>
          </div>

          {/* Contents list */}
          <div style={{padding:"0 4px"}}>
            {group.contents.sort((a,b)=>{
              const ga=GATES.findIndex(g=>g.id===a.gate);const gb=GATES.findIndex(g=>g.id===b.gate);
              return gb-ga||(a.priority||0)-(b.priority||0);
            }).map(c=>{
              const tm=TM[c.type]||{i:"",l:c.type};
              const gi=GATES.findIndex(g=>g.id===c.gate);const gate=GATES[gi];
              const expanded=expandedIds[c.id];
              const prog=c._total>0?Math.round(c._done/c._total*100):0;

              return<div key={c.id} style={{borderBottom:"1px solid var(--bg3)"}}>
                <div onClick={()=>toggleExpand(c.id)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",cursor:"pointer",fontSize:12}}>
                  <span style={{fontSize:14,flexShrink:0}}>{tm.i||"📦"}</span>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:600,color:"var(--t1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
                    <div style={{fontSize:10,color:"var(--t4)",marginTop:1}}>{c.owner||"미정"} · {c._total}건 태스크</div>
                  </div>
                  {gate&&<span className="b" style={{background:gate.c+"18",color:gate.c,fontSize:10}}>{gate.l} {gate.s}</span>}
                  {/* Mini progress */}
                  <div style={{width:48,height:4,background:"var(--bg3)",borderRadius:2,flexShrink:0}}>
                    <div style={{width:prog+"%",height:4,background:prog===100?"var(--gn)":"var(--ac)",borderRadius:2}}/>

                  <span style={{fontSize:10,color:"var(--t4)",width:30,textAlign:"right"}}>{prog}%</span>
                  <span style={{fontSize:10,color:"var(--t4)",transform:expanded?"rotate(90deg)":"",transition:"transform .15s"}}>▶</span>
                </div>

                {/* Expanded task list */}
                {expanded&&<div style={{padding:"0 12px 8px 36px"}}>
                  {(c._tasks||[]).length===0?<div style={{fontSize:11,color:"var(--t4)"}}>태스크 없음</div>:
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                    <thead><tr style={{background:"var(--bg3)"}}>
                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>상태</th>
                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>태스크</th>
                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>담당</th>
                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>일정</th>
                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>JIRA</th>
                    </tr></thead>
                    <tbody>{c._tasks.map(t=>{
                      const w=(workers||[]).find(x=>x.id===t.assignee_id);
                      return<tr key={t.id} style={{borderBottom:"1px solid var(--bg3)"}}>
                        <td style={{padding:"3px 8px"}}><D s={t.status}/></td>
                        <td style={{padding:"3px 8px",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</td>
                        <td style={{padding:"3px 8px",color:"var(--t3)"}}>{w?.name||""}</td>
                        <td style={{padding:"3px 8px",color:"var(--t4)",whiteSpace:"nowrap"}}>{t.start_date&&t.end_date?t.start_date.slice(5)+"~"+t.end_date.slice(5):""}</td>
                        <td style={{padding:"3px 8px"}}>{t.jira_url?<a href={t.jira_url} target="_blank" rel="noopener" style={{color:"var(--ac)",textDecoration:"none",fontSize:10}}>🎫{t.jira_url.split("/").pop()}</a>:""}</td>
                      </tr>})}</tbody>
                  </table>}
                </div>}
              </div>})}
          </div>
        </div>})}
    </div>
  </div>;
}

/* ═══ SLOT STATUS ═══ */
function SlotView({workers,tasks}){
  const[teamTab,setTT]=useState("all");
  const[selWorker,setSelW]=useState(null);
  const[rightW,setRW]=useState(400);
  const splitRef=useRef(null);const dragRef=useRef(false);
  const now=new Date();

  useEffect(()=>{
    const onMove=e=>{if(!dragRef.current||!splitRef.current)return;const rect=splitRef.current.getBoundingClientRect();setRW(Math.max(280,Math.min(rect.width*0.6,rect.right-e.clientX)))};
    const onUp=()=>{if(dragRef.current){dragRef.current=false;document.body.style.cursor="";document.body.style.userSelect=""}};
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp)};
  },[]);

  const data=useMemo(()=>{
    const wMap={};
    const added=new Set();
    (tasks||[]).forEach(t=>{
      const addTo=(wid)=>{const k=wid+'::'+t.id;if(added.has(k))return;if(!wMap[wid])wMap[wid]=[];wMap[wid].push(t);added.add(k)};
      if(t.assignee_id)addTo(t.assignee_id);
      if(t.task_assignees){for(const ta of t.task_assignees)addTo(ta.worker_id)}
    });
    const teams={};
    (workers||[]).forEach(w=>{
      const team=TEAM_MAP[w.part_id]||"기타";const part=PART_LABELS[w.part_id]||w.part_id;
      if(!teams[team])teams[team]={};if(!teams[team][part])teams[team][part]=[];
      const wTasks=wMap[w.id]||[];
      // 부모 태스크만 카운트 (서브태스크는 상세 패널에서만)
      const activeTasks=wTasks.filter(t=>!t.parent_task_id&&(t.status==="progress"||t.status==="waiting"));
      const endDates=activeTasks.filter(t=>t.end_date).map(t=>new Date(t.end_date));
      const latestEnd=endDates.length?new Date(Math.max(...endDates)):null;
      const freeIn=latestEnd?Math.max(0,Math.ceil((latestEnd-now)/(24*60*60*1000))):0;
      teams[team][part].push({...w,active:activeTasks.length,allTasks:wTasks,activeTasks,freeInDays:freeIn,isFree:activeTasks.length===0});
    });
    return teams;
  },[workers,tasks]);

  const teamKeys=Object.keys(data).sort();
  const filtered=teamTab==="all"?data:data[teamTab]?{[teamTab]:data[teamTab]}:{};

  // Find dependency tasks
  const depMap=useMemo(()=>{const m={};(tasks||[]).forEach(t=>{m[t.id]=t});return m},[tasks]);

  return<div style={{display:"flex",flex:1,overflow:"hidden"}} ref={splitRef}>
    {/* Left: cards */}
    <div style={{flex:1,overflow:"auto",padding:16,minWidth:0}}>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:15,fontWeight:700}}>슬롯 상태</span>
        <span style={{fontSize:12,color:"var(--t4)"}}>팀/파트별 작업자 현황</span>
        <div style={{marginLeft:"auto",display:"flex",gap:4}}>
          <button className={"bt bt-s"+(teamTab==="all"?" on":"")} onClick={()=>setTT("all")}>전체</button>
          {teamKeys.map(t=><button key={t} className={"bt bt-s"+(teamTab===t?" on":"")} onClick={()=>setTT(t)}>{t}</button>)}
        </div>
      </div>
      {Object.entries(filtered).map(([team,parts])=><div key={team} style={{marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--t1)",padding:"6px 0",borderBottom:"2px solid var(--bd)"}}>{team}</div>
        {Object.entries(parts).map(([part,wkrs])=>{
          const freeNow=wkrs.filter(w=>w.isFree).length;
          return<div key={part} style={{marginTop:8}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <span style={{fontSize:12,fontWeight:600,color:"var(--t2)"}}>{part}</span>
              <B ch={freeNow+"/"+wkrs.length+" 가용"} c={freeNow>0?"b-g":"b-r"}/>
              <span style={{fontSize:10,color:"var(--t4)"}}>2주: {wkrs.filter(w=>w.freeInDays<=14).length} - 4주: {wkrs.filter(w=>w.freeInDays<=28).length} - 8주: {wkrs.filter(w=>w.freeInDays<=56).length}</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6}}>
              {wkrs.map(w=><div key={w.id} onClick={()=>setSelW(w)} style={{padding:"8px 10px",border:selWorker?.id===w.id?"2px solid var(--ac)":"1px solid var(--bd)",borderRadius:"var(--r)",background:w.isFree?"var(--gn-bg)":"var(--bg)",cursor:"pointer",transition:"all .12s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,fontWeight:600,color:"var(--t1)"}}>{w.is_part_lead&&<span style={{color:"var(--or)",marginRight:2}}>★</span>}{w.name}</span>
                  {w.isFree?<B ch="가용" c="b-g"/>:<B ch={w.active+"건 진행"} c={w.active>=5?"b-r":w.active>=3?"b-o":"b-a"}/>}
                </div>
                {!w.isFree&&<div style={{fontSize:10,color:"var(--t4)",marginTop:3}}>예상 완료: ~{w.freeInDays}일 후</div>}
              </div>)}
            </div>
          </div>})}
      </div>)}
    </div>

    {/* Resize handle */}
    {selWorker&&<div className="resize-handle" onMouseDown={e=>{e.preventDefault();dragRef.current=true;document.body.style.cursor="col-resize";document.body.style.userSelect="none"}}/>}

    {/* Right: detail */}
    {selWorker&&<div style={{width:rightW,borderLeft:"1px solid var(--bd)",overflow:"auto",padding:16,background:"var(--bg2)",flexShrink:0}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
        <div>
          <div style={{fontSize:16,fontWeight:700}}>{selWorker.is_part_lead&&<span style={{color:"var(--or)",marginRight:4}}>★</span>}{selWorker.name}</div>
          <div style={{fontSize:12,color:"var(--t3)"}}>
            {PART_LABELS[selWorker.part_id]||selWorker.part_id} - {TEAM_MAP[selWorker.part_id]||""}
          </div>
          <div style={{display:"flex",gap:4,marginTop:4}}>
            {selWorker.isFree?<B ch="가용" c="b-g"/>:<B ch={selWorker.active+"건 진행 중"} c={selWorker.active>=5?"b-r":selWorker.active>=3?"b-o":"b-a"}/>}
            {!selWorker.isFree&&<B ch={"~"+selWorker.freeInDays+"일 후 완료"} c="b-x"/>}
          </div>
        </div>
        <button onClick={()=>setSelW(null)} style={{background:"none",border:"none",fontSize:18,color:"var(--t4)",cursor:"pointer"}}>✕</button>
      </div>

      {/* Active tasks */}
      <div style={{fontSize:13,fontWeight:700,marginBottom:6,color:"var(--t1)"}}>진행 중 / 대기 ({selWorker.activeTasks.length})</div>
      {selWorker.activeTasks.length===0?<div style={{fontSize:12,color:"var(--t4)",padding:8}}>현재 진행 중인 작업 없음</div>:
        selWorker.activeTasks.map(t=>{
          const depTask=t.dependency_id?depMap[t.dependency_id]:null;
          const children=(selWorker.allTasks||[]).filter(c=>c.parent_task_id===t.id);
          return<div key={t.id} style={{padding:"10px 12px",border:"1px solid var(--bd)",borderRadius:"var(--r)",background:"var(--bg)",marginBottom:6}}>
            <div style={{fontSize:13,fontWeight:600,color:"var(--t1)",marginBottom:4}}>{t.title||t.task_name}{children.length>0&&<span style={{fontSize:10,color:"var(--ac)",marginLeft:6}}>+{children.length}</span>}</div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:2}}>{t.contents?.name||""}</div>
            <div style={{display:"flex",gap:12,fontSize:11,color:"var(--t4)",marginBottom:4}}>
              <span>시작: {t.start_date||"-"}</span>
              <span>마감: {t.end_date||"상시"}</span>
              <span>{t.estimated_days?t.estimated_days+"일":""}</span>
            </div>
            <B ch={SL[t.status]||t.status} c={t.status==="progress"?"b-a":"b-x"}/>
            {children.length>0&&<div style={{marginTop:6,paddingLeft:10,borderLeft:"2px solid var(--bd)"}}>
              {children.map(c=><div key={c.id} style={{fontSize:11,color:"var(--t3)",padding:"2px 0",display:"flex",alignItems:"center",gap:6}}>
                <D s={c.status}/><span style={{flex:1}}>{c.title||c.task_name}</span>
                <span style={{fontSize:10,color:"var(--t4)"}}>{c.end_date||"상시"}</span>
              </div>)}
            </div>}
            {depTask&&<div style={{marginTop:6,padding:"6px 8px",background:"var(--bg3)",borderRadius:4,fontSize:11}}>
              <div style={{color:"var(--t3)",fontWeight:600,marginBottom:2}}>선행 작업:</div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <D s={depTask.status}/><span style={{color:"var(--t2)"}}>{depTask.title||depTask.task_name}</span>
                <B ch={SL[depTask.status]||depTask.status} c={depTask.status==="done"?"b-g":"b-o"}/>
              </div>
            </div>}
          </div>})}

      {/* Completed tasks */}
      {(()=>{const done=selWorker.allTasks.filter(t=>t.status==="done");
        return done.length>0&&<div style={{marginTop:12}}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:6,color:"var(--t3)"}}>완료 ({done.length})</div>
          {done.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 0",borderBottom:"1px solid var(--bg3)",fontSize:12}}>
            <D s="done"/><span style={{color:"var(--t3)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title||t.task_name}</span>
            <span style={{fontSize:10,color:"var(--t4)",flexShrink:0}}>{t.end_date||"상시"}</span>
          </div>)}
        </div>})()}
    </div>}
  </div>
}

/* ═══ PIPELINE (with split layout) ═══ */
function PipelineView({ct,vr,wk,user,jumpId,onRefresh}){
  const ownerPartMap=useMemo(()=>{const m={};(wk||[]).forEach(w=>{m[w.name]={team:TEAM_MAP[w.part_id]||"",part:PART_LABELS[w.part_id]||""}});return m},[wk]);
  const[sel,setSel]=useState(null);
  const[tasks,setTasks]=useState([]);
  const[history,setHistory]=useState([]);
  const[detailTab,setDetailTab]=useState("tasks");
  const[dragId,setDragId]=useState(null);
  const[rightW,setRightW]=useState(420);
  const[reasonReq,setReasonReq]=useState(null); // {title, oldVal, newVal, onConfirm}
  const[jiraModal,setJiraModal]=useState(false);
  const splitRef=useRef(null);
  const draggingRef=useRef(false);
  useEffect(()=>{
    const onMove=e=>{if(!draggingRef.current||!splitRef.current)return;const rect=splitRef.current.getBoundingClientRect();const newW=Math.max(280,Math.min(rect.width*0.65,rect.right-e.clientX));setRightW(newW)};
    const onUp=()=>{if(draggingRef.current){draggingRef.current=false;document.body.style.cursor="";document.body.style.userSelect="";document.querySelectorAll(".resize-handle").forEach(h=>h.classList.remove("active"))}};
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp)};
  },[]);

  const g=useMemo(()=>{const m={};GATES.forEach(gt=>m[gt.id]=[]);(ct||[]).forEach(c=>{if(m[c.gate])m[c.gate].push(c)});return m},[ct]);

  // Jump from notice click
  useEffect(()=>{if(jumpId){const c=(ct||[]).find(x=>x.id===jumpId);if(c)setSel(c)}},[jumpId,ct]);

  useEffect(()=>{if(sel?.id){
    db.tasks(sel.id).then(setTasks).catch(()=>setTasks([]));
    Promise.all([db.contentChanges(sel.id),db.contentGateLog(sel.id)]).then(([ch,gl])=>{
      const merged=[...(ch||[]).map(x=>({...x,_kind:"change"})),...(gl||[]).map(x=>({...x,_kind:"gate",field:"gate",old_value:x.from_gate,new_value:x.to_gate,changed_by:x.approved_by}))];
      merged.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));setHistory(merged);
    }).catch(()=>setHistory([]));
  }else{setTasks([]);setHistory([]);setDetailTab("tasks")}},[sel?.id]);

  const moveCard=async(gateId,itemId,dir)=>{
    if(!user||(!user.is_lead&&!user.is_team_lead)){alert("파트장 권한 필요");return}
    const items=g[gateId]||[];const idx=items.findIndex(c=>c.id===itemId);if(idx<0)return;
    const swapIdx=idx+dir;if(swapIdx<0||swapIdx>=items.length)return;
    const a=items[idx],b=items[swapIdx];
    await Promise.all([db.updContent(a.id,{priority:b.priority}),db.updContent(b.id,{priority:a.priority})]);
    onRefresh(true);
  };
  const onDragStart=(e,item)=>{
    if(!canEditContent(item,user)){e.preventDefault();return}
    setDragId(item.id);e.dataTransfer.effectAllowed="move"};
  const onDragEnd=()=>setDragId(null);
  const onDrop=(e,gateId)=>{
    e.preventDefault();if(!dragId)return;
    const item=ct.find(c=>c.id===dragId);if(!item||item.gate===gateId){setDragId(null);return}
    if(!canTransitGate(item,gateId,user)){const ng=GATES.find(g=>g.id===gateId);alert((ng?.approval==="lead2"?"팀장 승인":"파트장 권한")+" 필요");setDragId(null);return}
    setReasonReq({
      title:item.name+" - 게이트 변경",
      oldVal:GATES.find(g=>g.id===item.gate)?.l+" "+GATES.find(g=>g.id===item.gate)?.s,
      newVal:GATES.find(g=>g.id===gateId)?.l+" "+GATES.find(g=>g.id===gateId)?.s,
      onConfirm:async(reason)=>{
        const lockNow=GATES.findIndex(g=>g.id===gateId)>=GATES.findIndex(g=>g.id===LOCK_GATE_FROM);
        const patch={gate:gateId,updated_at:new Date().toISOString()};if(lockNow)patch.locked=true;
        await db.logGate({content_id:item.id,from_gate:item.gate,to_gate:gateId,approved_by:user.name});
        await db.updContent(item.id,patch);
        await db.addChange({content_id:item.id,field:"gate",old_value:item.gate,new_value:gateId,reason,changed_by:user.name});
        setDragId(null);setReasonReq(null);onRefresh();
      }
    });
  };
  const onDragOver=(e)=>{e.preventDefault();e.dataTransfer.dropEffect="move"};

  const chgTaskSt=async(tid,st)=>{
    const t=tasks.find(x=>x.id===tid);
    if(!canEditTaskStatus(t,user)){alert("본인 태스크만 변경 가능");return}
    await db.updTask(tid,{status:st});setTasks(await db.tasks(sel.id));onRefresh(true);
  };
  const fwdGate=()=>{
    if(!sel||!user)return;const gi=GATES.findIndex(g=>g.id===sel.gate);if(gi>=GATES.length-1)return;
    const nx=GATES[gi+1].id;
    if(!canTransitGate(sel,nx,user)){const ng=GATES.find(g=>g.id===nx);alert((ng?.approval==="lead2"?"팀장 승인":"파트장 권한")+" 필요");return}
    setReasonReq({
      title:sel.name+" - 게이트 변경",
      oldVal:GATES[gi].l+" "+GATES[gi].s,
      newVal:GATES[gi+1].l+" "+GATES[gi+1].s,
      onConfirm:async(reason)=>{
        const lockNow=(gi+1)>=GATES.findIndex(g=>g.id===LOCK_GATE_FROM);
        const patch={gate:nx,updated_at:new Date().toISOString()};if(lockNow)patch.locked=true;
        await db.logGate({content_id:sel.id,from_gate:sel.gate,to_gate:nx,approved_by:user.name});

                  {h.reason&&<div style={{color:"var(--t3)",marginTop:3,fontStyle:"italic"}}>"{h.reason}"</div>}

/* ═══ JIRA SYNC MODAL ═══ */
function JiraSyncModal({tasks,onClose,onDone}){
  const[mode,setMode]=useState("auto"); // auto, manual
  const[creds,setCreds]=useState(()=>{try{return JSON.parse(localStorage.getItem("jira_creds")||"{}")}catch{return{}}});
  const[syncing,setSyncing]=useState(false);
  const[progress,setProgress]=useState({done:0,total:0,errors:[]});
  const[results,setResults]=useState(null);
  const[manualText,setManualText]=useState("");

  const jiraTasks=useMemo(()=>(tasks||[]).filter(t=>t.jira_url),[tasks]);
  const extractKey=(url)=>{const m=(url||"").match(/([A-Z]+-\d+)/);return m?m[1]:null};

  // JIRA status -> tracker status mapping
  const STATUS_MAP={"To Do":"waiting","Open":"waiting","Reopened":"waiting",
    "In Progress":"progress","In Review":"progress","In Development":"progress",
    "Done":"done","Closed":"done","Resolved":"done","완료":"done",
    "Blocked":"blocked","On Hold":"blocked"};

  const syncAuto=async()=>{
    if(!creds.user||!creds.pass){alert("JIRA 계정 정보를 입력해주세요.");return}
    localStorage.setItem("jira_creds",JSON.stringify({user:creds.user,pass:creds.pass}));
    setSyncing(true);
    const total=jiraTasks.length;
    const errors=[];const updated=[];const unchanged=[];
    setProgress({done:0,total,errors:[]});

    // Batch fetch: JQL query for all keys
    const keys=jiraTasks.map(t=>extractKey(t.jira_url)).filter(Boolean);
    const batchSize=50;

    for(let i=0;i<keys.length;i+=batchSize){
      const batch=keys.slice(i,i+batchSize);
      const jql="key in ("+batch.join(",")+")";
      try{
        const resp=await fetch("https://jira.nmn.io/rest/api/2/search?jql="+encodeURIComponent(jql)+"&fields=status,summary&maxResults="+batchSize,{
          headers:{"Authorization":"Basic "+btoa(creds.user+":"+creds.pass),"Content-Type":"application/json"}
        });
        if(!resp.ok){
          if(resp.status===401){errors.push("인증 실패 (401) - 계정 정보를 확인하세요");break}
          errors.push("JIRA API 오류: "+resp.status);continue;
        }
        const data=await resp.json();
        for(const issue of(data.issues||[])){
          const jiraKey=issue.key;
          const jiraStatus=issue.fields?.status?.name||"";
          const newStatus=STATUS_MAP[jiraStatus];
          if(!newStatus)continue;

          // Find matching task
          const task=jiraTasks.find(t=>extractKey(t.jira_url)===jiraKey);
          if(!task)continue;

          if(task.status!==newStatus){
            try{
              await fetch(SU+"/rest/v1/tasks?id=eq."+task.id,{method:"PATCH",
                headers:{...FH,"Content-Type":"application/json"},
                body:JSON.stringify({status:newStatus})});
              updated.push({key:jiraKey,title:task.title||issue.fields?.summary,old:task.status,new:newStatus,jiraStatus});
            }catch(e){errors.push(jiraKey+": DB 업데이트 실패")}
          }else{
            unchanged.push(jiraKey);
          }
        }
      }catch(e){
        if(e.message?.includes("Failed to fetch")){
          errors.push("CORS 차단 - JIRA 서버에 직접 접근할 수 없습니다. 수동 모드를 사용하세요.");
          break;
        }
        errors.push("네트워크 오류: "+e.message);
      }
      setProgress({done:Math.min(i+batchSize,keys.length),total:keys.length,errors:[...errors]});
    }
    setResults({updated,unchanged:unchanged.length,errors,total:keys.length});
    setSyncing(false);
    if(updated.length>0&&onDone)onDone();
  };

  const syncManual=()=>{
    // Parse pasted JIRA data (TSV or CSV from JIRA board export)
    // Expected: Key, Status columns (or Jira Key | Status from HTML export)
    const lines=manualText.trim().split("\n");
    const updates=[];const errors=[];
    const keyStatusPairs=[];

    for(const line of lines){
      // Try various formats
      // Format 1: PROJECTT-12345 | In Progress | ...
      // Format 2: PROJECTT-12345\tIn Progress\t...
      // Format 3: [PROJECTT-12345](url) | Status | ...
      const keyMatch=line.match(/([A-Z]+-\d+)/);
      if(!keyMatch)continue;
      const key=keyMatch[1];

      // Find status in the line
      let status=null;
      for(const[jiraSt,trkSt] of Object.entries(STATUS_MAP)){
        if(line.includes(jiraSt)){status=trkSt;break}
      }
      if(status)keyStatusPairs.push({key,status});
    }

    if(keyStatusPairs.length===0){
      setResults({updated:[],unchanged:0,errors:["파싱 가능한 데이터가 없습니다. JIRA Key와 Status가 포함된 텍스트를 붙여넣으세요."],total:0});
      return;
    }

    setSyncing(true);
    const doSync=async()=>{
      let updated=[];
      for(const{key,status} of keyStatusPairs){
        const task=jiraTasks.find(t=>extractKey(t.jira_url)===key);
        if(!task)continue;
        if(task.status!==status){
          try{
            await fetch(SU+"/rest/v1/tasks?id=eq."+task.id,{method:"PATCH",
              headers:{...FH,"Content-Type":"application/json"},
              body:JSON.stringify({status})});
            updated.push({key,title:task.title,old:task.status,new:status,jiraStatus:""});
          }catch(e){errors.push(key+": 업데이트 실패")}
        }
      }
      setResults({updated,unchanged:keyStatusPairs.length-updated.length,errors,total:keyStatusPairs.length});
      setSyncing(false);
      if(updated.length>0&&onDone)onDone();
    };
    doSync();
  };

  const SL2={"done":"완료","progress":"진행 중","waiting":"대기","blocked":"차단"};

  if(results){
    return<div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{minWidth:500}} onClick={e=>e.stopPropagation()}>
        <div className="modal-h">JIRA 동기화 결과</div>
        <div className="modal-b" style={{maxHeight:"60vh",overflow:"auto"}}>
          <div style={{display:"flex",gap:12,marginBottom:12}}>
            <div style={{flex:1,padding:10,background:"var(--gn-bg)",borderRadius:6,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:"var(--gn)"}}>{results.updated.length}</div>
              <div style={{fontSize:11,color:"var(--t3)"}}>상태 변경</div>
            </div>
            <div style={{flex:1,padding:10,background:"var(--bg3)",borderRadius:6,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:"var(--t3)"}}>{results.unchanged}</div>
              <div style={{fontSize:11,color:"var(--t3)"}}>변경 없음</div>
            </div>
            {results.errors.length>0&&<div style={{flex:1,padding:10,background:"var(--rd-bg)",borderRadius:6,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:"var(--rd)"}}>{results.errors.length}</div>

function renderJiraTemplate(tpl,vars){
  if(!tpl)return"";
  return tpl.replace(/\{\{(\w+)\}\}/g,(m,k)=>vars[k]!=null?String(vars[k]):"");
}
function JiraPreviewModal({content,tasks:allTasks,versions,workers,user,onClose,onRefresh}){
  const[templates,setTemplates]=useState([]);
  const[selTpl,setSelTpl]=useState(null);
  const[checked,setChecked]=useState({});
  const[creating,setCreating]=useState(false);
  const[results,setResults]=useState(null);
  const[previewIdx,setPreviewIdx]=useState(0);
  const[editSummary,setEditSummary]=useState({});
  const[editDesc,setEditDesc]=useState({});

  useEffect(()=>{db.jiraTemplates().then(ts=>{setTemplates(ts||[]);if(ts?.length)setSelTpl(ts[0])})},[]);

  const eligibleTasks=useMemo(()=>(allTasks||[]).filter(t=>!t.jira_url),[allTasks]);
  const linkedTasks=useMemo(()=>(allTasks||[]).filter(t=>t.jira_url),[allTasks]);

  useEffect(()=>{const m={};eligibleTasks.forEach(t=>{m[t.id]=true});setChecked(m)},[eligibleTasks]);

  const checkedTasks=useMemo(()=>eligibleTasks.filter(t=>checked[t.id]),[eligibleTasks,checked]);

  const tm=TM[content?.type]||{};
  const ver=versions?.find(v=>v.id===content?.version_id);
  const trackerUrl="https://got-contentsdesign-pipeline-er8j.vercel.app/?content="+content?.id;

  const buildVars=(task)=>{
    const w=workers?.find(x=>x.id===task.assignee_id);
    return{
      content_name:content?.name||"",
      content_type:content?.type||"",
      content_type_label:tm.l||content?.type||"",
      task_title:task.title||"",
      version_label:ver?.label||"",
      version_date:ver?.target_date||"",
      start_date:task.start_date||"",
      end_date:task.end_date||"",
      estimated_days:task.days||task.estimated_days||"",
      part_label:PART_LABELS[w?.part_id]||"",
      assignee_name:w?.name||"",
      doc_link:content?.doc_url||"",
      tracker_url:trackerUrl,
      owner:content?.owner||""
    };
  };

  const renderPreview=(task)=>{
    if(!selTpl||!task)return{summary:"",description:""};
    const vars=buildVars(task);
    return{
      summary:editSummary[task.id]!=null?editSummary[task.id]:renderJiraTemplate(selTpl.summary_template,vars),
      description:editDesc[task.id]!=null?editDesc[task.id]:renderJiraTemplate(selTpl.description_template,vars)
    };
  };

  const handleCreate=async()=>{
    if(!user||(!user.is_lead&&!user.is_team_lead)){alert("파트장 권한 필요");return}
    if(checkedTasks.length===0)return;
    setCreating(true);
    const res=[];
    for(const task of checkedTasks){
      const preview=renderPreview(task);
      const payload={
        fields:{
          project:{key:selTpl?.project_key||"PROJECTT"},
          issuetype:{name:selTpl?.issue_type||"Task"},
          summary:preview.summary,
          description:preview.description,
          priority:{name:selTpl?.priority||"Medium"},
          labels:selTpl?.labels||["auto-generated","from-tracker"]
        }
      };
      // Log the creation attempt (actual JIRA call via Chrome extension - Step 2)
      await db.addJiraLog({
        task_id:task.id,
        content_id:content.id,
        template_key:selTpl?.template_key||"default",
        created_by:user.name,
        payload:payload,
        status:"pending"
      });
      res.push({task_id:task.id,title:task.title,payload,status:"pending"});
    }
    setResults(res);
    setCreating(false);
  };

  if(results){
    return<div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{minWidth:480}} onClick={e=>e.stopPropagation()}>

        <div className="modal-b">
          <div style={{fontSize:12,color:"var(--t3)",marginBottom:12}}>
            {results.length}건의 JIRA 페이로드가 생성되었습니다.
            <br/>Chrome 확장 프로그램 연결 후 실제 JIRA 일감이 생성됩니다. (Step 2)
          </div>
          {results.map((r,i)=><div key={i} style={{padding:"6px 10px",background:"var(--bg3)",borderRadius:6,marginBottom:4,fontSize:12}}>
            <div style={{fontWeight:600,color:"var(--t1)"}}>{r.payload.fields.summary}</div>
            <div style={{color:"var(--t4)",marginTop:2}}>Project: {r.payload.fields.project.key} / Type: {r.payload.fields.issuetype.name}</div>
          </div>)}
        </div>
        <div className="modal-f">
          <button className="bt bt-g" onClick={onClose}>확인</button>
        </div>
      </div>
    </div>;
  }

  const curTask=checkedTasks[previewIdx]||checkedTasks[0];
  const curPreview=curTask?renderPreview(curTask):{summary:"",description:""};

  return<div className="modal-bg" onClick={onClose}>
    <div className="modal" style={{minWidth:560,maxWidth:640}} onClick={e=>e.stopPropagation()}>
      <div className="modal-h" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span>JIRA 일감 생성 미리보기</span>
        <span style={{fontSize:11,color:"var(--t4)"}}>{content?.name}</span>
      </div>
      <div className="modal-b" style={{maxHeight:"60vh",overflow:"auto"}}>
        {/* Template selector */}
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>

          <select value={selTpl?.id||""} onChange={e=>{const t=templates.find(x=>String(x.id)===e.target.value);if(t)setSelTpl(t)}}
            style={{fontSize:12,padding:"4px 8px",border:"1px solid var(--bd)",borderRadius:4,fontFamily:"inherit"}}>
            {templates.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        </div>

        {/* Already linked */}
        {linkedTasks.length>0&&<div style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--gn)",marginBottom:4}}>JIRA 연결됨 ({linkedTasks.length}건)</div>
          {linkedTasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",fontSize:11,color:"var(--t3)"}}>
            <span style={{color:"var(--gn)"}}>&#10003;</span>
            <span>{t.title}</span>
            <a href={t.jira_url} target="_blank" rel="noopener" style={{color:"var(--ac)",fontSize:10}}>{t.jira_url?.split("/").pop()}</a>
          </div>)}
        </div>}

        {/* Eligible tasks checkboxes */}
        {eligibleTasks.length>0?<>
          <div style={{fontSize:11,fontWeight:600,color:"var(--t2)",marginBottom:6}}>생성 대상 ({checkedTasks.length}/{eligibleTasks.length}건 선택)</div>
          <div style={{marginBottom:12,maxHeight:140,overflow:"auto",border:"1px solid var(--bd)",borderRadius:6,padding:6}}>
            {eligibleTasks.map((t,i)=><label key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",fontSize:12,cursor:"pointer",
              background:curTask?.id===t.id?"var(--ac-bg)":"transparent",borderRadius:4,paddingLeft:4}}
              onClick={()=>setPreviewIdx(eligibleTasks.indexOf(t))}>
              <input type="checkbox" checked={!!checked[t.id]} onChange={e=>{setChecked(p=>({...p,[t.id]:e.target.checked}))}} style={{accentColor:"var(--ac)"}}/>
              <D s={t.status}/>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
              <span style={{fontSize:10,color:"var(--t4)"}}>{t.days||"?"}일</span>
            </label>)}
          </div>

          {/* Preview for selected task */}
          {curTask&&<div style={{border:"1px solid var(--bd)",borderRadius:8,overflow:"hidden"}}>
            <div style={{padding:"8px 12px",background:"var(--bg3)",fontSize:11,fontWeight:600,color:"var(--t2)",display:"flex",justifyContent:"space-between"}}>
              <span>미리보기: {curTask.title}</span>
              {checkedTasks.length>1&&<div style={{display:"flex",gap:4}}>
                <button className="bt bt-s" disabled={previewIdx<=0} onClick={()=>setPreviewIdx(p=>p-1)} style={{padding:"1px 6px"}}>&#9664;</button>
                <span style={{fontSize:10,color:"var(--t4)",lineHeight:"22px"}}>{previewIdx+1}/{checkedTasks.length}</span>
                <button className="bt bt-s" disabled={previewIdx>=checkedTasks.length-1} onClick={()=>setPreviewIdx(p=>p+1)} style={{padding:"1px 6px"}}>&#9654;</button>
              </div>}
            </div>
            <div style={{padding:12}}>
              <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:"6px 8px",fontSize:12,marginBottom:10}}>
                <span style={{color:"var(--t4)",fontWeight:500}}>Project</span><span>{selTpl?.project_key||"PROJECTT"}</span>
                <span style={{color:"var(--t4)",fontWeight:500}}>Type</span><span>{selTpl?.issue_type||"Task"}</span>

      </div>

}

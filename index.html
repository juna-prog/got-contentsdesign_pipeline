      taskCounter[tkey]=(taskCounter[tkey]||0)+1;
      const suffix=taskCounter[tkey]>1?`::${taskCounter[tkey]}`:'';
      const srcKey=`${curPartId}::${assignee}::${line}${suffix}`;
      const endDate=normalizeDateExtended(dateRaw);
      const content={source_key:srcKey,name:line,gate:null,category:null,owner:assignee,_owner_names:[assignee],start_date:null,end_date:endDate,doc_url:null,notes:null,part_id:curPartId};
      contents.push(content);
      const task={source_key:`${srcKey}::task`,_content_source_key:srcKey,title:line,assignee_name:assignee,_assignee_names:[assignee],related_part:null,status:'progress',start_date:null,end_date:endDate,days:null,jira_url:null,notes:null,_is_child:false,_parent_source_key:null};
      tasks.push(task);
    }
  }
  resolve({contents,tasks});
}catch(err){reject(err)}};reader.onerror=reject;reader.readAsArrayBuffer(file)})}

// 파트별 기본 type (기존 contents.type enum과의 호환)
const PART_DEFAULT_TYPE={combat:"system",level:"system",field:"field",quest:"season_quest"};
function buildContentPayload(c,now){
  return{name:c.name,type:PART_DEFAULT_TYPE[c.part_id]||"system",gate:c.gate||'G0',version_id:c.version_id||'미정',category:c.category,owner:c.owner,start_date:c.start_date,end_date:c.end_date,doc_url:c.doc_url,notes:c.notes,source_key:c.source_key,imported_at:now,priority:2,doc_status:'진행',alert:'none'};
}
// Phase 6 P2-B Track 4: work_types 매칭 헬퍼 (import + JIRA preview 공용)
// part_id 는 source_key 프리픽스로 도출 (tasks 테이블에 part_id 컬럼 없음)
function pickWorkType(workTypes,partId,actionVerb){
  if(!partId)return null;
  const byPart=(workTypes||[]).filter(w=>w.part_id===partId);
  if(byPart.length===0)return null;
  if(byPart.length===1)return byPart[0];
  if(actionVerb){const m=byPart.find(w=>w.default_action_verb===actionVerb);if(m)return m}
  return byPart[0];
}
function buildTaskPayload(t,contentIdByKey,workerByName,parentId,now,workTypes){
  const cid=contentIdByKey.get(t._content_source_key);if(!cid)return null;
  const w=workerByName.get(t.assignee_name);
  let days=t.days;
  if((days==null||days==="")&&workTypes){
    const partId=(t._content_source_key||t.source_key||"").split("::")[0]||null;
    const wt=pickWorkType(workTypes,partId,t.action_verb);
    if(wt&&wt.default_est_days!=null)days=Math.round(Number(wt.default_est_days));
  }
  return{content_id:cid,title:t.title,title_object:t.title_object||null,action_verb:t.action_verb||null,region_chapter:t.region_chapter||null,issue_type:t.issue_type||null,priority:t.priority||null,assignee_id:w?w.id:null,related_part:t.related_part,status:t.status,start_date:t.start_date,end_date:t.end_date,days,jira_url:t.jira_url,notes:t.notes,version_id:t.version_id||null,source_key:t.source_key,parent_task_id:parentId,imported_at:now};
}

function ImportModal({user,workers,onClose,onDone}){
  const PARTS=[{id:'combat',label:'전투'},{id:'level',label:'레벨'},{id:'field',label:'필드'},{id:'quest',label:'퀘스트'},{id:'art_all',label:'아트팀 전체'}];
  const allowedParts=user.is_team_lead?PARTS:PARTS.filter(p=>p.id===user.part_id);
  const[partId,setPartId]=useState(allowedParts[0]?.id||'combat');
  const[file,setFile]=useState(null);
  const[parsed,setParsed]=useState(null);
  const[diff,setDiff]=useState(null);
  const[running,setRunning]=useState(false);
  const[error,setError]=useState(null);
  const[done,setDone]=useState(null);

  const isArt=partId==='art_all';
  const handleFile=async(f)=>{
    setFile(f);setParsed(null);setDiff(null);setError(null);if(!f)return;
    try{
      const p=isArt?await parseArtSheet(f):await parseSheet(f,partId);setParsed(p);
      const artPrefixes=Object.values(ART_PART_MAP);
      const prefixes=isArt?[...new Set(artPrefixes)]:[partId];
      const allExC=[],allExT=[];
      for(const pfx of prefixes){const[ec,et]=await Promise.all([db.contentsBySrc(pfx+'::'),db.tasksBySrc(pfx+'::')]);allExC.push(...(ec||[]));allExT.push(...(et||[]))}
      const existingC=allExC,existingT=allExT;
      const exMapC=new Map((existingC||[]).map(c=>[c.source_key,c]));
      const exMapT=new Map((existingT||[]).map(t=>[t.source_key,t]));
      const cAdd=[],cUpd=[],cLocked=[];
      for(const c of p.contents){const ex=exMapC.get(c.source_key);if(!ex)cAdd.push(c);else if(ex.locked)cLocked.push(c);else cUpd.push({...c,_id:ex.id})}
      const tAdd=[],tUpd=[];
      for(const t of p.tasks){const ex=exMapT.get(t.source_key);if(!ex)tAdd.push(t);else tUpd.push({...t,_id:ex.id})}
      const workerNames=new Set((workers||[]).map(w=>w.name));
      const unknown=new Set();
      for(const t of p.tasks){for(const n of(t._assignee_names||[])){if(n&&!workerNames.has(n))unknown.add(n)}}
      const unknownGate=p.contents.filter(c=>!c.gate).map(c=>c.name);
      /* 미배정 task -> 파트장 fallback 예상 건수 (실 import 시 적용) */
      const partLeadByPartPv={};
      for(const w of(workers||[])){if(w.is_part_lead&&w.part_id&&!partLeadByPartPv[w.part_id])partLeadByPartPv[w.part_id]=w}
      const leadFallbackPreview=p.tasks.filter(t=>{
        if(t._assignee_names&&t._assignee_names.length>0)return false;
        const pid=t._content_source_key?String(t._content_source_key).split('::')[0]:null;
        return pid&&partLeadByPartPv[pid];
      }).length;
      setDiff({cAdd,cUpd,cLocked,tAdd,tUpd,unknownWorkers:[...unknown],unknownGate,leadFallback:leadFallbackPreview,leadFallbackName:partLeadByPartPv[partId]?.name||null});
    }catch(e){setError(e.message)}
  };

  const run=async()=>{
    if(!parsed||!diff)return;
    if(diff.unknownWorkers.length>0){setError("미인식 담당자가 있습니다. 먼저 workers 테이블을 정리하세요: "+diff.unknownWorkers.slice(0,5).join(", "));return}
    setRunning(true);setError(null);
    try{
      const workerByName=new Map((workers||[]).map(w=>[w.name,w]));
      /* 미배정 fallback: 파트별 파트장 매핑 (workers.is_part_lead=true) */
      const partLeadByPart={};
      for(const w of(workers||[])){if(w.is_part_lead&&w.part_id&&!partLeadByPart[w.part_id])partLeadByPart[w.part_id]=w}
      /* 미배정 task에 파트장 자동 할당 */
      let leadFallbackCount=0;
      for(const t of[...(diff.tAdd||[]),...(diff.tUpd||[])]){
        if(t._assignee_names&&t._assignee_names.length>0)continue;
        const pid=t._content_source_key?String(t._content_source_key).split('::')[0]:null;
        const lead=pid?partLeadByPart[pid]:null;
        if(lead){t.assignee_name=lead.name;t._assignee_names=[lead.name];leadFallbackCount++}
      }
      if(leadFallbackCount>0)console.log(`[import] 미배정 ${leadFallbackCount}건 -> 파트장 자동 할당`);
      /* Phase 6 P2-B Track 4: work_types 로드 (default_est_days 자동 채움용) */
      const workTypes=await db.workTypes().catch(()=>[]);
      let estFillCount=0;
      for(const t of[...(diff.tAdd||[]),...(diff.tUpd||[])]){
        if(t.days!=null&&t.days!=="")continue;
        const partId=(t._content_source_key||t.source_key||"").split("::")[0]||null;
        const wt=pickWorkType(workTypes,partId,t.action_verb);
        if(wt&&wt.default_est_days!=null)estFillCount++;
      }
      if(estFillCount>0)console.log(`[import] days 미입력 ${estFillCount}건 -> work_types.default_est_days 자동 채움`);
      const now=new Date().toISOString();
      // 1. 신규 콘텐츠
      const insertedC=[];
      if(diff.cAdd.length>0){
        const payload=diff.cAdd.map(c=>buildContentPayload(c,now));
        const res=await db.bulkContents(payload);
        insertedC.push(...(res||[]));
      }
      // 2. 갱신 콘텐츠
      for(const c of diff.cUpd){
        const upd={gate:c.gate||'G0',category:c.category,owner:c.owner,start_date:c.start_date,end_date:c.end_date,doc_url:c.doc_url,notes:c.notes,imported_at:now};
        if(c.version_id)upd.version_id=c.version_id;  /* xlsx에 목표 값 있으면 반영, 없으면 기존 값 유지 */
        await db.updContent(c._id,upd);
        await db.addChange({content_id:c._id,field:'import',old_value:null,new_value:file.name,reason:`import: ${file.name}`,changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
      }
      // 콘텐츠 id 매핑
      const contentIdByKey=new Map();
      for(const c of insertedC)contentIdByKey.set(c.source_key,c.id);
      for(const c of diff.cUpd)contentIdByKey.set(c.source_key,c._id);
      // 3. 태스크 - 부모 먼저, 자식 나중
      const taskIdByKey=new Map();
      for(const pfx of(isArt?[...new Set(Object.values(ART_PART_MAP))]:[partId])){const exT2=await db.tasksBySrc(pfx+'::');for(const t of(exT2||[]))taskIdByKey.set(t.source_key,t.id)}

      const newParents=diff.tAdd.filter(t=>!t._is_child);
      const newChildren=diff.tAdd.filter(t=>t._is_child);
      const updParents=diff.tUpd.filter(t=>!t._is_child);
      const updChildren=diff.tUpd.filter(t=>t._is_child);

      if(newParents.length>0){
        const payload=newParents.map(t=>buildTaskPayload(t,contentIdByKey,workerByName,null,now,workTypes)).filter(x=>x);
        if(payload.length>0){const res=await db.bulkTasks(payload);for(const r of(res||[]))taskIdByKey.set(r.source_key,r.id)}
      }
      for(const t of updParents){const p=buildTaskPayload(t,contentIdByKey,workerByName,null,now,workTypes);if(p)await db.updTask(t._id,p)}
      if(newChildren.length>0){
        const payload=newChildren.map(t=>{const pid=t._parent_source_key?taskIdByKey.get(t._parent_source_key):null;return buildTaskPayload(t,contentIdByKey,workerByName,pid,now,workTypes)}).filter(x=>x);
        if(payload.length>0)await db.bulkTasks(payload);
      }
      for(const t of updChildren){const pid=t._parent_source_key?taskIdByKey.get(t._parent_source_key):null;const p=buildTaskPayload(t,contentIdByKey,workerByName,pid,now,workTypes);if(p)await db.updTask(t._id,p)}

      // Sync task_assignees junction table for multi-assignee tasks
      const allParsedTasks=[...diff.tAdd,...diff.tUpd];
      for(const pfx of(isArt?[...new Set(Object.values(ART_PART_MAP))]:[partId])){const exT3=await db.tasksBySrc(pfx+'::');for(const t of(exT3||[]))taskIdByKey.set(t.source_key,t.id)}
      // Pass 2: resolve parent_task_id via _parent_jira_key (cross-row, order-independent)
      const jiraToTaskId=new Map();
      for(const t of allParsedTasks){if(t._jira_key){const tid=t._id||taskIdByKey.get(t.source_key);if(tid)jiraToTaskId.set(t._jira_key,tid)}}
      for(const t of allParsedTasks){
        if(!t._parent_jira_key)continue;
        const tid=t._id||taskIdByKey.get(t.source_key);if(!tid)continue;
        const pid=jiraToTaskId.get(t._parent_jira_key);if(!pid||pid===tid)continue;
        await db.updTask(tid,{parent_task_id:pid}).catch(()=>null);
      }
      for(const t of allParsedTasks){
        if(!t._assignee_names||t._assignee_names.length<2)continue;
        const tid=t._id||taskIdByKey.get(t.source_key);if(!tid)continue;
        await db.delTaskAssignees(tid);
        const rows=t._assignee_names.map(n=>{const w=workerByName.get(n);return w?{task_id:tid,worker_id:w.id,role:'assignee'}:null}).filter(Boolean);
        if(rows.length>0)await db.bulkTaskAssignees(rows);
      }

      await db.addImportRun({part_id:isArt?'art_all':partId,file_name:file.name,imported_by:user.name,contents_added:diff.cAdd.length,contents_updated:diff.cUpd.length,tasks_added:diff.tAdd.length,tasks_updated:diff.tUpd.length});
      setDone({c:diff.cAdd.length+diff.cUpd.length,t:diff.tAdd.length+diff.tUpd.length});
      onDone&&onDone();
    }catch(e){setError("import 실패: "+e.message)}
    setRunning(false);
  };

  return<div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget&&!running)onClose()}}>
    <div className="modal" style={{minWidth:480,maxWidth:580}}>
      <div className="modal-h">📥 시트 가져오기</div>
      <div className="modal-b">
        {!done&&<>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--t3)",fontWeight:600}}>파트</label>
            <select value={partId} onChange={e=>{setPartId(e.target.value);setFile(null);setParsed(null);setDiff(null)}}
              style={{display:"block",width:"100%",padding:8,marginTop:4,border:"1px solid var(--bd)",borderRadius:6}}>
              {allowedParts.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
            </select>
          </div>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--t3)",fontWeight:600}}>xlsx 파일</label>
            <input type="file" accept=".xlsx" onChange={e=>handleFile(e.target.files[0])}
              style={{display:"block",marginTop:4,fontSize:12}}/>
          </div>
          {parsed&&diff&&<div style={{marginTop:14,padding:12,background:"var(--bg2)",borderRadius:6,fontSize:12,lineHeight:1.7}}>
            <div style={{fontWeight:700,marginBottom:6}}>미리보기 (DB 저장 안 함)</div>
            <div>콘텐츠 {parsed.contents.length}건 (신규 {diff.cAdd.length}, 갱신 {diff.cUpd.length}{diff.cLocked.length>0?`, 잠금 ${diff.cLocked.length}`:''})</div>
            <div>태스크 {parsed.tasks.length}건 (신규 {diff.tAdd.length}, 갱신 {diff.tUpd.length}){(()=>{const mc=parsed.tasks.filter(t=>(t._assignee_names||[]).length>1).length;return mc>0?` / 복수 담당자 ${mc}건`:''})()}{(()=>{const sc=parsed.tasks.filter(t=>t._is_child||t._parent_jira_key).length;return sc>0?` / 서브태스크 ${sc}건`:''})()}</div>
            {isArt&&parsed.contents.length>0&&<div style={{marginTop:6,fontSize:11,color:"var(--t3)"}}>{(()=>{const pc={};parsed.contents.forEach(c=>{const l=PART_LABELS[c.part_id]||c.part_id;pc[l]=(pc[l]||0)+1});return Object.entries(pc).map(([k,v])=>`${k} ${v}건`).join(', ')})()}</div>}
            {diff.unknownWorkers.length>0&&<div style={{marginTop:8,color:"var(--rd)"}}>⚠ 미인식 담당자 {diff.unknownWorkers.length}명: {diff.unknownWorkers.slice(0,5).join(", ")}{diff.unknownWorkers.length>5?'...':''}</div>}
            {!isArt&&diff.unknownGate.length>0&&<div style={{marginTop:4,color:"var(--or)"}}>⚠ 미인식 게이트 {diff.unknownGate.length}건: 기본 G0 적용</div>}
            {diff.leadFallback>0&&<div style={{marginTop:4,color:"var(--ac)"}}>👤 미배정 {diff.leadFallback}건 → 파트장 자동 할당{diff.leadFallbackName?` (${diff.leadFallbackName})`:''}</div>}
          </div>}
          {error&&<div style={{marginTop:10,padding:10,background:"var(--rd-bg)",color:"var(--rd)",borderRadius:6,fontSize:12}}>{error}</div>}
        </>}
        {done&&<div style={{padding:14,background:"var(--gn-bg)",color:"var(--gn)",borderRadius:6,fontWeight:600}}>
          ✓ Import 완료! 콘텐츠 {done.c}건, 태스크 {done.t}건 처리됨.
        </div>}
      </div>
      <div className="modal-f">
        {!done&&<>
          <button className="bt" onClick={onClose} disabled={running}>취소</button>
          <button className={"bt"+((!diff||running||(diff&&diff.unknownWorkers.length>0))?" disabled-ctrl":"")} onClick={run}
            style={{background:"var(--ac)",color:"#fff",borderColor:"var(--ac)"}}>
            {running?"가져오는 중...":"가져오기 실행"}
          </button>
        </>}
        {done&&<button className="bt" onClick={onClose}>닫기</button>}
      </div>
    </div>
  </div>;
}

        if(ma&&ma.email&&ma.worker_id){
          handleMasterAuth(ma);
          return;
        }
      }
    }catch{}
    // 2. initial session
    supabaseClient.auth.getSession().then(({data})=>handleSession(data.session));
    // 3. listener
    const{data:{subscription}}=supabaseClient.auth.onAuthStateChange((evt,sess)=>{
      if(evt==="SIGNED_OUT"){currentSession=null;setUser(null);setAuthedSession(null);setAuthReady(true);return}
      handleSession(sess);
    });
    return()=>subscription.unsubscribe();
  },[handleSession,handleMasterAuth]);

  const load=useCallback(async(silent)=>{if(!silent){setLd(true);setErr(null)}try{
    const[v,c,m,w,t,ch,dp,dv]=await Promise.all([db.versions(),db.contents(),db.milestones().catch(()=>[]),db.workers().catch(()=>[]),db.allTasks().catch(()=>[]),db.recentChanges(),db.deps(),db.depViolations()]);
    setVr(v||[]);setCt(c||[]);setMs(m||[]);setWk(w||[]);setAllT(t||[]);setChanges(ch||[]);setDeps(dp||[]);setDepV(dv||[]);if(!silent)setErr(null);
  }catch(e){if(!silent)setErr(e.message)}if(!silent)setLd(false)},[]);
  useEffect(()=>{if(user)load()},[load,user]);

  const signOut=async()=>{
    if(user){db.addAudit({actor_worker_id:user.id,actor_email:user.email,action_type:"auth.logout",target_table:"workers",target_id:String(user.id),payload:{}})}
    // 마스터 인증으로 로그인된 경우 localStorage 만 비우고 reload
    if(localStorage.getItem("pipeline_master_auth")){
      localStorage.removeItem("pipeline_master_auth");
      currentSession=null;
      setUser(null);setAuthedSession(null);
      window.location.reload();
      return;
    }
    await supabaseClient.auth.signOut();
  };

  const handleJump=(contentId)=>{setV("pipeline");setJumpId(contentId);setTimeout(()=>setJumpId(null),1500)};

  const[jiraSyncModal,setJiraSyncModal]=useState(false);

  const exportCSV=()=>{
    const GATE_L={"G0":"설정/방향","G1":"IP검수","G2":"컨셉기획","G3":"구현기획","G4":"아트요청","G5":"구현/제작","G6":"재미검증","G7":"QA/폴리싱","DONE":"완료"};
    const VER_L={};(vr||[]).forEach(v=>{VER_L[v.id]=v.label+" ("+v.target_date+")"});
    const wMap={};(wk||[]).forEach(w=>{wMap[w.id]=w.name});
    const cMap={};(ct||[]).forEach(c=>{cMap[c.id]=c});

    const header=["콘텐츠ID","콘텐츠명","유형","게이트","버전","담당(콘텐츠)","시작일(콘텐츠)","종료일(콘텐츠)",
      "태스크ID","태스크명","담당자","상태","시작일","종료일","소요일","JIRA","비고"];
    const rows=[header];

    // Group tasks by content
    const tasksByC={};(allT||[]).forEach(t=>{
      const cid=t.content_id||(t.contents?undefined:undefined);
      if(cid)tasksByC[cid]=(tasksByC[cid]||[]).concat(t);
    });

    (ct||[]).forEach(c=>{
      const tm=TM[c.type]||{l:c.type||""};
      const cTasks=tasksByC[c.id]||[];
      if(cTasks.length===0){
        rows.push([c.id,c.name,tm.l,GATE_L[c.gate]||c.gate,VER_L[c.version_id]||c.version_id||"",
          c.owner||"",c.start_date||"",c.end_date||"","","","","","","","","",""]);
      }else{
        cTasks.forEach((t,i)=>{
          const st={"done":"완료","progress":"진행 중","waiting":"대기","blocked":"차단"};
          const assignee=wMap[t.assignee_id]||(t.workers?t.workers.name:"")||"";
          rows.push([
            i===0?c.id:"", i===0?c.name:"", i===0?tm.l:"",
            i===0?(GATE_L[c.gate]||c.gate):"", i===0?(VER_L[c.version_id]||c.version_id||""):"",
            i===0?(c.owner||""):"", i===0?(c.start_date||""):"", i===0?(c.end_date||""):"",
            t.id, t.title||"", assignee, st[t.status]||t.status||"",
            t.start_date||"", t.end_date||"", t.days||t.estimated_days||"",
            t.jira_url||"", t.notes||""
          ]);
        });
      }
    });

    // BOM + CSV
    const esc=v=>{const s=String(v??"");return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s};
    const csv="\uFEFF"+rows.map(r=>r.map(esc).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="pipeline_export_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();URL.revokeObjectURL(url);
  };

  const fc=useMemo(()=>{
    if(fv==="all")return ct;
    return ct.filter(c=>{
      const cTasks=(allT||[]).filter(t=>t.content_id===c.id);
      // 태스크 없는 콘텐츠는 자체 version_id 로 매칭
      if(cTasks.length===0)return c.version_id===fv;
      // 태스크 있는 경우: 효과적 버전 (task.version_id || content.version_id) 중 하나라도 매칭되면 포함
      // → 모든 태스크가 다른 버전(예: 미정)으로 이동되면 자동 제외
      return cTasks.some(t=>(t.version_id||c.version_id)===fv);
    });
  },[ct,fv,allT]);
  const st=useMemo(()=>({t:ct.length,cr:ct.filter(c=>c.alert==="critical").length,w:ct.filter(c=>c.alert==="warning").length}),[ct]);

  const roleLabel=user?(user.is_team_lead?"관리자":"사용자"):"";

  // ═══ Auth gate ═══
  if(!authReady)return<div style={{position:"fixed",inset:0,display:"flex",alignItems:"center",justifyContent:"center",background:"#f8f9fb",fontSize:14,color:"var(--t3)"}}>인증 확인 중...</div>;
  if(!authedSession||!user){
    return<>
      <SignInScreen/>
      {authNotice&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"#fef2f2",color:"#991b1b",padding:"10px 18px",borderRadius:8,fontSize:13,fontWeight:600,boxShadow:"0 4px 12px rgba(0,0,0,.18)",zIndex:10000,maxWidth:480,textAlign:"center",lineHeight:1.5}}>
        ⚠ {authNotice}
        <button onClick={()=>setAuthNotice(null)} style={{marginLeft:10,background:"transparent",border:"none",color:"#991b1b",cursor:"pointer",fontWeight:700,fontSize:14}}>×</button>
      </div>}
    </>;
  }

  return<div className="app">
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8,flexShrink:0}}>
      <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:"-.5px"}}>Kingsroad Pipeline Tracker<em style={{fontStyle:"normal",fontSize:11,color:"var(--gn)",fontWeight:500,marginLeft:8}}>● LIVE</em></h1>
        <div style={{fontSize:12,color:"var(--t3)",marginTop:1}}>{ct.length} 콘텐츠 · {wk.length} 작업자 · {allT.length} 태스크</div></div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {st.cr>0&&<B ch={"위험 "+st.cr} c="b-r"/>}{st.w>0&&<B ch={"주의 "+st.w} c="b-o"/>}<B ch={st.t+" 콘텐츠"} c="b-g"/>
        {user&&(user.is_team_lead||user.is_lead)&&<button className="bt bt-s" onClick={()=>setAdminPanel(true)} title="관리자 페이지" style={{background:"var(--ac-bg)",borderColor:"var(--ac)",color:"var(--ac)"}}>⚙️ 관리자</button>}
        {user&&<span className="user-badge" onClick={signOut} title="로그아웃">
          {(user.is_team_lead||user.is_lead)?"★":""}{user.name}<span className="role">{roleLabel}</span>
        </span>}
        <button className="bt bt-i" onClick={load}>↻</button></div></div>

    {/* Notice */}
    {!ld&&<NoticeBar changes={changes} user={user} onJump={handleJump} onOpenAdmin={()=>setAdminPanel(true)} allTasks={allT} onTaskClick={openTaskPanel}/>}

    {/* Milestone Timeline (간트 탭 = 자체 sticky 마커로 대체, 화면 절약) */}
    {!ld&&ms.length>0&&view!=="gantt"&&<MilestoneTimeline milestones={ms} versions={vr}/>}

    {/* Nav */}
    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center",flexShrink:0}}>
      {[{id:"pipeline",l:"파이프라인"},{id:"build",l:"빌드 스펙"},{id:"gantt",l:"간트 차트"},{id:"tasks",l:"업무 시트"},{id:"slots",l:"슬롯 상태"},{id:"deps",l:(depV&&depV.length>0?"⚠ 의존성 ("+depV.length+")":"의존성")},{id:"add",l:"+ 등록"}].map(v=>
        <button key={v.id} className={"bt"+(view===v.id?" on":"")} onClick={()=>setV(v.id)}>{v.l}</button>)}
      {view==="pipeline"&&<div style={{marginLeft:"auto",display:"flex",gap:4}}>
        <button className={"bt bt-s"+(fv==="all"?" on":"")} onClick={()=>setFv("all")}>전체</button>
        {vr.slice(0,6).map(v=><button key={v.id} className={"bt bt-s"+(fv===v.id?" on":"")} onClick={()=>setFv(v.id)}>{v.label}</button>)}</div>}
    </div>

    {/* Content (분할 레이아웃: panelTaskId 있으면 우측에 TaskDetailPanel) */}
    <div style={{display:"flex",flex:1,overflow:"hidden",gap:8,minHeight:0}}>
      <div className="pn" style={{flex:1,minWidth:0}}>
        {ld?<div style={{textAlign:"center",padding:60,fontSize:15,color:"var(--t3)"}}>데이터를 불러오는 중...</div>:
         err?<div style={{padding:24}}><h3 style={{color:"var(--rd)"}}>연결 오류</h3><p style={{color:"var(--t3)",marginTop:4}}>{err}</p></div>:<>
          {view==="pipeline"&&<PipelineView ct={fc} vr={vr} wk={wk} user={user} jumpId={jumpId} onRefresh={load} deps={deps} allT={allT} onDepRefresh={()=>{db.deps().then(setDeps);db.depViolations().then(setDepV)}}/>}
          {view==="build"&&<BuildView contents={ct} tasks={allT} versions={vr} milestones={ms} workers={wk} dependencies={deps} depViolations={depV}/>}
          {view==="gantt"&&<GanttView tasks={allT} workers={wk} milestones={ms} parts={null} contents={ct} versions={vr} dependencies={deps} depViolations={depV} onDepRefresh={()=>{db.deps().then(setDeps);db.depViolations().then(setDepV)}} onTaskClick={openTaskPanel} user={user} onRefresh={load}/>}
          {view==="tasks"&&<TaskSheet tasks={allT} workers={wk} contents={ct} versions={vr} filters={filters} onFilterChange={setFilter} dependencies={deps} depViolations={depV} onRefresh={load} user={user} onTaskClick={openTaskPanel}/>}
          {view==="slots"&&<SlotView workers={wk} tasks={allT}/>}
          {view==="deps"&&<DepViolationView depViolations={depV} tasks={allT} workers={wk} contents={ct} onRefresh={()=>{db.deps().then(setDeps);db.depViolations().then(setDepV)}}/>}
          {view==="add"&&<AddForm vr={vr} onDone={load}/>}
        </>}
      </div>
      {panelTaskId&&user&&<TaskDetailPanel taskId={panelTaskId} allTasks={allT} workers={wk} contents={ct} user={user} onClose={closeTaskPanel} onRefresh={(newId)=>{load(true);if(newId&&newId!==panelTaskId)openTaskPanel(newId)}}/>}
    </div>

    {importModal&&user&&<ImportModal user={user} workers={wk} onClose={()=>setImportModal(false)} onDone={(summary)=>{load(true);db.addAudit({actor_worker_id:user.id,actor_email:user.email,action_type:"import.run",target_table:"contents",target_id:null,payload:summary||{}})}}/>}
    {jiraSyncModal&&<JiraSyncModal tasks={allT} onClose={()=>setJiraSyncModal(false)} onDone={(summary)=>{load(true);db.addAudit({actor_worker_id:user.id,actor_email:user.email,action_type:"jira.sync",target_table:"tasks",target_id:null,payload:summary||{}})}}/>}
    {adminPanel&&user&&(user.is_team_lead||user.is_lead)&&<AdminPanel user={user} workers={wk} tasks={allT} allTasks={allT} onClose={()=>setAdminPanel(false)} onDone={()=>load(true)} onOpenImport={()=>{setAdminPanel(false);setImportModal(true)}} onOpenJira={()=>{setAdminPanel(false);setJiraSyncModal(true)}} onExportCSV={exportCSV} onRefresh={load} onTaskClick={(id)=>{setAdminPanel(false);openTaskPanel(id)}}/>}
    {toastMsg&&<div style={{position:"fixed",top:16,right:16,background:"#059669",color:"#fff",padding:"8px 16px",borderRadius:6,fontSize:13,fontWeight:600,boxShadow:"0 4px 12px rgba(0,0,0,.18)",zIndex:9999,animation:"toastIn .18s ease-out"}}>✓ {toastMsg}</div>}
  </div>
}
ReactDOM.render(<App/>,document.getElementById("app"));
</script>
</body></html>

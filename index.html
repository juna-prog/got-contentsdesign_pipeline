/* ═══ NOTICE BAR ═══ */
function NoticeBar({changes,user,onJump}){
  const[expanded,setExp]=useState(false);
  const[dismissed,setDis]=useState(()=>{try{return JSON.parse(localStorage.getItem("pipeline_dismissed_changes")||"[]")}catch(e){return[]}});
  const recent=useMemo(()=>{const cutoff=Date.now()-7*24*60*60*1000;
    return(changes||[]).filter(c=>new Date(c.created_at).getTime()>cutoff&&!dismissed.includes(c.id))},[changes,dismissed]);
  if(recent.length===0)return null;
  const visible=expanded?recent:recent.slice(0,2);
  const fmtField={start_date:"시작일",end_date:"종료일",version_id:"버전",target_build:"타겟 빌드",gate:"게이트",locked:"잠금"};
  const fmt=(c)=>{const d=new Date(c.created_at);const md=(d.getMonth()+1)+"-"+String(d.getDate()).padStart(2,"0");
    const cn=c.contents?.name||"(콘텐츠)";const own=c.contents?.owner||"";
    const isMine=user&&(own===user.name||c.changed_by===user.name);
    return{md,cn,isMine,fld:fmtField[c.field]||c.field,old:c.old_value||"-",nv:c.new_value||"-",reason:c.reason,by:c.changed_by}};
  return<div className="notice">
    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
      <span style={{fontWeight:700,color:"var(--or)"}}>📢 최근 일정 변경 ({recent.length})</span>
      <button onClick={()=>setExp(!expanded)} style={{marginLeft:"auto",background:"none",border:"1px solid var(--bd)",borderRadius:4,padding:"1px 8px",fontSize:11,cursor:"pointer",color:"var(--t3)"}}>{expanded?"접기":"전체 보기"}</button>
      <button onClick={()=>{const ids=recent.map(r=>r.id);const next=[...dismissed,...ids];localStorage.setItem("pipeline_dismissed_changes",JSON.stringify(next));setDis(next)}} style={{background:"none",border:"1px solid var(--bd)",borderRadius:4,padding:"1px 8px",fontSize:11,cursor:"pointer",color:"var(--t3)"}}>모두 확인</button>
    </div>
    {visible.map(c=>{const f=fmt(c);return<div key={c.id} className={"notice-row"+(f.isMine?" mine":"")} onClick={()=>onJump&&onJump(c.content_id)}>
      <span style={{color:"var(--t4)",fontSize:11,minWidth:34}}>{f.md}</span>
      <span style={{fontWeight:600}}>{f.cn}</span>
      <span style={{color:"var(--t4)"}}>·</span>
      <span>{f.fld}: {f.old} → {f.nv}</span>
      <span style={{color:"var(--t4)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>({f.reason})</span>
      <span style={{color:"var(--t4)",fontSize:11}}>- {f.by}</span>
    </div>})}
  </div>
}

/* ═══ PHASE D: SHEET IMPORT ═══ */
const GATE_MAP={'설정/방향':'G0','IP 검수':'G1','컨셉 기획':'G2','컨셉':'G2','구현 기획':'G3','아트 요청':'G4','구현/제작':'G5','구현':'G5','재미검증':'G6','QA/폴리싱':'G7','QA':'G7','완료':'DONE','릴리즈':'DONE'};
function normalizeGate(raw){if(!raw)return null;const desc=String(raw).split(':').pop().trim();return GATE_MAP[desc]||null}
const STATUS_MAP={'시작 전':'waiting','진행 중':'progress','완료됨':'done','완료':'done','보류':'blocked','차단':'blocked','중단':'blocked'};
function normalizeStatus(raw){if(!raw)return 'waiting';return STATUS_MAP[String(raw).trim()]||'waiting'}
function normalizeDate(raw){if(!raw)return null;const s=String(raw).trim();const m=s.match(/(\d{4})[.\-\/](\d{1,2})[.\-\/](\d{1,2})/);if(!m)return null;return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`}
const RELATED_PART_MAP={'전투':'combat','전투 파트':'combat','전투파트':'combat','레벨':'level','레벨 파트':'level','필드':'field','필드 파트':'field','퀘스트':'quest','퀘스트(내러티브)':'quest','퀘스트(내러티브) 파트':'quest','아트':'art','UX':'ux','클래스':'class','클래스 파트':'class'};
function normalizeRelatedPart(raw){if(!raw)return null;return RELATED_PART_MAP[String(raw).trim()]||null}
const INDENT_PREFIXES=['└','↳','ㄴ'];
function stripIndent(t){if(!t)return '';let s=String(t).replace(/^[\s\u3000]+/,'');for(const p of INDENT_PREFIXES)if(s.startsWith(p)){s=s.slice(p.length).trim();break}s=s.replace(/^-\s+/,'');return s}
function isChildRow(t){if(!t)return false;const s=String(t);if(/^[\s\u3000]+/.test(s))return true;const tr=s.trimStart();for(const p of INDENT_PREFIXES)if(tr.startsWith(p))return true;if(/^-\s+/.test(tr))return true;return false}
function normalizeJiraKey(raw){if(!raw)return null;const m=String(raw).trim().match(/([A-Z]+-\d+)/);return m?m[1]:null}
const HEADER_KEYS=['콘텐츠명','게이트','분류','세부 내용','담당자','유관파트','상태','작업 시작 일정','작업 완료 일정','작업 일수','기획서','지라 일감','부모 지라','비고'];
const INHERIT_KEYS=['콘텐츠명','게이트','분류','담당자','유관파트','상태','작업 시작 일정','작업 완료 일정','기획서'];
function findHeaderRow(rows){for(let i=0;i<Math.min(5,rows.length);i++){const r=rows[i].map(c=>String(c||'').trim());if(r.includes('콘텐츠명')&&r.includes('게이트'))return i}return -1}
function parseSheet(file,partId){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=(e)=>{try{
  const wb=XLSX.read(e.target.result,{type:'array'});
  const sheetName=wb.SheetNames.find(n=>n.includes('업무 목록'))||wb.SheetNames.find(n=>n.includes('업무 리스트'))||wb.SheetNames[0];
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:''});
  const hi=findHeaderRow(rows);if(hi<0)throw new Error('헤더 행을 찾을 수 없음 (콘텐츠명/게이트 컬럼 필요)');
  const header=rows[hi].map(c=>String(c||'').trim());const colIdx={};HEADER_KEYS.forEach(k=>{colIdx[k]=header.indexOf(k)});
  const dataRows=rows.slice(hi+1).filter(r=>r.some(c=>String(c||'').trim()));
  resolve(buildContentsAndTasks(dataRows,colIdx,partId));
}catch(err){reject(err)}};reader.onerror=reject;reader.readAsArrayBuffer(file)})}
function stripBracketSuffix(s){return s.replace(/\s*\[.*?\]\s*$/,'').trim()}
function parseAssigneeNames(raw){if(!raw)return[];return raw.split(/,\s*/).map(s=>stripBracketSuffix(s.trim())).filter(Boolean)}
function buildContentsAndTasks(rows,ci,partId){
  const contents=[],tasks=[];let curContent=null,curParentTask=null;
  const nameCounter={};
  const lastVals={};
  for(const r of rows){
    const rawGet=(k)=>ci[k]>=0?String(r[ci[k]]||'').trim():'';
    // inheritance: inherit lastVals when field is empty
    const get=(k)=>{const v=rawGet(k);if(v){if(INHERIT_KEYS.includes(k))lastVals[k]=v;return v}return INHERIT_KEYS.includes(k)?(lastVals[k]||''):''};
    const rawTitle=rawGet('세부 내용');const isChild=isChildRow(rawTitle);const contentName=get('콘텐츠명');
    if(contentName&&!isChild){
      nameCounter[contentName]=(nameCounter[contentName]||0)+1;
      const suffix=nameCounter[contentName]>1?`::${nameCounter[contentName]}`:'';
      const srcKey=`${partId}::${contentName}${suffix}`;
      const ownerRaw=get('담당자')||null;
      curContent={source_key:srcKey,name:contentName,gate:normalizeGate(get('게이트')),category:get('분류')||null,owner:ownerRaw,_owner_names:parseAssigneeNames(ownerRaw),start_date:normalizeDate(get('작업 시작 일정')),end_date:normalizeDate(get('작업 완료 일정')),doc_url:get('기획서')||null,notes:get('비고')||null,part_id:partId};
      contents.push(curContent);curParentTask=null;
    }
    if(!curContent)continue;
    const taskTitle=stripIndent(rawTitle);if(!taskTitle)continue;
    const assigneeRaw=get('담당자')||curContent.owner;
    const assigneeNames=parseAssigneeNames(assigneeRaw);
    const jiraRaw=rawGet('지라 일감');const parentJiraRaw=rawGet('부모 지라');
    const task={source_key:`${curContent.source_key}::${taskTitle}`,_content_source_key:curContent.source_key,title:taskTitle,assignee_name:assigneeNames[0]||null,_assignee_names:assigneeNames,related_part:normalizeRelatedPart(get('유관파트')),status:normalizeStatus(get('상태')),start_date:normalizeDate(get('작업 시작 일정'))||curContent.start_date,end_date:normalizeDate(get('작업 완료 일정'))||curContent.end_date,days:parseInt(rawGet('작업 일수'),10)||null,jira_url:jiraRaw||null,notes:rawGet('비고')||null,_is_child:isChild,_parent_source_key:isChild&&curParentTask?curParentTask.source_key:null,_jira_key:normalizeJiraKey(jiraRaw),_parent_jira_key:normalizeJiraKey(parentJiraRaw)};
    tasks.push(task);
    if(!isChild)curParentTask=task;
  }
  return{contents,tasks};
}

/* ═══ ART SHEET PARSER ═══ */
const ART_PART_MAP={'아트 1 팀장':'art_team_1','캐원':'art_char_concept','캐모':'art_char_model','애니':'art_anim','이팩트':'art_fx','아트 2 팀장':'art_team_2','배원':'art_bg_concept','배모':'art_bg_model','TA':'art_ta','연출 팀':'cutscene','연출':'cutscene'};
const ART_PART_LEADS={'art_char_model':'원근식','art_anim':'나경종','art_fx':'윤정환','art_bg_concept':'이대인','art_ta':'김광준'};
function normalizeDateExtended(raw){
  if(!raw)return null;const s=String(raw).trim();
  // standard YYYY-MM-DD or YYYY.MM.DD
  const std=normalizeDate(raw);if(std)return std;
  // "4월6일", "4월 6일", "5월1일"
  const md=s.match(/(\d{1,2})월\s*(\d{1,2})일/);
  if(md)return `2026-${md[1].padStart(2,'0')}-${md[2].padStart(2,'0')}`;
  // "5월중순"
  const mid=s.match(/(\d{1,2})월\s*중순/);
  if(mid)return `2026-${mid[1].padStart(2,'0')}-15`;
  // "4월 안", "4월 대응", "4월일정", "4월"
  const mo=s.match(/(\d{1,2})월/);
  if(mo){const m=parseInt(mo[1]);const last=new Date(2026,m,0).getDate();return `2026-${String(m).padStart(2,'0')}-${last}`}
  return null;
}
function resolveArtPartId(raw){
  if(!raw)return null;
  const s=String(raw).split('\n')[0].replace(/\s*\(\d+\)\s*$/,'').replace(/\s*\(파트장\)\s*$/,'').trim();
  return ART_PART_MAP[s]||null;
}
function parseArtSheet(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=(e)=>{try{
  const wb=XLSX.read(e.target.result,{type:'array'});
  const sheetName=wb.SheetNames[0];
  const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:''});
  // find header: "성명" + "업무 내용"
  let hi=-1,colName=-1,colTask=-1,colDate=-1,colPart=-1;
  for(let i=0;i<Math.min(10,rows.length);i++){
    const r=rows[i].map(c=>String(c||'').trim());
    const ni=r.indexOf('성명'),ti=r.indexOf('업무 내용');
    if(ni>=0&&ti>=0){hi=i;colName=ni;colTask=ti;colDate=r.indexOf('완료 예정일');colPart=r.findIndex(c=>c.includes('팀')&&c.includes('파트')||c==='팀 / 파트');break}
  }
  if(hi<0)throw new Error('아트 시트 헤더를 찾을 수 없음 (성명/업무 내용 컬럼 필요)');
  const contents=[],tasks=[];
  let curPartId=null,curWorker=null,curIsLead=false;
  const taskCounter={};
  for(let i=hi+1;i<rows.length;i++){
    const r=rows[i];
    const partRaw=colPart>=0?String(r[colPart]||'').trim():'';
    const nameRaw=String(r[colName]||'').trim();
    const taskRaw=String(r[colTask]||'').trim();
    const dateRaw=colDate>=0?String(r[colDate]||'').trim():'';
    // update current part
    if(partRaw){const pid=resolveArtPartId(partRaw);if(pid)curPartId=pid}
    // update current worker
    if(nameRaw){
      const isLead=nameRaw.includes('(파트장)');
      curWorker=nameRaw.replace(/\s*\(파트장\)\s*/,'').trim();
      curIsLead=isLead;
      // handle multi-name cell (연출 팀: "김상연\n박민주\n노보람")
      if(curWorker.includes('\n'))curWorker=curWorker.split('\n')[0].trim();
    }
    if(!taskRaw||!curPartId||!curWorker)continue;
    // parse task - handle "[작업 담당자 미지정]" prefix
    let taskTitle=taskRaw;let assignee=curWorker;
    if(taskTitle.startsWith('[작업 담당자 미지정]')){
      taskTitle=taskTitle.replace('[작업 담당자 미지정]','').trim();
      assignee=ART_PART_LEADS[curPartId]||curWorker;
    }
    // handle multi-line task content (numbered list in one cell)
    const taskLines=taskTitle.split('\n').map(l=>l.replace(/^\d+\.\s*/,'').trim()).filter(Boolean);
    for(const line of taskLines){
      const tkey=`${curPartId}::${assignee}::${line}`;
      taskCounter[tkey]=(taskCounter[tkey]||0)+1;
      const suffix=taskCounter[tkey]>1?`::${taskCounter[tkey]}`:'';
      const srcKey=`${curPartId}::${assignee}::${line}${suffix}`;
      const endDate=normalizeDateExtended(dateRaw);
      const content={source_key:srcKey,name:line,gate:null,category:null,owner:assignee,_owner_names:[assignee],start_date:null,end_date:endDate,doc_url:null,notes:null,part_id:curPartId};
      contents.push(content);
      const task={source_key:`${srcKey}::task`,_content_source_key:srcKey,title:line,assignee_name:assignee,_assignee_names:[assignee],related_part:null,status:'progress',start_date:null,end_date:endDate,days:null,jira_url:null,notes:null,_is_child:false,_parent_source_key:null};
      tasks.push(task);
    }
  }
  resolve({contents,tasks});
}catch(err){reject(err)}};reader.onerror=reject;reader.readAsArrayBuffer(file)})}

// 파트별 기본 type (기존 contents.type enum과의 호환)
const PART_DEFAULT_TYPE={combat:"system",level:"system",field:"field",quest:"season_quest"};
function buildContentPayload(c,targetBuild,now){
  return{name:c.name,type:PART_DEFAULT_TYPE[c.part_id]||"system",gate:c.gate||'G0',version_id:'launch',category:c.category,owner:c.owner,start_date:c.start_date,end_date:c.end_date,doc_url:c.doc_url,notes:c.notes,source_key:c.source_key,target_build:targetBuild,imported_at:now,priority:2,doc_status:'진행',alert:'none'};
}
function buildTaskPayload(t,contentIdByKey,workerByName,parentId,now){
  const cid=contentIdByKey.get(t._content_source_key);if(!cid)return null;
  const w=workerByName.get(t.assignee_name);
  return{content_id:cid,title:t.title,assignee_id:w?w.id:null,related_part:t.related_part,status:t.status,start_date:t.start_date,end_date:t.end_date,days:t.days,jira_url:t.jira_url,notes:t.notes,source_key:t.source_key,parent_task_id:parentId,imported_at:now};
}

function ImportModal({user,workers,onClose,onDone}){
  const PARTS=[{id:'combat',label:'전투'},{id:'level',label:'레벨'},{id:'field',label:'필드'},{id:'quest',label:'퀘스트'},{id:'art_all',label:'아트팀 전체'}];
  const allowedParts=user.is_team_lead?PARTS:PARTS.filter(p=>p.id===user.part_id);
  const[partId,setPartId]=useState(allowedParts[0]?.id||'combat');
  const[file,setFile]=useState(null);
  const[targetBuild,setTargetBuild]=useState('아시아 빌드');
  const[parsed,setParsed]=useState(null);
  const[diff,setDiff]=useState(null);
  const[running,setRunning]=useState(false);
  const[error,setError]=useState(null);
  const[done,setDone]=useState(null);

  const isArt=partId==='art_all';
  const handleFile=async(f)=>{
    setFile(f);setParsed(null);setDiff(null);setError(null);if(!f)return;
    try{
      const p=isArt?await parseArtSheet(f):await parseSheet(f,partId);setParsed(p);
      const artPrefixes=Object.values(ART_PART_MAP);
      const prefixes=isArt?[...new Set(artPrefixes)]:[partId];
      const allExC=[],allExT=[];
      for(const pfx of prefixes){const[ec,et]=await Promise.all([db.contentsBySrc(pfx+'::'),db.tasksBySrc(pfx+'::')]);allExC.push(...(ec||[]));allExT.push(...(et||[]))}
      const existingC=allExC,existingT=allExT;
      const exMapC=new Map((existingC||[]).map(c=>[c.source_key,c]));
      const exMapT=new Map((existingT||[]).map(t=>[t.source_key,t]));
      const cAdd=[],cUpd=[],cLocked=[];
      for(const c of p.contents){const ex=exMapC.get(c.source_key);if(!ex)cAdd.push(c);else if(ex.locked)cLocked.push(c);else cUpd.push({...c,_id:ex.id})}
      const tAdd=[],tUpd=[];
      for(const t of p.tasks){const ex=exMapT.get(t.source_key);if(!ex)tAdd.push(t);else tUpd.push({...t,_id:ex.id})}
      const workerNames=new Set((workers||[]).map(w=>w.name));
      const unknown=new Set();
      for(const t of p.tasks){for(const n of(t._assignee_names||[])){if(n&&!workerNames.has(n))unknown.add(n)}}
      const unknownGate=p.contents.filter(c=>!c.gate).map(c=>c.name);
      setDiff({cAdd,cUpd,cLocked,tAdd,tUpd,unknownWorkers:[...unknown],unknownGate});
    }catch(e){setError(e.message)}
  };

  const run=async()=>{
    if(!parsed||!diff)return;
    if(diff.unknownWorkers.length>0){setError("미인식 담당자가 있습니다. 먼저 workers 테이블을 정리하세요: "+diff.unknownWorkers.slice(0,5).join(", "));return}
    setRunning(true);setError(null);
    try{
      const workerByName=new Map((workers||[]).map(w=>[w.name,w]));
      const now=new Date().toISOString();
      // 1. 신규 콘텐츠
      const insertedC=[];
      const effectiveTargetBuild=isArt?null:targetBuild;
      if(diff.cAdd.length>0){
        const payload=diff.cAdd.map(c=>buildContentPayload(c,effectiveTargetBuild,now));
        const res=await db.bulkContents(payload);
        insertedC.push(...(res||[]));
      }
      // 2. 갱신 콘텐츠
      for(const c of diff.cUpd){
        const upd={gate:c.gate||'G0',category:c.category,owner:c.owner,start_date:c.start_date,end_date:c.end_date,doc_url:c.doc_url,notes:c.notes,target_build:effectiveTargetBuild,imported_at:now};
        await db.updContent(c._id,upd);
        await db.addChange({content_id:c._id,field:'import',old_value:null,new_value:file.name,reason:`import: ${file.name}`,changed_by:user.name}).catch(()=>null);
      }
      // 콘텐츠 id 매핑
      const contentIdByKey=new Map();
      for(const c of insertedC)contentIdByKey.set(c.source_key,c.id);
      for(const c of diff.cUpd)contentIdByKey.set(c.source_key,c._id);
      // 3. 태스크 - 부모 먼저, 자식 나중
      const taskIdByKey=new Map();
      for(const pfx of(isArt?[...new Set(Object.values(ART_PART_MAP))]:[partId])){const exT2=await db.tasksBySrc(pfx+'::');for(const t of(exT2||[]))taskIdByKey.set(t.source_key,t.id)}

      const newParents=diff.tAdd.filter(t=>!t._is_child);
      const newChildren=diff.tAdd.filter(t=>t._is_child);
      const updParents=diff.tUpd.filter(t=>!t._is_child);
      const updChildren=diff.tUpd.filter(t=>t._is_child);

      if(newParents.length>0){
        const payload=newParents.map(t=>buildTaskPayload(t,contentIdByKey,workerByName,null,now)).filter(x=>x);
        if(payload.length>0){const res=await db.bulkTasks(payload);for(const r of(res||[]))taskIdByKey.set(r.source_key,r.id)}
      }
      for(const t of updParents){const p=buildTaskPayload(t,contentIdByKey,workerByName,null,now);if(p)await db.updTask(t._id,p)}
      if(newChildren.length>0){
        const payload=newChildren.map(t=>{const pid=t._parent_source_key?taskIdByKey.get(t._parent_source_key):null;return buildTaskPayload(t,contentIdByKey,workerByName,pid,now)}).filter(x=>x);
        if(payload.length>0)await db.bulkTasks(payload);
      }
      for(const t of updChildren){const pid=t._parent_source_key?taskIdByKey.get(t._parent_source_key):null;const p=buildTaskPayload(t,contentIdByKey,workerByName,pid,now);if(p)await db.updTask(t._id,p)}

      // Sync task_assignees junction table for multi-assignee tasks
      const allParsedTasks=[...diff.tAdd,...diff.tUpd];
      for(const pfx of(isArt?[...new Set(Object.values(ART_PART_MAP))]:[partId])){const exT3=await db.tasksBySrc(pfx+'::');for(const t of(exT3||[]))taskIdByKey.set(t.source_key,t.id)}
      // Pass 2: resolve parent_task_id via _parent_jira_key (cross-row, order-independent)
      const jiraToTaskId=new Map();
      for(const t of allParsedTasks){if(t._jira_key){const tid=t._id||taskIdByKey.get(t.source_key);if(tid)jiraToTaskId.set(t._jira_key,tid)}}
      for(const t of allParsedTasks){
        if(!t._parent_jira_key)continue;
        const tid=t._id||taskIdByKey.get(t.source_key);if(!tid)continue;
        const pid=jiraToTaskId.get(t._parent_jira_key);if(!pid||pid===tid)continue;
        await db.updTask(tid,{parent_task_id:pid}).catch(()=>null);
      }
      for(const t of allParsedTasks){
        if(!t._assignee_names||t._assignee_names.length<2)continue;
        const tid=t._id||taskIdByKey.get(t.source_key);if(!tid)continue;
        await db.delTaskAssignees(tid);
        const rows=t._assignee_names.map(n=>{const w=workerByName.get(n);return w?{task_id:tid,worker_id:w.id,role:'assignee'}:null}).filter(Boolean);
        if(rows.length>0)await db.bulkTaskAssignees(rows);
      }

      await db.addImportRun({part_id:isArt?'art_all':partId,file_name:file.name,imported_by:user.name,contents_added:diff.cAdd.length,contents_updated:diff.cUpd.length,tasks_added:diff.tAdd.length,tasks_updated:diff.tUpd.length});
      setDone({c:diff.cAdd.length+diff.cUpd.length,t:diff.tAdd.length+diff.tUpd.length});
      onDone&&onDone();
    }catch(e){setError("import 실패: "+e.message)}
    setRunning(false);
  };

  return<div className="modal-bg" onClick={e=>{if(e.target===e.currentTarget&&!running)onClose()}}>
    <div className="modal" style={{minWidth:480,maxWidth:580}}>
      <div className="modal-h">📥 시트 가져오기</div>
      <div className="modal-b">
        {!done&&<>
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--t3)",fontWeight:600}}>파트</label>
            <select value={partId} onChange={e=>{setPartId(e.target.value);setFile(null);setParsed(null);setDiff(null)}}
              style={{display:"block",width:"100%",padding:8,marginTop:4,border:"1px solid var(--bd)",borderRadius:6}}>
              {allowedParts.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}
            </select>
          </div>
          {!isArt&&<div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--t3)",fontWeight:600}}>목표 빌드</label>
            <input value={targetBuild} onChange={e=>setTargetBuild(e.target.value)}
              style={{display:"block",width:"100%",padding:8,marginTop:4,border:"1px solid var(--bd)",borderRadius:6}}/>
          </div>}
          <div style={{marginBottom:10}}>
            <label style={{fontSize:12,color:"var(--t3)",fontWeight:600}}>xlsx 파일</label>
            <input type="file" accept=".xlsx" onChange={e=>handleFile(e.target.files[0])}
              style={{display:"block",marginTop:4,fontSize:12}}/>
          </div>
          {parsed&&diff&&<div style={{marginTop:14,padding:12,background:"var(--bg2)",borderRadius:6,fontSize:12,lineHeight:1.7}}>
            <div style={{fontWeight:700,marginBottom:6}}>미리보기 (DB 저장 안 함)</div>
            <div>콘텐츠 {parsed.contents.length}건 (신규 {diff.cAdd.length}, 갱신 {diff.cUpd.length}{diff.cLocked.length>0?`, 잠금 ${diff.cLocked.length}`:''})</div>
            <div>태스크 {parsed.tasks.length}건 (신규 {diff.tAdd.length}, 갱신 {diff.tUpd.length}){(()=>{const mc=parsed.tasks.filter(t=>(t._assignee_names||[]).length>1).length;return mc>0?` / 복수 담당자 ${mc}건`:''})()}{(()=>{const sc=parsed.tasks.filter(t=>t._is_child||t._parent_jira_key).length;return sc>0?` / 서브태스크 ${sc}건`:''})()}</div>
            {isArt&&parsed.contents.length>0&&<div style={{marginTop:6,fontSize:11,color:"var(--t3)"}}>{(()=>{const pc={};parsed.contents.forEach(c=>{const l=PART_LABELS[c.part_id]||c.part_id;pc[l]=(pc[l]||0)+1});return Object.entries(pc).map(([k,v])=>`${k} ${v}건`).join(', ')})()}</div>}
            {diff.unknownWorkers.length>0&&<div style={{marginTop:8,color:"var(--rd)"}}>⚠ 미인식 담당자 {diff.unknownWorkers.length}명: {diff.unknownWorkers.slice(0,5).join(", ")}{diff.unknownWorkers.length>5?'...':''}</div>}
            {!isArt&&diff.unknownGate.length>0&&<div style={{marginTop:4,color:"var(--or)"}}>⚠ 미인식 게이트 {diff.unknownGate.length}건: 기본 G0 적용</div>}
          </div>}
          {error&&<div style={{marginTop:10,padding:10,background:"var(--rd-bg)",color:"var(--rd)",borderRadius:6,fontSize:12}}>{error}</div>}
        </>}
        {done&&<div style={{padding:14,background:"var(--gn-bg)",color:"var(--gn)",borderRadius:6,fontWeight:600}}>
          ✓ Import 완료! 콘텐츠 {done.c}건, 태스크 {done.t}건 처리됨.
        </div>}
      </div>
      <div className="modal-f">
        {!done&&<>
          <button className="bt" onClick={onClose} disabled={running}>취소</button>
          <button className={"bt"+((!diff||running||(diff&&diff.unknownWorkers.length>0))?" disabled-ctrl":"")} onClick={run}
            style={{background:"var(--ac)",color:"#fff",borderColor:"var(--ac)"}}>
            {running?"가져오는 중...":"가져오기 실행"}
          </button>
        </>}
        {done&&<button className="bt" onClick={onClose}>닫기</button>}
      </div>
    </div>
  </div>;
}

function App(){
  const[view,setV]=useState("pipeline");
  const[ct,setCt]=useState([]);const[vr,setVr]=useState([]);const[ms,setMs]=useState([]);const[wk,setWk]=useState([]);const[allT,setAllT]=useState([]);
  const[changes,setChanges]=useState([]);
  const[ld,setLd]=useState(true);const[err,setErr]=useState(null);const[fv,setFv]=useState("all");
  const[user,setUser]=useState(null);const[userModal,setUserModal]=useState(false);
  const[jumpId,setJumpId]=useState(null);
  const[importModal,setImportModal]=useState(false);

  // Resolve user from localStorage once workers loaded
  useEffect(()=>{if(wk.length===0)return;
    const uid=localStorage.getItem("pipeline_user_id");
    if(!uid){setUserModal(true);return}
    const w=wk.find(x=>String(x.id)===String(uid));
    if(!w){setUserModal(true);return}
    setUser({id:w.id,name:w.name,part_id:w.part_id,is_lead:!!w.is_part_lead,is_team_lead:!!w.is_team_lead});
  },[wk]);

  const load=useCallback(async(silent)=>{if(!silent){setLd(true);setErr(null)}try{
    const[v,c,m,w,t,ch]=await Promise.all([db.versions(),db.contents(),db.milestones().catch(()=>[]),db.workers().catch(()=>[]),db.allTasks().catch(()=>[]),db.recentChanges()]);
    setVr(v||[]);setCt(c||[]);setMs(m||[]);setWk(w||[]);setAllT(t||[]);setChanges(ch||[]);if(!silent)setErr(null);
  }catch(e){if(!silent)setErr(e.message)}if(!silent)setLd(false)},[]);
  useEffect(()=>{load()},[load]);

  const pickUser=(w)=>{localStorage.setItem("pipeline_user_id",w.id);
    setUser({id:w.id,name:w.name,part_id:w.part_id,is_lead:!!w.is_part_lead,is_team_lead:!!w.is_team_lead});setUserModal(false)};

  const handleJump=(contentId)=>{setV("pipeline");setJumpId(contentId);setTimeout(()=>setJumpId(null),1500)};

  const[jiraSyncModal,setJiraSyncModal]=useState(false);

  const exportCSV=()=>{
    const GATE_L={"G0":"설정/방향","G1":"IP검수","G2":"컨셉기획","G3":"구현기획","G4":"아트요청","G5":"구현/제작","G6":"재미검증","G7":"QA/폴리싱","DONE":"완료"};
    const VER_L={};(vr||[]).forEach(v=>{VER_L[v.id]=v.label+" ("+v.target_date+")"});
    const wMap={};(wk||[]).forEach(w=>{wMap[w.id]=w.name});
    const cMap={};(ct||[]).forEach(c=>{cMap[c.id]=c});

    const header=["콘텐츠ID","콘텐츠명","유형","게이트","버전","담당(콘텐츠)","시작일(콘텐츠)","종료일(콘텐츠)",
      "태스크ID","태스크명","담당자","상태","시작일","종료일","소요일","JIRA","비고"];
    const rows=[header];

    // Group tasks by content
    const tasksByC={};(allT||[]).forEach(t=>{
      const cid=t.content_id||(t.contents?undefined:undefined);
      if(cid)tasksByC[cid]=(tasksByC[cid]||[]).concat(t);
    });

    (ct||[]).forEach(c=>{
      const tm=TM[c.type]||{l:c.type||""};
      const cTasks=tasksByC[c.id]||[];
      if(cTasks.length===0){
        rows.push([c.id,c.name,tm.l,GATE_L[c.gate]||c.gate,VER_L[c.version_id]||c.version_id||"",
          c.owner||"",c.start_date||"",c.end_date||"","","","","","","","","",""]);
      }else{
        cTasks.forEach((t,i)=>{
          const st={"done":"완료","progress":"진행 중","waiting":"대기","blocked":"차단"};
          const assignee=wMap[t.assignee_id]||(t.workers?t.workers.name:"")||"";
          rows.push([
            i===0?c.id:"", i===0?c.name:"", i===0?tm.l:"",
            i===0?(GATE_L[c.gate]||c.gate):"", i===0?(VER_L[c.version_id]||c.version_id||""):"",
            i===0?(c.owner||""):"", i===0?(c.start_date||""):"", i===0?(c.end_date||""):"",
            t.id, t.title||"", assignee, st[t.status]||t.status||"",
            t.start_date||"", t.end_date||"", t.days||t.estimated_days||"",
            t.jira_url||"", t.notes||""
          ]);
        });
      }
    });

    // BOM + CSV
    const esc=v=>{const s=String(v??"");return s.includes(",")||s.includes('"')||s.includes("\n")?'"'+s.replace(/"/g,'""')+'"':s};
    const csv="\uFEFF"+rows.map(r=>r.map(esc).join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="pipeline_export_"+new Date().toISOString().slice(0,10)+".csv";
    a.click();URL.revokeObjectURL(url);
  };

  const fc=useMemo(()=>fv==="all"?ct:ct.filter(c=>c.version_id===fv),[ct,fv]);
  const st=useMemo(()=>({t:ct.length,cr:ct.filter(c=>c.alert==="critical").length,w:ct.filter(c=>c.alert==="warning").length}),[ct]);

  const roleLabel=user?(user.is_team_lead?(TEAM_MAP[user.part_id]||"콘텐츠기획")+"팀 팀장":user.is_lead?"파트장":"작업자"):"";

  return<div className="app">
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8,flexShrink:0}}>
      <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:"-.5px"}}>Kingsroad Pipeline Tracker<em style={{fontStyle:"normal",fontSize:11,color:"var(--gn)",fontWeight:500,marginLeft:8}}>● LIVE</em></h1>
        <div style={{fontSize:12,color:"var(--t3)",marginTop:1}}>{ct.length} 콘텐츠 · {wk.length} 작업자 · {allT.length} 태스크</div></div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {st.cr>0&&<B ch={"위험 "+st.cr} c="b-r"/>}{st.w>0&&<B ch={"주의 "+st.w} c="b-o"/>}<B ch={st.t+" 콘텐츠"} c="b-g"/>
        <button className="bt bt-s" onClick={()=>setJiraSyncModal(true)} title="JIRA 상태를 트래커에 동기화">🔄 JIRA 동기화</button>
        <button className="bt bt-s" onClick={exportCSV} title="전체 데이터를 CSV로 내보내기">📤 CSV 내보내기</button>
        {user&&(user.is_lead||user.is_team_lead)&&<button className="bt bt-s" onClick={()=>setImportModal(true)} title="xlsx 시트 가져오기">📥 시트 가져오기</button>}
        {user&&<span className="user-badge" onClick={()=>setUserModal(true)} title="사용자 변경">
          {user.is_team_lead?"★★":user.is_lead?"★":""}{user.name}<span className="role">{roleLabel}</span>
        </span>}
        <button className="bt bt-i" onClick={load}>↻</button></div></div>

    {/* Notice */}
    {!ld&&<NoticeBar changes={changes} user={user} onJump={handleJump}/>}

    {/* Milestone Timeline */}
    {!ld&&ms.length>0&&<MilestoneTimeline milestones={ms} versions={vr}/>}

    {/* Nav */}
    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center",flexShrink:0}}>
      {[{id:"pipeline",l:"파이프라인"},{id:"build",l:"빌드 스펙"},{id:"gantt",l:"간트 차트"},{id:"tasks",l:"업무 시트"},{id:"slots",l:"슬롯 상태"},{id:"add",l:"+ 등록"}].map(v=>
        <button key={v.id} className={"bt"+(view===v.id?" on":"")} onClick={()=>setV(v.id)}>{v.l}</button>)}
      {view==="pipeline"&&<div style={{marginLeft:"auto",display:"flex",gap:4}}>
        <button className={"bt bt-s"+(fv==="all"?" on":"")} onClick={()=>setFv("all")}>전체</button>
        {vr.slice(0,6).map(v=><button key={v.id} className={"bt bt-s"+(fv===v.id?" on":"")} onClick={()=>setFv(v.id)}>{v.label}</button>)}</div>}
    </div>

    {/* Content */}
    <div className="pn">
      {ld?<div style={{textAlign:"center",padding:60,fontSize:15,color:"var(--t3)"}}>데이터를 불러오는 중...</div>:
       err?<div style={{padding:24}}><h3 style={{color:"var(--rd)"}}>연결 오류</h3><p style={{color:"var(--t3)",marginTop:4}}>{err}</p></div>:<>
        {view==="pipeline"&&<PipelineView ct={fc} vr={vr} wk={wk} user={user} jumpId={jumpId} onRefresh={load}/>}
        {view==="build"&&<BuildView contents={ct} tasks={allT} versions={vr} milestones={ms} workers={wk}/>}
        {view==="gantt"&&<GanttView tasks={allT} workers={wk} milestones={ms} parts={null} contents={ct}/>}
        {view==="tasks"&&<TaskSheet tasks={allT} workers={wk} contents={ct} versions={vr}/>}
        {view==="slots"&&<SlotView workers={wk} tasks={allT}/>}
        {view==="add"&&<AddForm vr={vr} onDone={load}/>}
      </>}
    </div>

    {userModal&&wk.length>0&&<UserModal workers={wk} onPick={pickUser} onClose={()=>setUserModal(false)} canClose={!!user}/>}
    {importModal&&user&&<ImportModal user={user} workers={wk} onClose={()=>setImportModal(false)} onDone={()=>load(true)}/>}
    {jiraSyncModal&&<JiraSyncModal tasks={allT} onClose={()=>setJiraSyncModal(false)} onDone={()=>load(true)}/>}
  </div>
}
ReactDOM.render(<App/>,document.getElementById("app"));
</script>
</body></html>

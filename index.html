<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Pipeline Tracker - Kingsroad</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{--bg:#fff;--bg2:#f8f9fb;--bg3:#f1f3f5;--bd:#e5e7eb;--bd2:#d1d5db;--t1:#111827;--t2:#374151;--t3:#6b7280;--t4:#9ca3af;--ac:#2563eb;--ac-bg:#eff6ff;--gn:#059669;--gn-bg:#ecfdf5;--rd:#dc2626;--rd-bg:#fef2f2;--or:#d97706;--or-bg:#fffbeb;--pu:#7c3aed;--pu-bg:#f5f3ff;--r:8px;--sh:0 1px 3px rgba(0,0,0,.06);--sh2:0 4px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg2);color:var(--t1);line-height:1.5;overflow:hidden;height:100vh}
::-webkit-scrollbar{height:8px;width:8px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}::-webkit-scrollbar-thumb:hover{background:var(--t4)}
.app{display:flex;flex-direction:column;height:100vh;max-width:1440px;margin:0 auto;padding:16px 24px 0}
.b{display:inline-flex;align-items:center;font-size:12px;padding:3px 10px;border-radius:6px;font-weight:600;white-space:nowrap}
.b-r{background:var(--rd-bg);color:var(--rd)}.b-o{background:var(--or-bg);color:var(--or)}.b-g{background:var(--gn-bg);color:var(--gn)}.b-p{background:var(--pu-bg);color:var(--pu)}.b-a{background:var(--ac-bg);color:var(--ac)}.b-x{background:var(--bg3);color:var(--t3)}
.bt{padding:7px 16px;font-size:13px;font-weight:600;border-radius:7px;cursor:pointer;border:1px solid var(--bd);background:var(--bg);color:var(--t2);transition:all .15s;font-family:inherit}.bt:hover{background:var(--bg3)}.bt.on{background:var(--ac-bg);border-color:var(--ac);color:var(--ac)}
.bt-s{padding:4px 10px;font-size:12px}.bt-g{background:var(--gn-bg);border-color:var(--gn);color:var(--gn)}.bt-i{padding:6px 10px;font-size:16px}
.pn{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);flex:1;overflow:hidden;display:flex;flex-direction:column}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
/* Pipeline split */
.split{display:flex;flex:1;overflow:hidden}
.split-left{flex:1;overflow:auto;padding:16px;min-width:0}
.split-right{width:420px;border-left:1px solid var(--bd);overflow-y:auto;padding:16px;background:var(--bg2)}
.split-right.closed{display:none}
.pp{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px}
.cd{padding:10px 12px;border-radius:var(--r);border:1px solid var(--bd);background:var(--bg);cursor:pointer;margin-bottom:5px;transition:all .12s;user-select:none}
.cd:hover{box-shadow:var(--sh2);transform:translateY(-1px)}.cd.sel{border-color:var(--ac);box-shadow:0 0 0 2px rgba(37,99,235,.12)}
.cd.dragging{opacity:.5;transform:scale(.95)}
.gate-col{flex:1 0 145px;min-width:145px}
.gate-drop{min-height:60px;border-radius:0 0 var(--r) var(--r);transition:background .15s}
.gate-drop.over{background:var(--ac-bg)}
/* Gantt */
.gantt-wrap{display:flex;flex:1;overflow:hidden}
.gantt-names{width:200px;flex-shrink:0;overflow-y:auto;border-right:1px solid var(--bd);background:var(--bg)}
.gantt-chart{flex:1;overflow:auto;position:relative}
.gantt-row{height:32px;display:flex;align-items:center;border-bottom:1px solid var(--bg3)}
.gantt-name{padding:0 12px;font-size:12px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:32px;display:flex;align-items:center;border-bottom:1px solid var(--bg3)}
.gantt-name.part-header{font-weight:700;color:var(--t1);background:var(--bg3);font-size:13px;cursor:pointer}
.gantt-name.part-header:hover{background:var(--bd)}
.gantt-bar{position:absolute;height:20px;border-radius:4px;font-size:10px;color:#fff;font-weight:500;display:flex;align-items:center;padding:0 6px;overflow:hidden;white-space:nowrap;cursor:pointer;transition:opacity .15s;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.gantt-bar:hover{opacity:.85;box-shadow:var(--sh2)}
.gantt-milestone{position:absolute;top:0;bottom:0;width:2px;z-index:1;opacity:.6}
.gantt-ml-label{position:absolute;top:2px;font-size:9px;font-weight:600;white-space:nowrap;transform:rotate(-45deg);transform-origin:left bottom}
.gantt-header{height:48px;display:flex;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--bg);z-index:5}
.gantt-month{display:flex;flex-direction:column;justify-content:center;border-right:1px solid var(--bg3);text-align:center}
.gantt-month-label{font-size:12px;font-weight:700;color:var(--t1)}.gantt-week-label{font-size:9px;color:var(--t4)}
.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--rd);z-index:3}
/* Tooltip */
.tooltip{position:fixed;background:var(--t1);color:#fff;padding:8px 12px;border-radius:6px;font-size:12px;z-index:100;pointer-events:none;max-width:280px;line-height:1.4;box-shadow:var(--sh2)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:580px}.fg label{font-size:12px;color:var(--t3);font-weight:500;display:block;margin-bottom:4px}
.fg input,.fg select{font-size:14px;padding:9px 12px;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--t1);width:100%;font-family:inherit}
select option{background:var(--bg)}
</style>
</head>
<body>
<div id="app"></div>

<script type="text/babel">
const{useState,useEffect,useMemo,useCallback,useRef}=React;
const SU="https://huegoxqcoqealhhlrkww.supabase.co",SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1ZWdveHFjb3FlYWxoaGxya3d3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMDMwOTUsImV4cCI6MjA5MDY3OTA5NX0.1UbszKIibvon_6zRUe1-M4ukCxpu7iytC3dGWhi-EjQ";
const FH={"apikey":SK,"Authorization":"Bearer "+SK,"Content-Type":"application/json"};
async function q(p,o={}){const r=await fetch(SU+"/rest/v1/"+p,{...o,headers:{...FH,Prefer:o.method==="POST"?"return=representation":undefined,...(o.headers||{})}});if(!r.ok)throw new Error(r.status);const t=await r.text();return t?JSON.parse(t):null}
const db={versions:()=>q("versions?select=*&order=sort_order"),contents:()=>q("contents?select=*&order=priority"),tasks:c=>q(c?"tasks?content_id=eq."+c+"&select=*&order=sort_order":"tasks?select=*&order=sort_order"),allTasks:()=>q("tasks?select=*,contents(name,type,version_id,gate),workers(name,part_id)&order=start_date"),workers:()=>q("workers?select=*&order=part_id,name"),milestones:()=>q("milestones?select=*&order=date"),parts:()=>q("parts?select=*&order=sort_order"),addContent:d=>q("contents",{method:"POST",body:JSON.stringify(d)}),updContent:(i,d)=>q("contents?id=eq."+i,{method:"PATCH",body:JSON.stringify(d)}),updTask:(i,d)=>q("tasks?id=eq."+i,{method:"PATCH",body:JSON.stringify(d)}),logGate:d=>q("gate_transitions",{method:"POST",body:JSON.stringify(d)})};

const GATES=[{id:"G0",l:"Gate 0",s:"설정/방향",c:"#7c3aed"},{id:"G0a",l:"Gate 0a",s:"IP 검수",c:"#8b5cf6"},{id:"G1",l:"Gate 1",s:"컨셉 기획",c:"#4f46e5"},{id:"G1a",l:"Gate 1a",s:"구현 기획",c:"#2563eb"},{id:"G1b",l:"Gate 1b",s:"아트 요청",c:"#0284c7"},{id:"G2",l:"Gate 2",s:"구현/제작",c:"#0d9488"},{id:"G3",l:"Gate 3",s:"QA/폴리싱",c:"#d97706"},{id:"DONE",l:"릴리즈",s:"완료",c:"#059669"}];
const TM={raid:{l:"레이드",c:"#dc2626",i:"⚔️"},season_quest:{l:"시즌퀘스트",c:"#7c3aed",i:"📜"},field:{l:"필드",c:"#059669",i:"🌍"},system:{l:"시스템",c:"#2563eb",i:"⚙️"},creature:{l:"크리처",c:"#ea580c",i:"🐉"},multi:{l:"멀티",c:"#db2777",i:"👥"},growth:{l:"성장",c:"#ca8a04",i:"📈"},cosmetic:{l:"코스메틱",c:"#7c3aed",i:"✨"}};
const AC={critical:"b-r",warning:"b-o",info:"b-a"},AL={critical:"위험",warning:"주의",info:"참고"};
const SC={done:"#059669",progress:"#2563eb",waiting:"#d1d5db",blocked:"#dc2626"},SL={done:"완료",progress:"진행 중",waiting:"대기",blocked:"차단"};
const BAR_C={done:"#10b981",progress:"#3b82f6",waiting:"#94a3b8",blocked:"#ef4444"};
const MC={milestone:"#dc2626",build:"#d97706",qa:"#2563eb",update:"#059669",season:"#7c3aed"};
const PART_LABELS={"quest":"퀘스트파트","field":"필드파트","combat":"전투파트","level":"레벨파트","art_char_concept":"캐릭터원화","art_char_model":"캐릭터모델링","art_anim":"애니메이션","art_fx":"이펙트","art_bg_concept":"배경원화","art_bg_model":"배경모델링","art_ta":"TA","cutscene":"연출","sound":"사운드","qa":"QA","tech":"테크"};
const TEAM_MAP={"quest":"콘텐츠기획","field":"콘텐츠기획","combat":"콘텐츠기획","level":"콘텐츠기획","art_char_concept":"아트1팀","art_char_model":"아트1팀","art_anim":"아트1팀","art_fx":"아트1팀","art_bg_concept":"아트2팀","art_bg_model":"아트2팀","art_ta":"아트2팀","cutscene":"연출","sound":"사운드","qa":"QA","tech":"테크"};

function B({ch,c="b-x"}){return<span className={"b "+c}>{ch}</span>}
function D({s}){return<span className="dot" style={{background:SC[s]||"#d1d5db"}}/>}

/* ═══ GANTT CHART ═══ */
function GanttView({tasks,workers,milestones,parts,contents}){
  const[teamFilter,setTF]=useState("all");
  const[partFilter,setPF]=useState("all");
  const[collapsed,setCol]=useState({});
  const[tooltip,setTip]=useState(null);
  const chartRef=useRef(null);

  // Timeline config
  const startDate=new Date(2026,3,1); // Apr 1
  const endDate=new Date(2027,1,1); // Feb 1
  const weekWidth=48;
  const totalWeeks=Math.ceil((endDate-startDate)/(7*24*60*60*1000));
  const totalWidth=totalWeeks*weekWidth;
  const rowH=32;

  // Generate weeks
  const weeks=useMemo(()=>{
    const w=[];let d=new Date(startDate);
    for(let i=0;i<totalWeeks;i++){w.push({date:new Date(d),idx:i});d=new Date(d.getTime()+7*24*60*60*1000)}
    return w;
  },[]);

  // Generate months
  const months=useMemo(()=>{
    const m=[];let cur=null;
    weeks.forEach((w,i)=>{
      const mo=w.date.getMonth();const yr=w.date.getFullYear();const key=yr+"-"+mo;
      if(key!==cur){m.push({month:mo,year:yr,startIdx:i,weeks:1,label:(mo+1)+"월"});cur=key}
      else{m[m.length-1].weeks++}
    });
    return m;
  },[weeks]);

  // Group workers by part, filtered
  const groupedWorkers=useMemo(()=>{
    const filtered=(workers||[]).filter(w=>{
      if(teamFilter!=="all"&&TEAM_MAP[w.part_id]!==teamFilter)return false;
      if(partFilter!=="all"&&w.part_id!==partFilter)return false;
      return true;
    });
    const g={};
    filtered.forEach(w=>{
      const pid=w.part_id||"other";
      if(!g[pid])g[pid]=[];
      g[pid].push(w);
    });
    return g;
  },[workers,teamFilter,partFilter]);

  // Map tasks to workers
  const workerTasks=useMemo(()=>{
    const m={};
    (tasks||[]).forEach(t=>{
      if(!t.assignee_id)return;
      if(!m[t.assignee_id])m[t.assignee_id]=[];
      m[t.assignee_id].push(t);
    });
    return m;
  },[tasks]);

  // Position calc
  const dateToX=(date)=>{
    if(!date)return null;
    const d=new Date(date);
    const diff=(d-startDate)/(24*60*60*1000);
    return(diff/7)*weekWidth;
  };

  const todayX=dateToX(new Date());

  // Build rows
  const rows=useMemo(()=>{
    const r=[];
    Object.entries(groupedWorkers).forEach(([pid,wkrs])=>{
      r.push({type:"header",pid,label:PART_LABELS[pid]||pid,count:wkrs.length});
      if(!collapsed[pid]){
        wkrs.forEach(w=>{
          const ts=(workerTasks[w.id]||[]).filter(t=>t.start_date||t.end_date);
          r.push({type:"worker",worker:w,tasks:ts});
        });
      }
    });
    return r;
  },[groupedWorkers,collapsed,workerTasks]);

  const toggleCollapse=(pid)=>setCol(p=>({...p,[pid]:!p[pid]}));

  const teams=[...new Set(Object.values(TEAM_MAP))];
  const availParts=Object.keys(groupedWorkers);

  return<div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
    {/* Filters */}
    <div style={{padding:"12px 16px",borderBottom:"1px solid var(--bd)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
      <span style={{fontSize:14,fontWeight:700}}>간트 차트</span>
      <span style={{fontSize:12,color:"var(--t4)"}}>작업자별 일정</span>
      <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
        <span style={{fontSize:12,color:"var(--t3)"}}>팀:</span>
        <select value={teamFilter} onChange={e=>setTF(e.target.value)} style={{fontSize:12,padding:"4px 8px",border:"1px solid var(--bd)",borderRadius:5,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">전체</option>
          {teams.map(t=><option key={t} value={t}>{t}</option>)}
        </select>
        <span style={{fontSize:12,color:"var(--t3)"}}>파트:</span>
        <select value={partFilter} onChange={e=>setPF(e.target.value)} style={{fontSize:12,padding:"4px 8px",border:"1px solid var(--bd)",borderRadius:5,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">전체</option>
          {Object.keys(PART_LABELS).map(p=><option key={p} value={p}>{PART_LABELS[p]}</option>)}
        </select>
        <div style={{display:"flex",gap:8,marginLeft:12,fontSize:11}}>
          <span><span className="dot" style={{background:BAR_C.progress,marginRight:3,verticalAlign:"middle"}}/>진행</span>
          <span><span className="dot" style={{background:BAR_C.waiting,marginRight:3,verticalAlign:"middle"}}/>대기</span>
          <span><span className="dot" style={{background:BAR_C.done,marginRight:3,verticalAlign:"middle"}}/>완료</span>
        </div>
      </div>
    </div>

    {/* Gantt body */}
    <div className="gantt-wrap">
      {/* Left: names */}
      <div className="gantt-names">
        <div style={{height:48,borderBottom:"1px solid var(--bd)",display:"flex",alignItems:"center",padding:"0 12px",fontSize:12,fontWeight:600,color:"var(--t3)",position:"sticky",top:0,background:"var(--bg)",zIndex:4}}>작업자</div>
        {rows.map((r,i)=>r.type==="header"?
          <div key={"h"+r.pid} className="gantt-name part-header" onClick={()=>toggleCollapse(r.pid)}>
            <span style={{marginRight:6}}>{collapsed[r.pid]?"▶":"▼"}</span>{r.label} ({r.count})
          </div>:
          <div key={"w"+r.worker.id} className="gantt-name">
            {r.worker.is_part_lead&&<span style={{color:"var(--or)",marginRight:3}}>★</span>}
            {r.worker.name}
            <span style={{fontSize:10,color:"var(--t4)",marginLeft:4}}>({r.tasks.length})</span>
          </div>
        )}
      </div>

      {/* Right: chart */}
      <div className="gantt-chart" ref={chartRef}>
        {/* Header with months/weeks */}
        <div className="gantt-header" style={{width:totalWidth}}>
          {months.map((m,i)=><div key={i} className="gantt-month" style={{width:m.weeks*weekWidth}}>
            <div className="gantt-month-label">{m.year}년 {m.label}</div>
            <div className="gantt-week-label">{m.weeks}주</div>
          </div>)}
        </div>

        {/* Rows */}
        <div style={{position:"relative",width:totalWidth}}>
          {/* Week grid lines */}
          {weeks.map((w,i)=><div key={i} style={{position:"absolute",left:i*weekWidth,top:0,bottom:0,width:1,height:rows.length*rowH,background:i%4===0?"var(--bd)":"var(--bg3)"}}/>)}

          {/* Milestone lines */}
          {(milestones||[]).map(ms=>{
            const x=dateToX(ms.date);if(x===null||x<0||x>totalWidth)return null;
            const tc=MC[ms.type]||"var(--t4)";
            return<div key={ms.id} style={{position:"absolute",left:x,top:0,height:rows.length*rowH,width:2,background:tc,opacity:.4,zIndex:1}}>
              <div style={{position:"absolute",top:-2,left:4,fontSize:9,fontWeight:600,color:tc,whiteSpace:"nowrap",background:"rgba(255,255,255,.8)",padding:"0 3px",borderRadius:2}}>{ms.label}</div>
            </div>
          })}

          {/* Today line */}
          {todayX!==null&&todayX>0&&<div style={{position:"absolute",left:todayX,top:0,height:rows.length*rowH,width:2,background:"var(--rd)",zIndex:2}}>
            <div style={{position:"absolute",top:-2,left:4,fontSize:9,fontWeight:700,color:"var(--rd)",background:"rgba(255,255,255,.9)",padding:"0 4px",borderRadius:2}}>TODAY</div>
          </div>}

          {/* Task bars */}
          {rows.map((r,ri)=>{
            if(r.type==="header")return<div key={"hr"+ri} style={{height:rowH,background:"var(--bg3)",borderBottom:"1px solid var(--bd)"}}/>;
            return<div key={"wr"+ri} className="gantt-row" style={{position:"relative"}}>
              {r.tasks.map((t,ti)=>{
                const x1=dateToX(t.start_date);
                let x2=dateToX(t.end_date);
                if(x1===null)return null;
                if(x2===null&&t.estimated_days)x2=x1+(t.estimated_days/7)*weekWidth;
                if(x2===null)x2=x1+weekWidth;
                const w=Math.max(20,x2-x1);
                const bc=BAR_C[t.status]||BAR_C.waiting;
                const cName=t.contents?.name||"";
                return<div key={t.id} className="gantt-bar"
                  style={{left:x1,top:6,width:w,background:bc}}
                  onMouseEnter={e=>setTip({x:e.clientX,y:e.clientY,task:t})}
                  onMouseLeave={()=>setTip(null)}>
                  {w>60?t.task_name:""}</div>
              })}
            </div>
          })}
        </div>
      </div>
    </div>

    {/* Tooltip */}
    {tooltip&&<div className="tooltip" style={{left:tooltip.x+12,top:tooltip.y-10}}>
      <div style={{fontWeight:700,marginBottom:2}}>{tooltip.task.task_name}</div>
      <div style={{fontSize:11,opacity:.8}}>
        {tooltip.task.contents?.name&&<div>콘텐츠: {tooltip.task.contents.name}</div>}
        <div>상태: {SL[tooltip.task.status]||tooltip.task.status}</div>
        {tooltip.task.start_date&&<div>시작: {tooltip.task.start_date}</div>}
        {tooltip.task.end_date&&<div>종료: {tooltip.task.end_date}</div>}
        {tooltip.task.estimated_days&&<div>소요: {tooltip.task.estimated_days}일</div>}
      </div>
    </div>}
  </div>
}

/* ═══ PIPELINE (with split layout) ═══ */
function PipelineView({ct,vr,onRefresh}){
  const[sel,setSel]=useState(null);
  const[tasks,setTasks]=useState([]);
  const[dragId,setDragId]=useState(null);

  const g=useMemo(()=>{const m={};GATES.forEach(gt=>m[gt.id]=[]);(ct||[]).forEach(c=>{if(m[c.gate])m[c.gate].push(c)});return m},[ct]);

  useEffect(()=>{if(sel?.id){db.tasks(sel.id).then(setTasks).catch(()=>setTasks([]))}else{setTasks([])}},[sel?.id]);

  const onDragStart=(e,item)=>{setDragId(item.id);e.dataTransfer.effectAllowed="move"};
  const onDragEnd=()=>setDragId(null);
  const onDrop=async(e,gateId)=>{
    e.preventDefault();if(!dragId)return;
    const item=ct.find(c=>c.id===dragId);if(!item||item.gate===gateId)return;
    await db.logGate({content_id:item.id,from_gate:item.gate,to_gate:gateId,approved_by:"팀장"});
    await db.updContent(item.id,{gate:gateId,updated_at:new Date().toISOString()});
    setDragId(null);onRefresh();
  };
  const onDragOver=(e)=>{e.preventDefault();e.dataTransfer.dropEffect="move"};

  const chgTaskSt=async(tid,st)=>{await db.updTask(tid,{status:st});setTasks(await db.tasks(sel.id));onRefresh()};
  const fwdGate=async()=>{
    if(!sel)return;const gi=GATES.findIndex(g=>g.id===sel.gate);
    if(gi<GATES.length-1){const nx=GATES[gi+1].id;
      await db.logGate({content_id:sel.id,from_gate:sel.gate,to_gate:nx,approved_by:"팀장"});
      await db.updContent(sel.id,{gate:nx,updated_at:new Date().toISOString()});setSel(null);onRefresh()}};

  return<div className="split">
    <div className="split-left">
      <div className="pp">
        {GATES.map(gt=><div key={gt.id} className="gate-col">
          <div style={{padding:"8px 10px",borderRadius:"var(--r) var(--r) 0 0",marginBottom:4,borderBottom:"3px solid "+gt.c,background:gt.c+"0a"}}>
            <div style={{fontSize:13,fontWeight:700,color:gt.c}}>{gt.l}</div>
            <div style={{fontSize:11,color:"var(--t4)"}}>{gt.s} - {g[gt.id]?.length||0}건</div></div>
          <div className="gate-drop" onDragOver={onDragOver} onDrop={e=>onDrop(e,gt.id)}
            onDragEnter={e=>e.currentTarget.classList.add("over")} onDragLeave={e=>e.currentTarget.classList.remove("over")}>
            {g[gt.id]?.map(c=>{const tm=TM[c.type]||{};const v=vr?.find(x=>x.id===c.version_id);
              return<div key={c.id} className={"cd"+(sel?.id===c.id?" sel":"")+(dragId===c.id?" dragging":"")}
                draggable onDragStart={e=>onDragStart(e,c)} onDragEnd={onDragEnd} onClick={()=>setSel(c)}>
                <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}>
                  <span style={{fontSize:13}}>{tm.i}</span>
                  {v&&<B ch={v.label} c="b-p"/>}
                  {AC[c.alert]&&<B ch={AL[c.alert]} c={AC[c.alert]}/>}
                </div>
                <div style={{fontSize:13,fontWeight:600,color:"var(--t1)",lineHeight:1.3,marginBottom:3}}>{c.name}</div>
                <div style={{fontSize:11,color:"var(--t4)"}}>{c.owner||"미정"}</div>
              </div>})}
          </div>
        </div>)}
      </div>
    </div>

    {/* Right detail panel */}
    <div className={"split-right"+(sel?"":" closed")}>
      {sel&&(()=>{
        const tm=TM[sel.type]||{};const v=vr?.find(x=>x.id===sel.version_id);const gi=GATES.findIndex(g=>g.id===sel.gate);
        const totalDays=tasks.reduce((s,t)=>s+(t.estimated_days||0),0);
        return<div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div style={{fontSize:16,fontWeight:700,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
              <span>{tm.i}</span>{sel.name}
            </div>
            <button onClick={()=>setSel(null)} style={{background:"none",border:"none",fontSize:18,color:"var(--t4)",cursor:"pointer"}}>✕</button>
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
            {v&&<B ch={v.label+" · "+v.target_date} c="b-p"/>}
            {AC[sel.alert]&&<B ch={AL[sel.alert]} c={AC[sel.alert]}/>}
            <B ch={"P"+sel.priority} c="b-x"/>
          </div>
          <div style={{fontSize:12,color:"var(--t3)",marginBottom:12}}>담당: {sel.owner||"미정"} · {sel.doc_status} · 총 {totalDays}일</div>

          {/* Gate progress + forward */}
          <div style={{display:"flex",gap:2,marginBottom:8}}>{GATES.map((g,i)=><div key={g.id} style={{flex:1,height:4,borderRadius:2,background:i<=gi?g.c:"var(--bg3)"}}/>)}</div>
          {gi<GATES.length-1&&<button className="bt bt-g" onClick={fwdGate} style={{width:"100%",marginBottom:12}}>{GATES[gi+1].l}로 전환 →</button>}

          {/* Tasks */}
          <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>태스크 ({tasks.length})</div>
          {tasks.length===0?<div style={{fontSize:12,color:"var(--t4)",padding:8}}>등록된 태스크 없음</div>:
            tasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderBottom:"1px solid var(--bg3)"}}>
              <D s={t.status}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,color:"var(--t2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.task_name}</div>
                <div style={{fontSize:10,color:"var(--t4)"}}>{t.part_id} · {t.estimated_days||"?"}일</div>
              </div>
              <select value={t.status} onChange={e=>chgTaskSt(t.id,e.target.value)} style={{fontSize:11,padding:"2px 4px",border:"1px solid var(--bd)",borderRadius:3,background:"var(--bg)",fontFamily:"inherit"}}>
                <option value="waiting">대기</option><option value="progress">진행</option><option value="done">완료</option><option value="blocked">차단</option></select>
            </div>)}
        </div>
      })()}
    </div>
  </div>
}

/* ═══ ADD FORM ═══ */
function AddForm({vr,onDone}){
  const[f,setF]=useState({name:"",type:"field",gate:"G0",version_id:"launch",owner:"",priority:2,doc_status:"개발 전",alert:"none"});
  const[msg,setMsg]=useState("");const[sv,setSv]=useState(false);
  const go=async()=>{if(!f.name.trim()){setMsg("콘텐츠명 입력");return}setSv(true);setMsg("");try{await db.addContent(f);setMsg("등록 완료!");setF({...f,name:"",owner:""});onDone()}catch(e){setMsg("오류: "+e.message)}setSv(false)};
  return<div style={{padding:20}}><div style={{fontSize:17,fontWeight:700,marginBottom:14}}>새 콘텐츠 등록</div>
    <div className="fg">
      <div><label>콘텐츠명 *</label><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="예: 시즌3 현상수배"/></div>
      <div><label>담당자</label><input value={f.owner} onChange={e=>setF({...f,owner:e.target.value})} placeholder="예: 남경훈"/></div>
      <div><label>유형</label><select value={f.type} onChange={e=>setF({...f,type:e.target.value})}>{Object.entries(TM).map(([k,v])=><option key={k} value={k}>{v.i} {v.l}</option>)}</select></div>
      <div><label>Gate</label><select value={f.gate} onChange={e=>setF({...f,gate:e.target.value})}>{GATES.map(g=><option key={g.id} value={g.id}>{g.l}</option>)}</select></div>
      <div><label>목표 버전</label><select value={f.version_id} onChange={e=>setF({...f,version_id:e.target.value})}>{(vr||[]).map(v=><option key={v.id} value={v.id}>{v.label} ({v.target_date})</option>)}</select></div>
      <div><label>우선순위</label><select value={f.priority} onChange={e=>setF({...f,priority:+e.target.value})}><option value={1}>1 - 최우선</option><option value={2}>2 - 높음</option><option value={3}>3 - 보통</option></select></div>
    </div>
    <div className="fa"><button className="bt bt-g" onClick={go} disabled={sv}>{sv?"저장 중...":"등록하기"}</button>{msg&&<span style={{fontSize:13,color:msg.includes("오류")?"var(--rd)":"var(--gn)"}}>{msg}</span>}</div></div>
}

/* ═══ MAIN ═══ */
function App(){
  const[view,setV]=useState("pipeline");
  const[ct,setCt]=useState([]);const[vr,setVr]=useState([]);const[ms,setMs]=useState([]);const[wk,setWk]=useState([]);const[allT,setAllT]=useState([]);
  const[ld,setLd]=useState(true);const[err,setErr]=useState(null);const[fv,setFv]=useState("all");

  const load=useCallback(async()=>{setLd(true);setErr(null);try{
    const[v,c,m,w,t]=await Promise.all([db.versions(),db.contents(),db.milestones().catch(()=>[]),db.workers().catch(()=>[]),db.allTasks().catch(()=>[])]);
    setVr(v||[]);setCt(c||[]);setMs(m||[]);setWk(w||[]);setAllT(t||[]);
  }catch(e){setErr(e.message)}setLd(false)},[]);
  useEffect(()=>{load()},[load]);

  const fc=useMemo(()=>fv==="all"?ct:ct.filter(c=>c.version_id===fv),[ct,fv]);
  const st=useMemo(()=>({t:ct.length,cr:ct.filter(c=>c.alert==="critical").length,w:ct.filter(c=>c.alert==="warning").length}),[ct]);

  return<div className="app">
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8,flexShrink:0}}>
      <div><h1 style={{fontSize:20,fontWeight:800,letterSpacing:"-.5px"}}>Kingsroad Pipeline Tracker<em style={{fontStyle:"normal",fontSize:11,color:"var(--gn)",fontWeight:500,marginLeft:8}}>● LIVE</em></h1>
        <div style={{fontSize:12,color:"var(--t3)",marginTop:1}}>{ct.length} 콘텐츠 · {wk.length} 작업자 · {allT.length} 태스크</div></div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        {st.cr>0&&<B ch={"위험 "+st.cr} c="b-r"/>}{st.w>0&&<B ch={"주의 "+st.w} c="b-o"/>}<B ch={st.t+" 콘텐츠"} c="b-g"/>
        <button className="bt bt-i" onClick={load}>↻</button></div></div>

    {/* Nav */}
    <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap",alignItems:"center",flexShrink:0}}>
      {[{id:"pipeline",l:"파이프라인"},{id:"gantt",l:"간트 차트"},{id:"add",l:"+ 등록"}].map(v=>
        <button key={v.id} className={"bt"+(view===v.id?" on":"")} onClick={()=>setV(v.id)}>{v.l}</button>)}
      {view==="pipeline"&&<div style={{marginLeft:"auto",display:"flex",gap:4}}>
        <button className={"bt bt-s"+(fv==="all"?" on":"")} onClick={()=>setFv("all")}>전체</button>
        {vr.slice(0,6).map(v=><button key={v.id} className={"bt bt-s"+(fv===v.id?" on":"")} onClick={()=>setFv(v.id)}>{v.label}</button>)}</div>}
    </div>

    {/* Content */}
    <div className="pn">
      {ld?<div style={{textAlign:"center",padding:60,fontSize:15,color:"var(--t3)"}}>데이터를 불러오는 중...</div>:
       err?<div style={{padding:24}}><h3 style={{color:"var(--rd)"}}>연결 오류</h3><p style={{color:"var(--t3)",marginTop:4}}>{err}</p></div>:<>
        {view==="pipeline"&&<PipelineView ct={fc} vr={vr} onRefresh={load}/>}
        {view==="gantt"&&<GanttView tasks={allT} workers={wk} milestones={ms} parts={null} contents={ct}/>}
        {view==="add"&&<AddForm vr={vr} onDone={load}/>}
      </>}
    </div>
  </div>
}
ReactDOM.render(<App/>,document.getElementById("app"));
</script>
</body></html>

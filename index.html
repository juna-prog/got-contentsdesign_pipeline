      // content-level Epic 생성 요청 로그 1건
      const defSummary="[Epic] "+(content?.name||"")+" ("+(tm.l||content?.type||"")+")";
      const defDesc="## 콘텐츠\n"+(content?.name||"")+" ("+(tm.l||content?.type||"")+")\n\n## 목표 버전\n"+(ver?.label||"")+" ("+(ver?.target_date||"")+")\n\n## 파이프라인 트래커\n"+trackerUrl+"\n\n---\n_파이프라인 트래커에서 자동 생성 요청된 Epic._";
      const rawDesc=epicDesc||defDesc;
      const merged=mergeFields(null,["epic"]);
      const fields={
        project:{key:selTpl?.project_key||"PROJECTT"},
        issuetype:{name:"Epic"},
        summary:epicSummary||defSummary,
        description:formatJiraDescription(rawDesc),
        priority:merged.priority,
        labels:merged.labels.length?merged.labels:["auto-generated","from-tracker","epic"],
        reporter:{name:reporterUsername}
      };
      if(merged.components.length)fields.components=merged.components;
      if(merged.fixVersions.length)fields.fixVersions=merged.fixVersions;
      const payload={fields};
      await db.addJiraLog({
        task_id:null,
        content_id:content.id,
        template_key:"epic",
        created_by:user.name,
        payload:payload,
        status:"pending",
        operation_type:"create_epic",
        target_epic_key:null
      });
      res.push({task_id:null,title:"[Epic] "+(content?.name||""),payload,status:"pending"});
    }else{
      if(checkedTasks.length===0){setCreating(false);return}
      // Sub-Task 2모드 검증
      if(subParentMode==="epic_link"&&!content?.jira_epic_key){
        alert("Epic Link 모드는 콘텐츠에 Epic 키가 등록된 후 가능합니다.\n부모 Task 모드로 전환하거나 Epic 키를 먼저 등록하세요.");
        setCreating(false);return
      }
      if(subParentMode==="parent_task"){
        const noParent=checkedTasks.filter(t=>{
          const pid=t.parent_task_id;
          if(!pid)return true;
          const pt=(allTasks||[]).find(x=>x.id===pid);
          return !pt?.jira_url;
        });
        if(noParent.length>0){
          alert("부모 Task 모드: 선택한 "+noParent.length+"건의 태스크에 JIRA 연결된 부모 Task 가 없습니다.\n- 부모 Task 가 먼저 JIRA 에 등록되어야 합니다.");
          setCreating(false);return
        }
      }
      for(const task of checkedTasks){
        const preview=renderPreview(task);
        const w=workers?.find(x=>x.id===task.assignee_id);
        const assigneeUsername=w?.jira_account_id||"";
        // 부모 지정 방식 결정
        let targetEpic=null, parentTaskKey=null;
        if(subParentMode==="epic_link"){
          targetEpic=content.jira_epic_key;
        }else{
          const pt=(allTasks||[]).find(x=>x.id===task.parent_task_id);
          // jira_url 마지막 세그먼트 = key (예: .../PROJECTT-38075 -> PROJECTT-38075)
          parentTaskKey=pt?.jira_url?String(pt.jira_url).split("/").pop():null;
        }
        const merged=mergeFields(task,[]);
        const fields={
          project:{key:selTpl?.project_key||"PROJECTT"},
          issuetype:{name: subParentMode==="parent_task"?"Sub-Task":(selTpl?.issue_type||"Task")},
          summary:preview.summary,
          description:formatJiraDescription(preview.description),
          priority:merged.priority,
          labels:merged.labels.length?merged.labels:["auto-generated","from-tracker"],
          reporter:{name:reporterUsername}
        };
        if(merged.components.length)fields.components=merged.components;
        if(merged.fixVersions.length)fields.fixVersions=merged.fixVersions;
        if(assigneeUsername)fields.assignee={name:assigneeUsername};
        if(parentTaskKey)fields.parent={key:parentTaskKey};
        // Epic Link 은 customfield_10008 (JIRA 설정별 상이). operator 가 최종 주입
        const payload={fields,_subtask_mode:subParentMode};
        await db.addJiraLog({
          task_id:task.id,
          content_id:content.id,
          template_key:selTpl?.template_key||"default",
          created_by:user.name,
          payload:payload,
          status:"pending",
          operation_type:"create_subtask",
          target_epic_key:targetEpic
        });
        res.push({task_id:task.id,title:task.title,payload,status:"pending"});
      }
    }
    setResults(res);
    setCreating(false);
  };

  if(results){
    return<div className="modal-bg" onClick={onClose}>
      <div className="modal" style={{minWidth:480}} onClick={e=>e.stopPropagation()}>
        <div className="modal-h">{mode==="epic"?"Epic 생성 요청 완료":"Sub-Task 생성 요청 완료"}</div>
        <div className="modal-b">
          <div style={{fontSize:12,color:"var(--t3)",marginBottom:12}}>
            {results.length}건의 JIRA {mode==="epic"?"Epic":"Sub-Task"} 생성 요청이 대기열에 등록되었습니다.
            <br/>operator(Claude + mcp__jira)가 배치로 처리 후, {mode==="epic"?"Epic 키가 콘텐츠에 자동 입력":"tasks.jira_url 이 자동 연결"}됩니다.
            <br/><span style={{color:"var(--t4)",fontSize:11}}>대기 상태는 콘텐츠 상세/태스크 행의 ⏳ 배지로 표시됩니다.</span>
          </div>
          {results.map((r,i)=><div key={i} style={{padding:"6px 10px",background:"var(--bg3)",borderRadius:6,marginBottom:4,fontSize:12}}>
            <div style={{fontWeight:600,color:"var(--t1)"}}>{r.payload.fields.summary}</div>
            <div style={{color:"var(--t4)",marginTop:2}}>Project: {r.payload.fields.project.key} / Type: {r.payload.fields.issuetype.name}</div>
          </div>)}
        </div>
        <div className="modal-f">
          <button className="bt bt-g" onClick={onClose}>확인</button>
        </div>
      </div>
    </div>;
  }

  const curTask=checkedTasks[previewIdx]||checkedTasks[0];
  const curPreview=curTask?renderPreview(curTask):{summary:"",description:""};

  return<div className="modal-bg" onClick={onClose}>
    <div className="modal" style={{minWidth:560,maxWidth:640}} onClick={e=>e.stopPropagation()}>
      <div className="modal-h" style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <span>JIRA 일감 생성 미리보기</span>
        <span style={{fontSize:11,color:"var(--t4)"}}>{content?.name}</span>
      </div>
      <div className="modal-b" style={{maxHeight:"60vh",overflow:"auto"}}>
        {/* Mode tabs - Phase 6 */}
        <div className="tab-row" style={{marginBottom:10}}>
          <button className={mode==="epic"?"on":""} onClick={()=>setMode("epic")}>🎯 Epic 생성</button>
          <button className={mode==="subtask"?"on":""} onClick={()=>setMode("subtask")}>📌 Sub-Task 생성</button>
          <span style={{marginLeft:"auto",fontSize:11,color:"var(--t4)",alignSelf:"center"}}>
            {content?.jira_epic_key?<>Epic: <span style={{color:"var(--ac)",fontWeight:600}}>{content.jira_epic_key}</span></>:<span style={{color:"var(--or)"}}>Epic 미등록</span>}
          </span>
        </div>

        {/* Sub-Task 부모 지정 모드 - Phase 6 P1 */}
        {mode==="subtask"&&<div style={{marginBottom:10,padding:"8px 10px",background:"var(--bg3)",borderRadius:6,border:"1px solid var(--bd)"}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--t2)",marginBottom:6}}>부모 지정 방식</div>
          <div style={{display:"flex",gap:16,fontSize:12}}>
            <label style={{display:"flex",alignItems:"center",gap:4,cursor: content?.jira_epic_key?"pointer":"not-allowed",opacity:content?.jira_epic_key?1:0.4}}>
              <input type="radio" name="subParentMode" value="epic_link" checked={subParentMode==="epic_link"}
                disabled={!content?.jira_epic_key}
                onChange={()=>setSubParentMode("epic_link")}/>
              🎯 Epic Link {content?.jira_epic_key?<span style={{color:"var(--t4)",fontSize:11}}>({content.jira_epic_key})</span>:<span style={{color:"var(--or)",fontSize:11}}>(Epic 키 필요)</span>}
            </label>
            <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
              <input type="radio" name="subParentMode" value="parent_task" checked={subParentMode==="parent_task"}
                onChange={()=>setSubParentMode("parent_task")}/>
              📋 부모 Task <span style={{color:"var(--t4)",fontSize:11}}>(각 태스크의 parent_task_id 의 JIRA)</span>
            </label>
          </div>
        </div>}

        {/* Template selector */}
        <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
          <label style={{fontSize:12,color:"var(--t3)",fontWeight:500}}>템플릿:</label>
          <select value={selTpl?.id||""} onChange={e=>{const t=templates.find(x=>String(x.id)===e.target.value);if(t)setSelTpl(t)}}
            style={{fontSize:12,padding:"4px 8px",border:"1px solid var(--bd)",borderRadius:4,fontFamily:"inherit"}}>
            {templates.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
          </select>
        </div>

        {/* Epic mode - single Epic payload preview */}
        {mode==="epic"&&(()=>{
          const defSum="[Epic] "+(content?.name||"")+" ("+(tm.l||content?.type||"")+")";
          const defDesc="## 콘텐츠\n"+(content?.name||"")+" ("+(tm.l||content?.type||"")+")\n\n## 목표 버전\n"+(ver?.label||"")+" ("+(ver?.target_date||"")+")\n\n## 파이프라인 트래커\n"+trackerUrl+"\n\n---\n_파이프라인 트래커에서 자동 생성 요청된 Epic._";
          const m=mergeFields(null,["epic"]);
          const labelsView=m.labels.length?m.labels.join(", "):"auto-generated, from-tracker, epic";
          const compView=m.components.map(c=>c.name).join(", ");
          const fvView=m.fixVersions.map(f=>f.name).join(", ");
          return<div style={{border:"1px solid var(--bd)",borderRadius:8,overflow:"hidden",marginBottom:12}}>
            <div style={{padding:"8px 12px",background:"var(--bg3)",fontSize:11,fontWeight:600,color:"var(--t2)"}}>
              Epic 생성 요청 (operator 처리 후 Epic 키가 콘텐츠에 자동 입력됩니다)
              {sprintCfg&&<span style={{fontSize:10,color:"var(--t4)",fontWeight:400,marginLeft:8}}>· sprint_config: {sprintCfg.fix_version||sprintCfg.jira_sprint_name||"-"}</span>}
            </div>
            <div style={{padding:12}}>
              <div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:"6px 8px",fontSize:12,marginBottom:10}}>
                <span style={{color:"var(--t4)",fontWeight:500}}>Project</span><span>{selTpl?.project_key||"PROJECTT"}</span>
                <span style={{color:"var(--t4)",fontWeight:500}}>Type</span><span>Epic</span>
                <span style={{color:"var(--t4)",fontWeight:500}}>Priority</span><span>{m.priority.name}</span>
                <span style={{color:"var(--t4)",fontWeight:500}}>Labels</span><span>{labelsView}</span>
                {compView&&<><span style={{color:"var(--t4)",fontWeight:500}}>Components</span><span>{compView}</span></>}
                {fvView&&<><span style={{color:"var(--t4)",fontWeight:500}}>Fix Versions</span><span>{fvView}</span></>}
              </div>
              <div style={{marginBottom:8}}>
                <label style={{fontSize:11,color:"var(--t4)",fontWeight:500}}>Summary</label>
                <input value={epicSummary||defSum} onChange={e=>setEpicSummary(e.target.value)}
                  style={{width:"100%",fontSize:12,padding:"6px 10px",border:"1px solid var(--bd)",borderRadius:4,fontFamily:"inherit",marginTop:3}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"var(--t4)",fontWeight:500}}>Description</label>
                <textarea value={epicDesc||defDesc} onChange={e=>setEpicDesc(e.target.value)}
                  style={{width:"100%",minHeight:120,fontSize:11,padding:"6px 10px",border:"1px solid var(--bd)",borderRadius:4,fontFamily:"inherit",resize:"vertical",marginTop:3,lineHeight:1.5}}/>
              </div>
            </div>
          </div>;
        })()}

        {/* Already linked */}
        {mode==="subtask"&&linkedTasks.length>0&&<div style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:600,color:"var(--gn)",marginBottom:4}}>JIRA 연결됨 ({linkedTasks.length}건)</div>
          {linkedTasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",fontSize:11,color:"var(--t3)"}}>
            <span style={{color:"var(--gn)"}}>&#10003;</span>
            <span>{t.title}</span>
            <a href={t.jira_url} target="_blank" rel="noopener" style={{color:"var(--ac)",fontSize:10}}>{t.jira_url?.split("/").pop()}</a>
          </div>)}
        </div>}

        {/* Eligible tasks checkboxes */}
        {mode==="subtask"&&(eligibleTasks.length>0?<>
          <div style={{fontSize:11,fontWeight:600,color:"var(--t2)",marginBottom:6}}>생성 대상 ({checkedTasks.length}/{eligibleTasks.length}건 선택)</div>
          <div style={{marginBottom:12,maxHeight:140,overflow:"auto",border:"1px solid var(--bd)",borderRadius:6,padding:6}}>
            {eligibleTasks.map((t,i)=>{
              const w=workers?.find(x=>x.id===t.assignee_id);
              const hasJiraUser=!!w?.jira_account_id;
              const pt=(allTasks||[]).find(x=>x.id===t.parent_task_id);
              const parentKey=pt?.jira_url?String(pt.jira_url).split("/").pop():null;
              const parentMissing=subParentMode==="parent_task"&&!parentKey;
              return<label key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",fontSize:12,cursor:"pointer",
                background:curTask?.id===t.id?"var(--ac-bg)":"transparent",borderRadius:4,paddingLeft:4}}
                onClick={()=>setPreviewIdx(eligibleTasks.indexOf(t))}>
                <input type="checkbox" checked={!!checked[t.id]} onChange={e=>{setChecked(p=>({...p,[t.id]:e.target.checked}))}} style={{accentColor:"var(--ac)"}}/>
                <D s={t.status}/>
                <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</span>
                {!hasJiraUser&&w&&<span style={{fontSize:10,color:"var(--or)"}} title={"JIRA username 미매핑: "+w.name}>⚠️</span>}
                {subParentMode==="parent_task"&&(parentKey?
                  <span style={{fontSize:10,color:"var(--gn)"}} title={"부모: "+parentKey}>▶{parentKey.split("-").pop()}</span>
                  :<span style={{fontSize:10,color:"var(--rd)"}} title="부모 Task 의 JIRA 연결 없음">✕</span>)}
                <span style={{fontSize:10,color:"var(--t4)"}}>{t.days||"?"}일</span>
              </label>;
            })}
          </div>

          {/* Preview for selected task */}
          {curTask&&<div style={{border:"1px solid var(--bd)",borderRadius:8,overflow:"hidden"}}>
            <div style={{padding:"8px 12px",background:"var(--bg3)",fontSize:11,fontWeight:600,color:"var(--t2)",display:"flex",justifyContent:"space-between"}}>
              <span>미리보기: {curTask.title}</span>
              {checkedTasks.length>1&&<div style={{display:"flex",gap:4}}>
                <button className="bt bt-s" disabled={previewIdx<=0} onClick={()=>setPreviewIdx(p=>p-1)} style={{padding:"1px 6px"}}>&#9664;</button>
                <span style={{fontSize:10,color:"var(--t4)",lineHeight:"22px"}}>{previewIdx+1}/{checkedTasks.length}</span>
                <button className="bt bt-s" disabled={previewIdx>=checkedTasks.length-1} onClick={()=>setPreviewIdx(p=>p+1)} style={{padding:"1px 6px"}}>&#9654;</button>
              </div>}
            </div>
            <div style={{padding:12}}>
              {(()=>{
                const w=workers?.find(x=>x.id===curTask.assignee_id);
                const pt=(allTasks||[]).find(x=>x.id===curTask.parent_task_id);
                const parentKey=pt?.jira_url?String(pt.jira_url).split("/").pop():null;
                const typeLabel=subParentMode==="parent_task"?"Sub-Task":(selTpl?.issue_type||"Task");
                const parentHint=subParentMode==="parent_task"
                  ?(parentKey?parentKey:<span style={{color:"var(--rd)"}}>미연결</span>)
                  :(content?.jira_epic_key||<span style={{color:"var(--or)"}}>Epic 미등록</span>);
                const m=mergeFields(curTask,[]);
                const wt=resolveWorkType(curTask);
                const compView=m.components.map(c=>c.name).join(", ");
                const fvView=m.fixVersions.map(f=>f.name).join(", ");
                return<div style={{display:"grid",gridTemplateColumns:"80px 1fr",gap:"6px 8px",fontSize:12,marginBottom:10}}>
                  <span style={{color:"var(--t4)",fontWeight:500}}>Project</span><span>{selTpl?.project_key||"PROJECTT"}</span>
                  <span style={{color:"var(--t4)",fontWeight:500}}>Type</span><span>{typeLabel}</span>
                  <span style={{color:"var(--t4)",fontWeight:500}}>Parent</span><span>{parentHint}</span>
                  <span style={{color:"var(--t4)",fontWeight:500}}>Assignee</span>
                  <span>{w?.jira_account_id
                    ?<>{w.jira_account_id} <span style={{color:"var(--t4)",fontSize:11}}>({w.name})</span></>
                    :<span style={{color:"var(--or)"}}>⚠️ {w?.name||"미배정"} - JIRA username 미매핑</span>}</span>
                  <span style={{color:"var(--t4)",fontWeight:500}}>Reporter</span><span>{reporterUsername} <span style={{color:"var(--t4)",fontSize:11}}>({content?.owner||"기본 juna"})</span></span>
                  <span style={{color:"var(--t4)",fontWeight:500}}>Priority</span><span>{m.priority.name}{curTask?.priority&&<span style={{color:"var(--t4)",fontSize:11}}> (task)</span>}</span>
                  <span style={{color:"var(--t4)",fontWeight:500}}>Labels</span><span>{m.labels.join(", ")}</span>
                  {wt&&<><span style={{color:"var(--t4)",fontWeight:500}}>Work Type</span><span>{wt.label}{wt.default_est_days!=null&&<span style={{color:"var(--t4)",fontSize:11}}> (권장 {wt.default_est_days}일)</span>}</span></>}
                  {compView&&<><span style={{color:"var(--t4)",fontWeight:500}}>Components</span><span>{compView}</span></>}
                  {fvView&&<><span style={{color:"var(--t4)",fontWeight:500}}>Fix Versions</span><span>{fvView}</span></>}
                </div>;
              })()}
              <div style={{marginBottom:8}}>
                <label style={{fontSize:11,color:"var(--t4)",fontWeight:500}}>Summary</label>
                <input value={curPreview.summary} onChange={e=>setEditSummary(p=>({...p,[curTask.id]:e.target.value}))}
                  style={{width:"100%",fontSize:12,padding:"6px 10px",border:"1px solid var(--bd)",borderRadius:4,fontFamily:"inherit",marginTop:3}}/>
              </div>
              <div>
                <label style={{fontSize:11,color:"var(--t4)",fontWeight:500}}>Description</label>
                <textarea value={curPreview.description} onChange={e=>setEditDesc(p=>({...p,[curTask.id]:e.target.value}))}
                  style={{width:"100%",minHeight:120,fontSize:11,padding:"6px 10px",border:"1px solid var(--bd)",borderRadius:4,fontFamily:"inherit",resize:"vertical",marginTop:3,lineHeight:1.5}}/>
              </div>
            </div>
          </div>}
        </>:<div style={{fontSize:12,color:"var(--t4)",padding:12,textAlign:"center"}}>모든 태스크가 이미 JIRA에 연결되어 있습니다.</div>)}
      </div>
      <div className="modal-f">
        <button className="bt" onClick={onClose}>취소</button>
        {mode==="epic"?
          <button className="bt bt-g" disabled={creating} onClick={handleCreate}>
            {creating?"생성 중...":"🎯 Epic 생성 요청"}
          </button>
          :
          (()=>{
            const epicModeBlocked=subParentMode==="epic_link"&&!content?.jira_epic_key;
            const parentBlocked=subParentMode==="parent_task"&&checkedTasks.some(t=>{
              const pt=(allTasks||[]).find(x=>x.id===t.parent_task_id);
              return !pt?.jira_url;
            });
            const disabled=creating||checkedTasks.length===0||epicModeBlocked||parentBlocked;
            const title=epicModeBlocked?"Epic 키가 등록되어야 합니다"
              :parentBlocked?"일부 태스크의 부모 Task 에 JIRA 가 연결되어 있지 않습니다":"";
            return<button className="bt bt-g" disabled={disabled} onClick={handleCreate} title={title}>
              {creating?"생성 중...":"📌 Sub-Task 생성 요청 ("+checkedTasks.length+"건, "+(subParentMode==="parent_task"?"부모 Task":"Epic Link")+")"}
            </button>;
          })()
        }
      </div>
    </div>
  </div>;
}

/* ═══ REASON MODAL ═══ */
function ReasonModal({title,oldVal,newVal,onSave,onClose}){
  const[reason,setReason]=useState("");
  return<div className="modal-bg" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-h">{title}</div>
      <div className="modal-b">
        <div style={{fontSize:12,color:"var(--t3)",marginBottom:8}}>변경 내용</div>
        <div style={{fontSize:13,padding:"8px 12px",background:"var(--bg3)",borderRadius:6,marginBottom:14}}>
          <span style={{color:"var(--t4)"}}>{oldVal||"(없음)"}</span>
          <span style={{margin:"0 8px",color:"var(--t4)"}}>→</span>
          <span style={{color:"var(--ac)",fontWeight:600}}>{newVal||"(없음)"}</span>
        </div>
        <div style={{fontSize:12,color:"var(--t3)",marginBottom:6}}>변경 사유 <span style={{color:"var(--rd)"}}>*</span></div>
        <textarea autoFocus value={reason} onChange={e=>setReason(e.target.value)} placeholder="예: 시나리오 검수 지연으로 일정 조정"
          style={{width:"100%",minHeight:80,fontSize:13,padding:"9px 12px",border:"1px solid var(--bd)",borderRadius:6,fontFamily:"inherit",resize:"vertical"}}/>
      </div>
      <div className="modal-f">
        <button className="bt" onClick={onClose}>취소</button>
        <button className="bt bt-g" disabled={!reason.trim()} onClick={()=>onSave(reason.trim())}>저장</button>
      </div>
    </div>
  </div>
}

/* ═══ TASK DETAIL PANEL (v22 Track 6: 우측 화면분할, JIRA Issue Drawer 스타일) ═══ */
/* GanttView / TaskSheet task 클릭 시 우측 패널 열림. URL hash #task=N 동기. */
function TaskDetailPanel({taskId,allTasks,workers,contents,user,onClose,onRefresh}){
  const task=useMemo(()=>(allTasks||[]).find(t=>t.id===taskId),[allTasks,taskId]);
  const[history,setHistory]=useState([]);
  const[histLoading,setHistLoading]=useState(false);
  const[showRequest,setShowRequest]=useState(false);
  const[showDirect,setShowDirect]=useState(false);
  const[showNewSub,setShowNewSub]=useState(false);
  const[showDelete,setShowDelete]=useState(false);
  const[showConnectJira,setShowConnectJira]=useState(false);
  useEffect(()=>{
    if(!task){setHistory([]);return}
    setHistLoading(true);
    db.taskChanges(task.id).then(r=>{setHistory(r||[]);setHistLoading(false)}).catch(()=>{setHistory([]);setHistLoading(false)});
  },[task?.id]);
  useEffect(()=>{
    const onKey=e=>{if(e.key==="Escape")onClose()};

  if(!task)return<div style={{flexShrink:0,flexBasis:"34%",minWidth:340,maxWidth:720,background:"#fff",border:"1px solid var(--bd)",borderRadius:"var(--r)",boxShadow:"var(--sh)",padding:20,fontSize:13,color:"var(--t3)",display:"flex",flexDirection:"column",height:"100%",overflow:"auto"}}>

      <span style={{fontWeight:700}}>태스크 상세</span>
      <button onClick={onClose} style={{background:"none",border:"none",fontSize:18,cursor:"pointer",color:"var(--t3)"}}>✕</button>
    </div>

  </div>;
  const wMap={};(workers||[]).forEach(w=>wMap[w.id]=w);
  const cMap={};(contents||[]).forEach(c=>cMap[c.id]=c);
  const assignee=wMap[task.assignee_id]||{name:task.workers?.name||"미배정"};
  const content=cMap[task.content_id]||task.contents||{};
  const parent=task.parent_task_id?(allTasks||[]).find(t=>t.id===task.parent_task_id):null;
  const subTasks=(allTasks||[]).filter(t=>t.parent_task_id===task.id);
  const isMyTask=user&&task.assignee_id===user.id;
  const isAdmin=user&&(user.is_team_lead||user.is_lead);
  const isDone=task.status==='done';
  // v22 Track A: + Sub-Task 추가 권한 = 관리자 + 본인 owner (parent 인 경우)
  const canAddSub=isAdmin||isMyTask;
  // v22 Track A-3: 삭제 권한 = 관리자만 (본인 owner 도 1차 시안에서는 제외, 이력 보존)
  const canDelete=isAdmin&&!isDone;
  // v22 Track A-4: 기존 task JIRA 일감 연결 = jira_url 없을 때 + 관리자 또는 본인 owner
  const canConnectJira=!task.jira_url&&(isAdmin||isMyTask)&&!isDone;
  const STATUS_L={waiting:"대기",progress:"진행 중",done:"완료",blocked:"차단"};
  const STATUS_C={waiting:"#6b7280",progress:"#0891b2",done:"#059669",blocked:"#dc2626"};

  const jiraKey=(()=>{const m=String(task.jira_url||'').match(/([A-Z]+-\d+)/);return m?m[1]:null})();
  return<>
    {/* v22 Track 8 사용성 후속: 분할 레이아웃 (메인 2/3 + 패널 1/3). fixed overlay 폐기 */}
    <div style={{flexShrink:0,flexBasis:"34%",minWidth:340,maxWidth:720,background:"#fff",border:"1px solid var(--bd)",borderRadius:"var(--r)",boxShadow:"var(--sh)",display:"flex",flexDirection:"column",fontSize:13,height:"100%",overflow:"hidden"}}>

      </div>
      {/* Body (scroll) */}
      <div style={{flex:1,overflow:"auto",padding:"12px 14px"}}>

                <span style={{color:"var(--t4)",fontSize:10}}>{stAssignee.name||"-"}</span>
                <span style={{color:"var(--t4)",fontSize:10,minWidth:90,textAlign:"right"}}>{st.start_date?st.start_date.slice(5,10):"-"} ~ {st.end_date?st.end_date.slice(5,10):"-"}</span>

        {/* Schedule changes history */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--t3)",marginBottom:6}}>변경 이력 {histLoading?"...":"("+history.length+")"}</div>
          {history.length===0&&!histLoading&&<div style={{fontSize:11,color:"var(--t4)",fontStyle:"italic",padding:"6px 0"}}>변경 기록 없음</div>}
          <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:240,overflow:"auto"}}>
            {history.map((h,i)=>{

      <div style={{padding:"10px 14px",borderTop:"1px solid var(--bd)",background:"var(--bg2)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>

        {!isDone&&isAdmin&&<button className="bt bt-s" onClick={()=>setShowDirect(true)} style={{background:"#7c3aed",color:"#fff",borderColor:"#7c3aed"}}>⚡ 직접 조정</button>}
        {canAddSub&&<button className="bt bt-s" onClick={()=>setShowNewSub(true)} style={{background:"#059669",color:"#fff",borderColor:"#059669"}}>+ Sub-Task 추가</button>}
        {canConnectJira&&<button className="bt bt-s" onClick={()=>setShowConnectJira(true)} title="JIRA 일감 생성 + 연결" style={{background:"#0052cc",color:"#fff",borderColor:"#0052cc"}}>🎫 JIRA 연결</button>}
        {canDelete&&<button className="bt bt-s" onClick={()=>setShowDelete(true)} title="태스크 삭제 (관리자)" style={{background:"#fff",color:"#dc2626",borderColor:"#dc2626"}}>🗑 삭제</button>}

    {showRequest&&<ScheduleRequestModal task={task} mode='request' user={user} workers={workers} allTasks={allTasks} zOverride={9999}

    {showDirect&&<ScheduleRequestModal task={task} mode='direct_apply' user={user} workers={workers} allTasks={allTasks} zOverride={9999}
      onClose={()=>setShowDirect(false)}
      onDone={(res)=>{setShowDirect(false);onRefresh&&onRefresh(task.id);const msg="✓ "+(res?.applied||1)+"건 적용"+(res?.jiraQueued?" / JIRA 큐 "+res.jiraQueued+"건":"");window.showToast&&window.showToast(msg)}}/>}
    {showNewSub&&<NewSubTaskModal parentTask={task} user={user} workers={workers} allTasks={allTasks} contents={contents} zOverride={9999}
      onClose={()=>setShowNewSub(false)}
      onDone={(res)=>{setShowNewSub(false);onRefresh&&onRefresh(task.id);const msg="✓ Sub-Task #"+res?.newTaskId+" 등록"+(res?.parentExpanded?" / 부모 일정 자동 확장":"");window.showToast&&window.showToast(msg)}}/>}
    {showDelete&&<DeleteTaskModal task={task} user={user} allTasks={allTasks} zOverride={9999}
      onClose={()=>setShowDelete(false)}

    {showConnectJira&&<ConnectJiraModal task={task} user={user} workers={workers} contents={contents} parentTask={parent} zOverride={9999}
      onClose={()=>setShowConnectJira(false)}
      onDone={(res)=>{setShowConnectJira(false);onRefresh&&onRefresh(task.id);window.showToast&&window.showToast("🎫 JIRA 연결 "+(res?.jiraKey||""))}}/>}
  </>;

/* ═══ JIRA prefill 자산 (v22 Track A-2, 메모리 reference_jira_operations + project_alup01_jira_bulk 기반) ═══ */
const JIRA_BASE="https://jira.nmn.io";
const JIRA_PROJECT_KEY="PROJECTT";
// customfield IDs (PROJECTT, classic JIRA Server)
const JIRA_CF_SPRINT="customfield_13100";
const JIRA_CF_EPIC="customfield_13101";
// 워커 이름 → JIRA username 매핑 (9명, 메모리 reference_jira_operations 자산)
const WORKER_JIRA_MAP={"박찬현":"chanhyun","정하진":"hajin","곽명준":"myungjun","최중훈":"joonghoon","윤경열":"kyoungyeol","안태경":"taegyeong","권재만":"jaemann","임주원":"imjuwon","정성민":"sungmin.jung"};
// version_id → JIRA fixVersion / sprint / epic 매핑 (UP01 만 확정, 나머지는 사용자 1회 캡처 후 확장)
const VERSION_JIRA_MAP={"UP01":{fixVersion:73046,sprint:5745,epic:"PROJECTT-16638",label:"[AL01]_스톰랜드지역확장",component:31125}};
function buildJiraCreateUrl({parentTask,newTaskTitle,newTaskStart,newTaskEnd,assigneeWorker,versionId,actionVerb,reason,content}){
  const params=new URLSearchParams();
  params.set("pname",JIRA_PROJECT_KEY); // JIRA Server name 기반 project (pid 숫자 불필요)
  params.set("summary",newTaskTitle);
  const descLines=[
    "부모 task: #"+parentTask.id+" "+(parentTask.title_object||parentTask.title||""),
    parentTask.jira_url?"부모 JIRA: "+parentTask.jira_url:null,
    "일정: "+newTaskStart+" ~ "+newTaskEnd,
    "작업 유형: "+actionVerb,
    "담당자: "+(assigneeWorker?.name||"-"),
    versionId?"버전: "+versionId:null,
    reason?"사유: "+reason:null,
    "",
    "(트래커에서 자동 생성된 prefill - 검수 후 Create)"
  ].filter(Boolean);
  params.set("description",descLines.join("\n"));
  if(assigneeWorker&&WORKER_JIRA_MAP[assigneeWorker.name]){
    params.set("assignee",WORKER_JIRA_MAP[assigneeWorker.name]);
  }
  if(newTaskEnd)params.set("duedate",newTaskEnd);
  const vmap=VERSION_JIRA_MAP[versionId];
  if(vmap){
    if(vmap.fixVersion)params.set("fixVersions",String(vmap.fixVersion));
    if(vmap.sprint)params.set(JIRA_CF_SPRINT,String(vmap.sprint));
    if(vmap.epic)params.set(JIRA_CF_EPIC,vmap.epic);
    if(vmap.component)params.set("components",String(vmap.component));
    if(vmap.label)params.set("labels",vmap.label);
  }else if(content&&content.category){
    // fallback: 콘텐츠 카테고리 → 라벨 (공백 → underscore, F_JiraLabelConvention 준수)
    params.set("labels",content.category.replace(/\s+/g,"_"));
  }
  // JIRA Server classic CreateIssue page (Sub-Task 는 사용자가 새 탭에서 issuetype 선택)
  return JIRA_BASE+"/secure/CreateIssue!default.jspa?"+params.toString();
}

/* ═══ NEW SUB-TASK MODAL (v22 Track A: 패널에서 신규 sub-task 등록) ═══ */
/* parent task 아래 신규 sub-task INSERT + 자동 parent expand + JIRA prefill 옵션 */
function NewSubTaskModal({parentTask,user,workers,allTasks,contents,zOverride,onClose,onDone}){
  const ACTION_VERBS=[
    {v:"design",l:"기획"},{v:"implement",l:"구현"},{v:"polish",l:"폴리싱"},
    {v:"resource",l:"리소스 제작"},{v:"feedback",l:"피드백 반영"},{v:"qa",l:"QA"},
    {v:"refine",l:"수정"},{v:"verify",l:"검증"}
  ];
  const[title,setTitle]=useState("");
  const[actionVerb,setActionVerb]=useState("polish");
  const[ds,setDs]=useState("");
  const[de,setDe]=useState("");
  const[assigneeId,setAssigneeId]=useState(parentTask.assignee_id||(user?.id));
  const[versionId,setVersionId]=useState(parentTask.version_id||"");
  const[reason,setReason]=useState("");
  const[expandParent,setExpandParent]=useState(true);
  const[openJira,setOpenJira]=useState(false);
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState(null);
  // 부모 일정 확장 미리보기
  const parentExpand=useMemo(()=>{
    if(!parentTask.start_date||!parentTask.end_date||!ds||!de)return null;
    const ps=parentTask.start_date.slice(0,10),pe=parentTask.end_date.slice(0,10);
    const newPs=ds<ps?ds:ps;
    const newPe=de>pe?de:pe;
    if(newPs===ps&&newPe===pe)return null;
    return{old_start:ps,old_end:pe,new_start:newPs,new_end:newPe,done:parentTask.status==='done'};
  },[parentTask,ds,de]);
  // sort_order 계산 (parent 의 child 중 max + 1)
  const nextSortOrder=useMemo(()=>{
    const children=(allTasks||[]).filter(t=>t.parent_task_id===parentTask.id);
    return Math.max(0,...children.map(c=>c.sort_order||0))+1;
  },[allTasks,parentTask]);
  const submit=async()=>{
    if(!title.trim()){setErr("제목 필수");return}
    if(!ds||!de){setErr("시작/종료일 필수");return}
    if(de<ds){setErr("종료일이 시작일보다 빠를 수 없음");return}
    if(!assigneeId){setErr("담당자 선택 필수");return}
    if(parentExpand&&parentExpand.done&&expandParent){setErr("부모 task 가 status=done 입니다. 자동 확장 체크 해제 후 진행하거나 별도 parent 로 분리하세요.");return}
    setSaving(true);setErr(null);
    try{
      const days=businessDaysDiff(ds,de)+1;
      const reasonText=reason.trim()||"패널에서 sub-task 신규 등록";
      // 1) 신규 task INSERT
      const newTaskPayload={
        content_id:parentTask.content_id,
        parent_task_id:parentTask.id,
        title:title.trim(),
        title_object:title.trim(),
        action_verb:actionVerb,
        start_date:ds,
        end_date:de,
        status:"waiting",
        assignee_id:assigneeId,
        version_id:versionId||null,
        sort_order:nextSortOrder,
        days,
        issue_type:"Sub-Task",
        related_part:parentTask.related_part||null,
        notes:reasonText
      };
      const inserted=await db.bulkTasks([newTaskPayload]);
      const newTask=(inserted||[])[0];
      if(!newTask||!newTask.id)throw new Error("Sub-Task INSERT 실패 (응답 없음)");
      // 2) schedule_changes 이력
      await db.addChange({content_id:parentTask.content_id||null,task_id:newTask.id,field:"insert",old_value:"-",new_value:ds+"~"+de,reason:reasonText+" (parent #"+parentTask.id+")",changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
      // 3) parent 일정 확장
      let parentExpanded=false;
      if(parentExpand&&expandParent&&!parentExpand.done){
        const patch={updated_at:new Date().toISOString()};
        if(parentExpand.new_start!==parentExpand.old_start)patch.start_date=parentExpand.new_start;
        if(parentExpand.new_end!==parentExpand.old_end)patch.end_date=parentExpand.new_end;
        await db.updTask(parentTask.id,patch);
        if(patch.start_date)await db.addChange({content_id:parentTask.content_id||null,task_id:parentTask.id,field:"start_date",old_value:parentExpand.old_start,new_value:parentExpand.new_start,reason:"신규 sub-task #"+newTask.id+" 등록에 따른 parent 자동 확장",changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
        if(patch.end_date)await db.addChange({content_id:parentTask.content_id||null,task_id:parentTask.id,field:"end_date",old_value:parentExpand.old_end,new_value:parentExpand.new_end,reason:"신규 sub-task #"+newTask.id+" 등록에 따른 parent 자동 확장",changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
        parentExpanded=true;
      }
      // 4) JIRA prefill 새 탭 (v22 Track A-2: project/assignee/fixVersion/sprint/epic/labels 보강)
      if(openJira){
        const assigneeWorker=(workers||[]).find(w=>w.id===assigneeId);
        const contentObj=(contents||[]).find(c=>c.id===parentTask.content_id);
        const jiraUrl=buildJiraCreateUrl({
          parentTask,
          newTaskTitle:title.trim(),
          newTaskStart:ds,
          newTaskEnd:de,
          assigneeWorker,
          versionId:versionId||null,
          actionVerb,
          reason:reasonText,
          content:contentObj
        });
        window.open(jiraUrl,"_blank","noopener");
      }
      onDone&&onDone({newTaskId:newTask.id,parentExpanded});
      onClose();
    }catch(e){setErr("등록 실패: "+(e.message||e));setSaving(false)}
  };
  const versions=useMemo(()=>{const s=new Set();(allTasks||[]).forEach(t=>{if(t.version_id)s.add(t.version_id)});return[...s].sort()},[allTasks]);
  const assigneeWorkers=(workers||[]).filter(w=>w.is_active!==false).sort((a,b)=>(a.part_id||'').localeCompare(b.part_id||'')||(a.name||'').localeCompare(b.name||''));
  return<div className="modal-bg" onClick={onClose} style={zOverride?{zIndex:zOverride}:undefined}>
    <div className="modal" style={{maxWidth:560,width:"94vw"}} onClick={e=>e.stopPropagation()}>
      <div className="modal-h" style={{background:"#059669",color:"#fff"}}>＋ 신규 Sub-Task 등록 - 부모 #{parentTask.id}</div>
      <div className="modal-b" style={{maxHeight:"70vh",overflow:"auto"}}>
        <div style={{padding:"8px 12px",background:"#ecfdf5",border:"1px solid #a7f3d0",borderRadius:6,fontSize:11,color:"#065f46",marginBottom:12,lineHeight:1.6}}>
          🌱 <b>부모 task</b>: {parentTask.title_object||parentTask.title} <span style={{color:"#047857"}}>({parentTask.start_date?.slice(0,10)} ~ {parentTask.end_date?.slice(0,10)}, {({waiting:"대기",progress:"진행 중",done:"완료",blocked:"차단"})[parentTask.status]||parentTask.status})</span>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>제목 <span style={{color:"var(--rd)"}}>*</span></div>
          <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="예: 챕터4.1 메인 퀘스트 보스(쉘윈) 추가 폴리싱" style={{width:"100%",padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:4,fontSize:13,fontFamily:"inherit"}}/>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>작업 유형</div>
            <select value={actionVerb} onChange={e=>setActionVerb(e.target.value)} style={{width:"100%",fontSize:12,padding:"5px 6px",border:"1px solid var(--bd)",borderRadius:4,fontFamily:"inherit"}}>
              {ACTION_VERBS.map(av=><option key={av.v} value={av.v}>{av.l} ({av.v})</option>)}
            </select>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>버전</div>
            <select value={versionId} onChange={e=>setVersionId(e.target.value)} style={{width:"100%",fontSize:12,padding:"5px 6px",border:"1px solid var(--bd)",borderRadius:4,fontFamily:"inherit"}}>
              <option value="">(미지정)</option>
              {versions.map(v=><option key={v} value={v}>{v}</option>)}
            </select>
          </div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>시작일 <span style={{color:"var(--rd)"}}>*</span></div>
            <input type="date" value={ds} onChange={e=>setDs(e.target.value)} style={{width:"100%",padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:4,fontSize:13}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>종료일 <span style={{color:"var(--rd)"}}>*</span></div>
            <input type="date" value={de} onChange={e=>setDe(e.target.value)} style={{width:"100%",padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:4,fontSize:13}}/>
          </div>
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>담당자 <span style={{color:"var(--rd)"}}>*</span></div>
          <select value={assigneeId||""} onChange={e=>setAssigneeId(parseInt(e.target.value,10))} style={{width:"100%",fontSize:12,padding:"5px 6px",border:"1px solid var(--bd)",borderRadius:4,fontFamily:"inherit"}}>
            {assigneeWorkers.map(w=><option key={w.id} value={w.id}>{w.name} ({w.part_id||"-"}){w.is_part_lead?" ★":""}</option>)}
          </select>
        </div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>등록 사유 (선택)</div>
          <input type="text" value={reason} onChange={e=>setReason(e.target.value)} placeholder="예: S02 시즌 폴리싱 작업 추가 필요" style={{width:"100%",padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:4,fontSize:12,fontFamily:"inherit"}}/>
        </div>
        {/* parent 확장 미리보기 */}
        {parentExpand&&<div style={{padding:"8px 12px",background:parentExpand.done?"#fef2f2":"#fffbeb",border:"1px solid "+(parentExpand.done?"#fecaca":"#fde68a"),borderRadius:6,fontSize:11,marginBottom:12,lineHeight:1.6}}>
          {parentExpand.done?<>
            <div style={{color:"#991b1b",fontWeight:600}}>⚠ 부모 task #{parentTask.id} 가 status=done 입니다.</div>
            <div style={{color:"#7f1d1d"}}>자동 확장 시 완료된 task 일정이 변경됨 → 이력 왜곡 우려. 별도 parent 분리 권장.</div>
          </>:<>
            <div style={{color:"#92400e",fontWeight:600}}>부모 #{parentTask.id} 일정 확장 예정</div>
            <div style={{color:"#78350f"}}>{parentExpand.old_start} ~ {parentExpand.old_end} → {parentExpand.new_start} ~ {parentExpand.new_end}</div>
          </>}
        </div>}
        {/* 적용 옵션 */}
        <div style={{padding:"8px 12px",background:"var(--bg2)",borderRadius:6,fontSize:11,marginBottom:12,border:"1px solid var(--bd)"}}>
          <div style={{fontWeight:600,marginBottom:6,color:"var(--t2)"}}>적용 옵션</div>
          {parentExpand&&!parentExpand.done&&<label style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,cursor:"pointer"}}>
            <input type="checkbox" checked={expandParent} onChange={e=>setExpandParent(e.target.checked)}/>
            <span>부모 #{parentTask.id} 일정 자동 확장</span>
          </label>}
          <label style={{display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
            <input type="checkbox" checked={openJira} onChange={e=>setOpenJira(e.target.checked)}/>
            <span>등록 후 JIRA 일감 생성 페이지 새 탭 오픈 (사내 SSO 로그인 필요)</span>
          </label>
        </div>
        {err&&<div style={{padding:"6px 10px",background:"var(--rd-bg)",color:"var(--rd)",borderRadius:4,fontSize:12,marginBottom:10}}>{err}</div>}
      </div>
      <div style={{padding:"10px 14px",borderTop:"1px solid var(--bd)",background:"var(--bg2)",display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button className="bt bt-s" onClick={onClose} disabled={saving}>취소</button>
        <button className="bt bt-s" onClick={submit} disabled={saving} style={{background:"#059669",color:"#fff",borderColor:"#059669"}}>{saving?"등록 중...":"＋ 등록"}</button>
      </div>
    </div>
  </div>;
}

/* ═══ DELETE TASK MODAL (v22 Track A-3) ═══ */
/* 관리자 전용. 사유 입력 필수. 본인 children 있는 경우 경고 표시 + 차단. */
function DeleteTaskModal({task,user,allTasks,zOverride,onClose,onDone}){
  const[reason,setReason]=useState("");
  const[ack,setAck]=useState(false);
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState(null);
  const children=useMemo(()=>(allTasks||[]).filter(t=>t.parent_task_id===task.id),[allTasks,task.id]);
  const hasChildren=children.length>0;
  const submit=async()=>{
    if(!reason.trim()){setErr("삭제 사유 입력 필수");return}
    if(hasChildren){setErr("Sub-Task "+children.length+"건이 연결되어 있어 삭제 차단. 자식 task 부터 먼저 삭제하세요");return}
    if(!ack){setErr("확인 체크박스 클릭 필요");return}
    setSaving(true);setErr(null);
    try{
      const reasonText=reason.trim();
      const oldRange=(task.start_date?task.start_date.slice(0,10):"-")+"~"+(task.end_date?task.end_date.slice(0,10):"-");
      // 1) schedule_changes "delete" 이력 (DELETE 전, content_id 보존)
      await db.addChange({content_id:task.content_id||null,task_id:task.id,field:"delete",old_value:oldRange,new_value:"-",reason:reasonText+" (관리자 삭제, 제목: "+(task.title_object||task.title||"")+", parent #"+(task.parent_task_id||"-")+")",changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
      // 2) DELETE
      await db.delTask(task.id);
      onDone&&onDone({deletedId:task.id});
      onClose();
    }catch(e){setErr("삭제 실패: "+(e.message||e));setSaving(false)}
  };
  return<div className="modal-bg" onClick={onClose} style={zOverride?{zIndex:zOverride}:undefined}>
    <div className="modal" style={{maxWidth:520,width:"94vw"}} onClick={e=>e.stopPropagation()}>
      <div className="modal-h" style={{background:"#dc2626",color:"#fff"}}>🗑 태스크 삭제 - #{task.id} {task.title_object||task.title}</div>
      <div className="modal-b" style={{maxHeight:"70vh",overflow:"auto"}}>
        <div style={{padding:"8px 12px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,fontSize:11,color:"#991b1b",marginBottom:12,lineHeight:1.6}}>
          ⚠ <b>되돌릴 수 없는 작업</b>: DELETE 후 task row 자체가 제거됩니다. schedule_changes 에 "delete" 이력 1건 남김. JIRA 일감은 별도 정리 필요 (현재 자동 처리 안됨).
        </div>
        <div style={{display:"grid",gridTemplateColumns:"100px 1fr",gap:"6px 12px",fontSize:12,marginBottom:12}}>
          <div style={{color:"var(--t4)"}}>제목</div>
          <div style={{fontWeight:600}}>{task.title_object||task.title||"(제목 없음)"}</div>
          <div style={{color:"var(--t4)"}}>일정</div>
          <div>{task.start_date?task.start_date.slice(0,10):"-"} ~ {task.end_date?task.end_date.slice(0,10):"-"}</div>
          <div style={{color:"var(--t4)"}}>상태</div>
          <div>{({waiting:"대기",progress:"진행 중",done:"완료",blocked:"차단"})[task.status]||task.status}</div>
          {task.parent_task_id&&<><div style={{color:"var(--t4)"}}>부모</div><div>#{task.parent_task_id}</div></>}
          {task.jira_url&&<><div style={{color:"var(--t4)"}}>JIRA</div><div><a href={task.jira_url} target="_blank" rel="noopener" style={{color:"var(--ac)"}}>{task.jira_url.split("/").pop()}</a> <span style={{color:"#991b1b",fontSize:11}}>(JIRA 일감 별도 정리 필요)</span></div></>}
        </div>
        {hasChildren&&<div style={{padding:"8px 12px",background:"#fef2f2",border:"1px solid #fca5a5",borderRadius:6,fontSize:11,color:"#991b1b",marginBottom:12,lineHeight:1.6}}>
          ⛔ <b>Sub-Task {children.length}건 연결됨</b> - 삭제 차단됨. 먼저 자식 task 부터 삭제하세요.
          <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:2}}>
            {children.slice(0,10).map(c=><div key={c.id} style={{fontSize:10,color:"#7f1d1d"}}>· #{c.id} {c.title_object||c.title}</div>)}
            {children.length>10&&<div style={{fontSize:10,color:"#7f1d1d"}}>외 {children.length-10}건</div>}
          </div>
        </div>}
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:6}}>삭제 사유 <span style={{color:"var(--rd)"}}>*</span></div>
        <textarea autoFocus value={reason} onChange={e=>setReason(e.target.value)} placeholder="예: 중복 등록 / 오등록 / 폴리싱 트랙 분리 등"
          style={{width:"100%",minHeight:60,fontSize:13,padding:"8px 10px",border:"1px solid var(--bd)",borderRadius:6,fontFamily:"inherit",resize:"vertical",marginBottom:10}}/>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:12,cursor:"pointer",marginBottom:8,color:"#991b1b"}}>
          <input type="checkbox" checked={ack} onChange={e=>setAck(e.target.checked)}/>
          <span>이 태스크를 완전히 삭제하며, 되돌릴 수 없음을 확인합니다.</span>
        </label>
        {err&&<div style={{padding:"6px 10px",background:"var(--rd-bg)",color:"var(--rd)",borderRadius:4,fontSize:12,marginBottom:6}}>{err}</div>}
      </div>
      <div style={{padding:"10px 14px",borderTop:"1px solid var(--bd)",background:"var(--bg2)",display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button className="bt bt-s" onClick={onClose} disabled={saving}>취소</button>
        <button className="bt bt-s" onClick={submit} disabled={saving||!reason.trim()||!ack||hasChildren} style={{background:"#dc2626",color:"#fff",borderColor:"#dc2626"}}>{saving?"삭제 중...":"🗑 삭제 확정"}</button>
      </div>
    </div>
  </div>;
}

/* ═══ CONNECT JIRA MODAL (v22 Track A-4) ═══ */
/* 기존 task 에 JIRA 일감 연결. 2 step: (1) prefill URL 새 탭 (2) 발급된 JIRA URL/Key paste → jira_url PATCH */
function ConnectJiraModal({task,user,workers,contents,parentTask,zOverride,onClose,onDone}){
  const[jiraInput,setJiraInput]=useState("");
  const[reason,setReason]=useState("");
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState(null);
  const[opened,setOpened]=useState(false);
  const assigneeWorker=(workers||[]).find(w=>w.id===task.assignee_id);
  const content=(contents||[]).find(c=>c.id===task.content_id);
  const versionInfo=(typeof VERSION_JIRA_MAP!=='undefined'&&task.version_id&&VERSION_JIRA_MAP[task.version_id])||null;
  // prefill URL 미리 생성 (parentTask 가 없을 때는 task 자신을 parent context 로)
  const prefillUrl=useMemo(()=>{
    try{
      return buildJiraCreateUrl({
        parentTask:parentTask||task,
        newTaskTitle:task.title_object||task.title||"",
        newTaskStart:task.start_date?task.start_date.slice(0,10):null,
        newTaskEnd:task.end_date?task.end_date.slice(0,10):null,
        assigneeWorker,
        versionId:task.version_id||null,
        actionVerb:task.action_verb||"",
        reason:"기존 트래커 task 연결",
        content
      });
    }catch(e){return null}
  },[task,parentTask,assigneeWorker,content]);
  // JIRA URL/Key normalize: "PROJECTT-NNN" 또는 "https://jira.nmn.io/browse/PROJECTT-NNN" 또는 전체 URL 허용
  const normalizeJira=v=>{
    const trimmed=(v||"").trim();
    if(!trimmed)return null;
    const keyMatch=trimmed.match(/([A-Z]+-\d+)/);
    if(!keyMatch)return null;
    const key=keyMatch[1];
    const url=trimmed.startsWith("http")?trimmed:("https://jira.nmn.io/browse/"+key);
    return{key,url};
  };
  const parsed=normalizeJira(jiraInput);
  const submit=async()=>{
    if(!parsed){setErr("JIRA 키 또는 URL 형식이 아님 (예: PROJECTT-38075)");return}
    if(!reason.trim()){setErr("연결 사유 입력 필수");return}
    setSaving(true);setErr(null);
    try{
      const reasonText=reason.trim();
      await db.updTask(task.id,{jira_url:parsed.url,updated_at:new Date().toISOString()});
      await db.addChange({content_id:task.content_id||null,task_id:task.id,field:"jira_url",old_value:"-",new_value:parsed.key,reason:reasonText+" (외부 JIRA 일감 연결)",changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
      onDone&&onDone({jiraKey:parsed.key,jiraUrl:parsed.url});
      onClose();
    }catch(e){setErr("연결 실패: "+(e.message||e));setSaving(false)}
  };
  return<div className="modal-bg" onClick={onClose} style={zOverride?{zIndex:zOverride}:undefined}>
    <div className="modal" style={{maxWidth:560,width:"94vw"}} onClick={e=>e.stopPropagation()}>
      <div className="modal-h" style={{background:"#0052cc",color:"#fff"}}>🎫 JIRA 일감 연결 - #{task.id} {task.title_object||task.title}</div>
      <div className="modal-b" style={{maxHeight:"70vh",overflow:"auto"}}>
        <div style={{padding:"8px 12px",background:"#eff6ff",border:"1px solid #93c5fd",borderRadius:6,fontSize:11,color:"#1e40af",marginBottom:12,lineHeight:1.6}}>
          🎫 <b>2 step 흐름</b>: (1) prefill URL 새 탭 → JIRA 측에서 일감 생성 → 발급된 JIRA 키(PROJECTT-NNN) 또는 URL 을 (2) 아래 input 에 paste → 적용 시 task.jira_url 에 자동 연결.
          <br/><span style={{color:"#7c2d12"}}>※ JIRA Server 한계로 issuetype 선택 페이지까지만 prefill 됨. summary/description 등은 사용자가 수동 입력 필요.</span>
        </div>
        <div style={{padding:"8px 12px",background:"var(--bg2)",borderRadius:6,fontSize:11,marginBottom:12,border:"1px solid var(--bd)",lineHeight:1.6}}>
          <div style={{fontWeight:600,marginBottom:4,color:"var(--t2)"}}>연결 대상 task 정보 (prefill 자동 반영)</div>
          <div>제목: <span style={{fontWeight:600}}>{task.title_object||task.title||"-"}</span></div>
          <div>일정: {task.start_date?task.start_date.slice(0,10):"-"} ~ {task.end_date?task.end_date.slice(0,10):"-"}</div>
          <div>담당자: {assigneeWorker?.name||"-"} {assigneeWorker&&typeof WORKER_JIRA_MAP!=='undefined'&&WORKER_JIRA_MAP[assigneeWorker.name]?<span style={{color:"var(--ac)"}}>→ JIRA {WORKER_JIRA_MAP[assigneeWorker.name]}</span>:""}</div>
          {task.version_id&&<div>버전: {task.version_id} {versionInfo?<span style={{color:"var(--ac)"}}>→ fixVersion {versionInfo.fixVersion} / sprint {versionInfo.sprint}</span>:<span style={{color:"#92400e"}}>(JIRA 매핑 미정)</span>}</div>}
          {parentTask&&<div>부모: #{parentTask.id} {parentTask.title_object||parentTask.title}</div>}
        </div>
        <div style={{marginBottom:12}}>
          <button className="bt bt-s" onClick={()=>{if(prefillUrl){window.open(prefillUrl,"_blank","noopener");setOpened(true)}}} disabled={!prefillUrl} style={{background:"#0052cc",color:"#fff",borderColor:"#0052cc",width:"100%",padding:"8px 0",fontSize:13,fontWeight:600}}>
            {opened?"↗ JIRA 페이지 다시 열기":"↗ Step 1: JIRA 일감 생성 페이지 새 탭 열기"}
          </button>
          {opened&&<div style={{marginTop:6,padding:"6px 10px",background:"#ecfdf5",border:"1px solid #a7f3d0",borderRadius:4,fontSize:11,color:"#065f46"}}>
            ✓ 새 탭 열림. JIRA 측에서 일감 생성 후, 발급된 키(예: PROJECTT-38075) 또는 URL 을 아래에 paste 하세요.
          </div>}
        </div>
        <div style={{borderTop:"1px dashed var(--bd)",margin:"12px 0",paddingTop:12}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:6,fontWeight:600}}>Step 2: 발급된 JIRA 키 또는 URL <span style={{color:"var(--rd)"}}>*</span></div>
          <input type="text" autoFocus value={jiraInput} onChange={e=>setJiraInput(e.target.value)} placeholder="PROJECTT-38075  또는  https://jira.nmn.io/browse/PROJECTT-38075"
            style={{width:"100%",padding:"7px 10px",border:"1px solid "+(parsed?"#059669":jiraInput?"#dc2626":"var(--bd)"),borderRadius:4,fontSize:13,fontFamily:"inherit",marginBottom:6}}/>
          {parsed&&<div style={{fontSize:11,color:"#059669"}}>✓ {parsed.key} - {parsed.url}</div>}
          {jiraInput&&!parsed&&<div style={{fontSize:11,color:"#dc2626"}}>⚠ 형식 오류 - PROJECTT-숫자 패턴 필요</div>}
        </div>
        <div style={{marginBottom:10}}>
          <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>연결 사유 <span style={{color:"var(--rd)"}}>*</span></div>
          <input type="text" value={reason} onChange={e=>setReason(e.target.value)} placeholder="예: ALUP01 1차 발행 누락분 / 외부 생성 일감 연결"
            style={{width:"100%",padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:4,fontSize:12,fontFamily:"inherit"}}/>
        </div>
        {err&&<div style={{padding:"6px 10px",background:"var(--rd-bg)",color:"var(--rd)",borderRadius:4,fontSize:12}}>{err}</div>}
      </div>
      <div style={{padding:"10px 14px",borderTop:"1px solid var(--bd)",background:"var(--bg2)",display:"flex",gap:8,justifyContent:"flex-end"}}>
        <button className="bt bt-s" onClick={onClose} disabled={saving}>취소</button>
        <button className="bt bt-s" onClick={submit} disabled={saving||!parsed||!reason.trim()} style={{background:"#0052cc",color:"#fff",borderColor:"#0052cc"}}>{saving?"연결 중...":"🎫 연결 적용"}</button>
      </div>
    </div>
  </div>;
}

/* ═══ PENDING SCHEDULE DETECTION (v22 Track 7) ═══ */
/* A=NULL B=공휴일/주말-only C=인접공백5+영업일 D=동일parent+동일일정3+ */
function detectPendingScheduleTasks(allTasks){
  const out={nullSched:[],holidayOnly:[],gapAfter:[],placeholderGroup:[]};
  const live=(allTasks||[]).filter(t=>t.status!=='done');
  // A. NULL 일정
  live.forEach(t=>{if(!t.start_date||!t.end_date)out.nullSched.push(t)});
  // B. 공휴일/주말 only
  live.forEach(t=>{
    if(!t.start_date||!t.end_date)return;
    const s=t.start_date.slice(0,10),e=t.end_date.slice(0,10);
    if(s!==e)return; // 1일짜리만 우선 판정
    const d=new Date(s+"T00:00:00");
    if(!isBusinessDay(d))out.holidayOnly.push(t);
  });
  // C. 동일 worker 인접 공백 ≥ 5 영업일
  const byWorker={};
  live.forEach(t=>{
    if(!t.start_date||!t.end_date||!t.assignee_id)return;
    (byWorker[t.assignee_id]=byWorker[t.assignee_id]||[]).push(t);
  });
  Object.entries(byWorker).forEach(([wid,arr])=>{
    arr.sort((a,b)=>(a.start_date||'').localeCompare(b.start_date||''));
    for(let i=1;i<arr.length;i++){
      const prev=arr[i-1].end_date.slice(0,10),cur=arr[i].start_date.slice(0,10);
      if(cur<=prev)continue;
      const gap=businessDaysDiff(prev,cur);
      if(gap>=5)out.gapAfter.push({task:arr[i],prev:arr[i-1],gap});
    }
  });
  // D. 동일 parent + 동일 일정 3+ child
  const byParent={};
  live.forEach(t=>{
    if(!t.parent_task_id||!t.start_date||!t.end_date)return;
    const k=t.parent_task_id+"|"+t.start_date.slice(0,10)+"|"+t.end_date.slice(0,10);
    (byParent[k]=byParent[k]||[]).push(t);
  });
  Object.values(byParent).forEach(arr=>{
    if(arr.length>=3)out.placeholderGroup.push({parent_id:arr[0].parent_task_id,start:arr[0].start_date.slice(0,10),end:arr[0].end_date.slice(0,10),tasks:arr});
  });
  return out;
}

/* ═══ SCHEDULE CHANGE REQUEST / DIRECT EDIT MODAL (v21 일정 조정) ═══ */
/* mode: 'request' = 작업자 본인 task 요청 워크플로 / 'direct_apply' = 관리자 즉시 적용 + cascade + JIRA 큐 */
function ScheduleRequestModal({task,user,workers,allTasks,mode='request',onClose,onDone,zOverride,initialStart,initialEnd,initialReason}){
  const isDirectApply=mode==='direct_apply';
  const curStart=task.start_date?task.start_date.slice(0,10):"";
  const curEnd=task.end_date?task.end_date.slice(0,10):"";
  const curStatus=task.status||"waiting";
  // v22 Track A-5: 직접 조정 모달 메타 필드
  const curTitle=task.title_object||task.title||"";
  const curNotes=task.notes||"";
  const curJiraUrl=task.jira_url||"";
  const curVersionId=task.version_id||"";
  // v22 Track 8: initial 값 (드래그 commit 진입 시 prefill)
  const[ds,setDs]=useState(initialStart||curStart);
  const[de,setDe]=useState(initialEnd||curEnd);
  const[ns,setNs]=useState(curStatus); // direct_apply 모드: 새 status (admin 만 status 동시 변경)
  const[nTitle,setNTitle]=useState(curTitle);
  const[nNotes,setNNotes]=useState(curNotes);
  const[nJiraUrl,setNJiraUrl]=useState(curJiraUrl);
  const[nVersionId,setNVersionId]=useState(curVersionId);
  const[reason,setReason]=useState(initialReason||"");
  const[cascadeChecked,setCascadeChecked]=useState(true); // direct_apply 모드: cascade 적용 여부 (기본 ON)
  const[jiraSyncChecked,setJiraSyncChecked]=useState(true); // direct_apply 모드: JIRA 큐 적재 여부 (기본 ON)
  const[showMeta,setShowMeta]=useState(false); // direct_apply 모드: 메타 필드 expand
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState(null);
  // 승인자 자동 배정 (request 모드만): 1차 = 태스크 담당자 같은 파트의 part_lead / 2차 = team_lead (1주일 이상 시)
  const assigneeWorker=useMemo(()=>(workers||[]).find(w=>w.id===task.assignee_id),[workers,task]);
  const lvl1=useMemo(()=>{
    if(isDirectApply)return null;
    // 파트별 1차 승인자 override (part_lead 가 단일 part_id 라 한 명이 여러 파트 lead 인 경우)
    const PART_LEAD_OVERRIDES={cutscene:"quest"}; // 5/8: cutscene 의 1차 승인자는 quest part_lead (권재만)
    const rawPartId=assigneeWorker?.part_id||user.part_id;
    const partId=PART_LEAD_OVERRIDES[rawPartId]||rawPartId;
    return(workers||[]).find(w=>w.is_part_lead&&w.part_id===partId&&w.is_active!==false&&w.id!==task.assignee_id)
      ||(workers||[]).find(w=>w.is_part_lead&&w.part_id===partId&&w.is_active!==false);
  },[workers,assigneeWorker,user,task,isDirectApply]);
  const lvl2=useMemo(()=>(workers||[]).find(w=>w.is_team_lead&&w.is_active!==false),[workers]);
  // 분석
  const dStart=businessDaysDiff(curStart,ds);
  const dEnd=businessDaysDiff(curEnd,de);
  const delay=Math.max(dStart,dEnd);
  const lvl2Required=delay>=7;
  const affected=useMemo(()=>computeAffectedTasks(task,curStart,curEnd,ds,de,allTasks||[]),[task,curStart,curEnd,ds,de,allTasks]);
  const extractJiraKey=(url)=>{const m=String(url||'').match(/([A-Z]+-\d+)/);return m?m[1]:null};
  const dateChanged=ds!==curStart||de!==curEnd;
  const statusChanged=isDirectApply&&ns!==curStatus;
  // v22 Track A-5: 메타 필드 변경 감지 (direct_apply 모드만)
  const titleChanged=isDirectApply&&nTitle.trim()!==curTitle;
  const notesChanged=isDirectApply&&nNotes!==curNotes;
  const jiraUrlChanged=isDirectApply&&nJiraUrl.trim()!==curJiraUrl;
  const versionIdChanged=isDirectApply&&(nVersionId||"")!==(curVersionId||"");
  const metaChanged=titleChanged||notesChanged||jiraUrlChanged||versionIdChanged;
  // 트래커 versions (allTasks 에서 추출)
  const versionOptions=useMemo(()=>{
    const s=new Set();(allTasks||[]).forEach(t=>{if(t.version_id)s.add(t.version_id)});
    return[...s].sort();
  },[allTasks]);
  // VERSION_JIRA_MAP 매핑 미리보기 (선택한 version_id 가 매핑 자산에 있는지)
  const versionJiraInfo=(typeof VERSION_JIRA_MAP!=='undefined'&&nVersionId&&VERSION_JIRA_MAP[nVersionId])||null;
  const submit=async()=>{
    // 일정 입력은 둘 다 있거나 둘 다 없거나 (관리자 모드는 NULL 허용)
    if(isDirectApply){
      if((ds&&!de)||(!ds&&de)){setErr("시작/종료일은 둘 다 입력 또는 둘 다 비워주세요");return}
      if(ds&&de&&de<ds){setErr("종료일이 시작일보다 빠를 수 없음");return}
    }else{
      if(!ds||!de){setErr("희망 시작/종료일 입력 필수");return}
      if(de<ds){setErr("종료일이 시작일보다 빠를 수 없음");return}
    }
    if(!reason.trim()){setErr((isDirectApply?"조정":"요청")+" 사유 입력 필수");return}
    if(isDirectApply){
      if(!dateChanged&&!statusChanged&&!metaChanged){setErr("일정/상태/메타 중 하나는 변경되어야 합니다");return}
      if(titleChanged&&!nTitle.trim()){setErr("제목은 비울 수 없습니다");return}
      if(jiraUrlChanged&&nJiraUrl.trim()&&!/^https?:\/\//i.test(nJiraUrl.trim())){setErr("JIRA URL 은 http(s):// 로 시작해야 합니다");return}
    }else{
      if(!dateChanged){setErr("일정이 변경되어야 합니다");return}
    }
    if(!isDirectApply&&!lvl1){setErr("1차 승인자(파트장) 미배정 - 관리자에게 문의");return}
    setSaving(true);setErr(null);
    if(isDirectApply){
      // ── 관리자 즉시 적용 모드 ──
      try{
        const reasonText=reason.trim();
        const reasonCascade="관리자 직접 조정 cascade: "+reasonText;
        // 1) trigger task PATCH + schedule_changes
        const triggerPatch={updated_at:new Date().toISOString()};
        if(ds!==curStart)triggerPatch.start_date=ds||null;
        if(de!==curEnd)triggerPatch.end_date=de||null;
        if(statusChanged)triggerPatch.status=ns;
        // v22 Track A-5: 메타 필드 PATCH
        if(titleChanged){triggerPatch.title_object=nTitle.trim();triggerPatch.title=nTitle.trim()}
        if(notesChanged)triggerPatch.notes=nNotes||null;
        if(jiraUrlChanged)triggerPatch.jira_url=nJiraUrl.trim()||null;
        if(versionIdChanged)triggerPatch.version_id=nVersionId||null;
        await db.updTask(task.id,triggerPatch);
        if(ds!==curStart){
          await db.addChange({content_id:task.content_id||null,task_id:task.id,field:"start_date",old_value:curStart||"-",new_value:ds||"-",reason:reasonText,changed_by:user.name,actor_worker_id:user.id});
        }
        if(de!==curEnd){
          await db.addChange({content_id:task.content_id||null,task_id:task.id,field:"end_date",old_value:curEnd||"-",new_value:de||"-",reason:reasonText,changed_by:user.name,actor_worker_id:user.id});
        }
        if(statusChanged){
          await db.addChange({content_id:task.content_id||null,task_id:task.id,field:"status",old_value:curStatus||"-",new_value:ns||"-",reason:reasonText,changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
        }
        // v22 Track A-5: 메타 필드 이력 (각 필드 별 row)
        if(titleChanged){
          await db.addChange({content_id:task.content_id||null,task_id:task.id,field:"title",old_value:curTitle||"-",new_value:nTitle.trim()||"-",reason:reasonText,changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
        }
        if(notesChanged){
          const oldNotesShort=(curNotes||"").slice(0,80)+((curNotes||"").length>80?"...":"");
          const newNotesShort=(nNotes||"").slice(0,80)+((nNotes||"").length>80?"...":"");
          await db.addChange({content_id:task.content_id||null,task_id:task.id,field:"notes",old_value:oldNotesShort||"-",new_value:newNotesShort||"-",reason:reasonText,changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
        }
        if(jiraUrlChanged){
          await db.addChange({content_id:task.content_id||null,task_id:task.id,field:"jira_url",old_value:curJiraUrl||"-",new_value:nJiraUrl.trim()||"-",reason:reasonText,changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
        }
        if(versionIdChanged){
          await db.addChange({content_id:task.content_id||null,task_id:task.id,field:"version_id",old_value:curVersionId||"-",new_value:nVersionId||"-",reason:reasonText,changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
        }
        // 2) cascade affected tasks (일정 변경 + delta>0 일 때만, dateChanged 없으면 affected 도 빈 배열)
        let cascadeApplied=0;
        if(cascadeChecked&&affected.length>0&&dateChanged){
          for(const a of affected){
            const aTask=(allTasks||[]).find(t=>t.id===a.task_id);
            if(!aTask)continue;
            const aOldStart=aTask.start_date?aTask.start_date.slice(0,10):null;
            const aOldEnd=aTask.end_date?aTask.end_date.slice(0,10):null;
            await db.updTask(a.task_id,{start_date:a.proposed_start,end_date:a.proposed_end,updated_at:new Date().toISOString()});
            if(aOldStart!==a.proposed_start){
              await db.addChange({content_id:aTask.content_id||null,task_id:a.task_id,field:"start_date",old_value:aOldStart||"-",new_value:a.proposed_start,reason:reasonCascade,changed_by:user.name,actor_worker_id:user.id});
            }
            if(aOldEnd!==a.proposed_end){
              await db.addChange({content_id:aTask.content_id||null,task_id:a.task_id,field:"end_date",old_value:aOldEnd||"-",new_value:a.proposed_end,reason:reasonCascade,changed_by:user.name,actor_worker_id:user.id});
            }
            cascadeApplied++;
          }
        }
        // 3) JIRA 큐 적재 (update_dates) - 일정 변경 + ds/de 둘 다 있을 때만
        let jiraQueued=0;
        if(jiraSyncChecked&&dateChanged&&ds&&de){
          const triggerKey=extractJiraKey(task.jira_url);
          if(triggerKey){
            await db.addJiraLog({operation_type:"update_dates",task_id:task.id,content_id:null,payload:{issue_key:triggerKey,start_date:ds,end_date:de},status:"pending"});
            jiraQueued++;
          }
          if(cascadeChecked){
            for(const a of affected){
              const aTask=(allTasks||[]).find(t=>t.id===a.task_id);
              if(!aTask)continue;
              const k=extractJiraKey(aTask.jira_url);
              if(!k)continue;
              await db.addJiraLog({operation_type:"update_dates",task_id:a.task_id,content_id:null,payload:{issue_key:k,start_date:a.proposed_start,end_date:a.proposed_end},status:"pending"});
              jiraQueued++;
            }
          }
        }
        onDone&&onDone({applied:1+cascadeApplied,jiraQueued});
        onClose();
      }catch(e){setErr("적용 실패: "+(e.message||e));setSaving(false)}
      return;
    }
    // ── 작업자 요청 워크플로 모드 ──
    try{
      await db.addScheduleRequest({
        task_id:task.id,
        requester_id:user.id,
        current_start:curStart||null,
        current_end:curEnd||null,
        desired_start:ds,
        desired_end:de,
        delay_days:delay,
        reason:reason.trim(),
        affected_tasks:affected,
        status:"pending",
        lvl1_approver_id:lvl1.id,
        lvl2_required:lvl2Required,
        lvl2_approver_id:lvl2Required?(lvl2?.id||null):null
      });
      onDone&&onDone();
      onClose();
    }catch(e){setErr("요청 저장 실패: "+(e.message||e));setSaving(false)}
  };
  const headerIcon=isDirectApply?"⚡":"📅";
  const headerTitle=isDirectApply?"일정 직접 조정 (관리자)":"일정 조정 요청";
  const startLabel=isDirectApply?"새 시작":"희망 시작";
  const endLabel=isDirectApply?"새 종료":"희망 종료";
  const reasonLabel=isDirectApply?"조정 사유":"요청 사유";
  const reasonPlaceholder=isDirectApply?"예: 5/14 라이브 D-1 일정 압축, 우선순위 상향":"예: 시나리오 검수 지연으로 일정 조정 필요";
  const submitLabel=isDirectApply?"즉시 적용":"요청 제출";
  return<div className="modal-bg" onClick={onClose} style={zOverride?{zIndex:zOverride}:undefined}>
    <div className="modal" style={{maxWidth:600,width:"94vw"}} onClick={e=>e.stopPropagation()}>
      <div className="modal-h" style={{background:isDirectApply?"#7c3aed":undefined,color:isDirectApply?"#fff":undefined}}>{headerIcon} {headerTitle} - {task.title_object||task.title||("태스크 #"+task.id)}</div>
      <div className="modal-b" style={{maxHeight:"70vh",overflow:"auto"}}>
        {isDirectApply&&<div style={{padding:"8px 12px",background:"#ede9fe",border:"1px solid #c4b5fd",borderRadius:6,fontSize:11,color:"#5b21b6",marginBottom:12,lineHeight:1.6}}>
          ⚡ <b>관리자 모드</b>: 승인 워크플로 우회 후 즉시 트래커에 반영됩니다. cascade 영향 task 도 함께 조정 가능 (체크박스). JIRA 큐는 자동 적재됩니다.
        </div>}
        <div style={{fontSize:11,color:"var(--t3)",marginBottom:6}}>현재 일정</div>
        <div style={{padding:"6px 10px",background:"var(--bg3)",borderRadius:4,fontSize:12,marginBottom:14}}>
          {curStart||"(없음)"} ~ {curEnd||"(없음)"}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>{startLabel} <span style={{color:"var(--rd)"}}>*</span></div>
            <input type="date" value={ds} onChange={e=>setDs(e.target.value)} style={{width:"100%",padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:4,fontSize:13}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:4}}>{endLabel} <span style={{color:"var(--rd)"}}>*</span></div>
            <input type="date" value={de} onChange={e=>setDe(e.target.value)} style={{width:"100%",padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:4,fontSize:13}}/>
          </div>
        </div>
        <div style={{padding:"8px 12px",background:delay>=7?"var(--rd-bg)":delay>0?"#fef3c7":"var(--bg2)",borderRadius:6,fontSize:12,marginBottom:12,border:"1px solid "+(delay>=7?"var(--rd)":delay>0?"#fbbf24":"var(--bd)")}}>
          <div style={{display:"flex",alignItems:"center",gap:8,fontWeight:600,color:delay>=7?"var(--rd)":delay>0?"#92400e":"var(--t2)"}}>
            영업일 변경: {delay>0?"+":""}{delay}일 {!isDirectApply&&delay>=7&&<span style={{fontSize:10,padding:"2px 6px",background:"var(--rd)",color:"#fff",borderRadius:3}}>2차 승인 필수</span>}
          </div>
          <div style={{fontSize:11,color:"var(--t3)",marginTop:4}}>
            한국 공휴일 + 주말 제외 / start delta {dStart>0?"+":""}{dStart}일, end delta {dEnd>0?"+":""}{dEnd}일
          </div>
        </div>
        {!isDirectApply&&<div style={{padding:"8px 12px",background:"var(--bg2)",borderRadius:6,fontSize:11,marginBottom:12,border:"1px solid var(--bd)"}}>
          <div style={{fontWeight:600,marginBottom:4,color:"var(--t2)"}}>승인 라인</div>
          <div>1차 (파트장): <span style={{fontWeight:600,color:lvl1?"var(--ac)":"var(--rd)"}}>{lvl1?lvl1.name:"미배정 ⚠"}</span></div>
          {lvl2Required&&<div>2차 (팀장): <span style={{fontWeight:600,color:lvl2?"var(--ac)":"var(--rd)"}}>{lvl2?lvl2.name:"미배정 ⚠"}</span></div>}
        </div>}
        {isDirectApply&&<div style={{padding:"8px 12px",background:"var(--bg2)",borderRadius:6,fontSize:11,marginBottom:12,border:"1px solid var(--bd)"}}>
          <div style={{fontWeight:600,marginBottom:6,color:"var(--t2)"}}>상태 변경 (선택)</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{fontSize:11,color:"var(--t3)"}}>현재: <span style={{fontWeight:600,color:"var(--t2)"}}>{({waiting:"대기",progress:"진행 중",done:"완료",blocked:"차단"})[curStatus]||curStatus}</span></span>
            <span style={{color:"var(--t4)"}}>→</span>
            <select value={ns} onChange={e=>setNs(e.target.value)} style={{fontSize:12,padding:"3px 6px",border:"1px solid var(--bd)",borderRadius:3,fontFamily:"inherit"}}>
              <option value="waiting">대기</option>
              <option value="progress">진행 중</option>
              <option value="done">완료</option>
              <option value="blocked">차단</option>
            </select>
            {statusChanged&&<span style={{fontSize:10,padding:"1px 5px",background:"#7c3aed",color:"#fff",borderRadius:2,fontWeight:600}}>변경됨</span>}
          </div>
          <div style={{fontWeight:600,marginBottom:6,color:"var(--t2)"}}>적용 옵션</div>
          <label style={{display:"flex",alignItems:"center",gap:6,marginBottom:4,cursor:"pointer"}}>
            <input type="checkbox" checked={cascadeChecked} onChange={e=>setCascadeChecked(e.target.checked)} disabled={affected.length===0}/>

            <input type="checkbox" checked={jiraSyncChecked} onChange={e=>setJiraSyncChecked(e.target.checked)}/>
            <span>JIRA 일정 동기 큐 적재 (update_dates, jira_url 있는 task 만)</span>
          </label>
        </div>}
        {/* v22 Track A-5: 메타 필드 expand (제목/내용/jira_url/version_id) */}
        {isDirectApply&&<div style={{padding:"8px 12px",background:"var(--bg2)",borderRadius:6,fontSize:11,marginBottom:12,border:"1px solid var(--bd)"}}>

/* ═══ 영업일 계산 (한국 공휴일 + 주말 제외, v21 일정 조정 워크플로 + cascade v2 와 일치) ═══ */
const KR_HOLIDAYS_2026=new Set(["2026-01-01","2026-02-16","2026-02-17","2026-02-18","2026-03-01","2026-03-02","2026-05-05","2026-05-24","2026-05-25","2026-06-06","2026-08-15","2026-09-24","2026-09-25","2026-09-26","2026-10-03","2026-10-09","2026-12-25"]);
function fmtDate(d){const y=d.getFullYear();const mo=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');return `${y}-${mo}-${dd}`}
function isBusinessDay(d){const dow=d.getDay();if(dow===0||dow===6)return false;return !KR_HOLIDAYS_2026.has(fmtDate(d))}
function addBusinessDays(startISO,n){if(!startISO)return null;const d=new Date(startISO+"T00:00:00");if(n===0)return fmtDate(d);const dir=n>0?1:-1;let rem=Math.abs(n);while(rem>0){d.setDate(d.getDate()+dir);if(isBusinessDay(d))rem--}return fmtDate(d)}
function businessDaysDiff(d1ISO,d2ISO){if(!d1ISO||!d2ISO)return 0;if(d1ISO===d2ISO)return 0;const swap=d2ISO<d1ISO;const a=new Date((swap?d2ISO:d1ISO)+"T00:00:00");const b=new Date((swap?d1ISO:d2ISO)+"T00:00:00");let n=0;while(a<b){a.setDate(a.getDate()+1);if(isBusinessDay(a))n++}return swap?-n:n}
/* cascade v3 영향 범위 계산:
   (a) Sub-Task cascade: trigger 의 자식 (parent_task_id === trigger.id) 은 워커/겹침 무관 항상 동기 (delta!=0)
   (b) 워커 cascade: 동일 assignee + 기존 기간 겹침 (delta>0 만, 일정 밀림 시)
   완료(done) 상태는 둘 다 제외. 1단계만 (chain X). */
function computeAffectedTasks(triggerTask,oldStart,oldEnd,newStart,newEnd,allTasks){
  if(!oldStart||!oldEnd||!newStart||!newEnd)return [];
  const dStart=businessDaysDiff(oldStart,newStart);const dEnd=businessDaysDiff(oldEnd,newEnd);
  const delta=Math.max(dStart,dEnd);
  const collected=new Map();
  // (a) Sub-Task cascade: 부모 변경 시 모든 미완료 Sub-Task 동일 delta 이동
  if(delta!==0){
    for(const t of (allTasks||[])){
      if(t.id===triggerTask.id)continue;
      if(t.parent_task_id!==triggerTask.id)continue;
      if(t.status==='done')continue;
      if(!t.start_date||!t.end_date)continue;
      collected.set(t.id,{t,reason:'sub_task'});
    }
  }
  // (b) 워커 cascade: delta>0 (일정 밀림) 시만 (당김 시는 빈 슬롯 만들 뿐 후속에 영향 X)
  if(delta>0){
    for(const t of (allTasks||[])){
      if(t.id===triggerTask.id)continue;
      if(collected.has(t.id))continue;
      if(t.assignee_id!==triggerTask.assignee_id)continue;
      if(t.status==='done')continue;
      if(!t.start_date||!t.end_date)continue;
      const ts=t.start_date.slice(0,10),te=t.end_date.slice(0,10);
      if(!(ts<=oldEnd&&te>=oldStart))continue;
      collected.set(t.id,{t,reason:'worker_overlap'});
    }
  }
  // (c) Parent expansion: child 변경이 parent 범위 밖으로 나가면 parent 일정 자동 확장
  // status=done parent 는 제외 (이력 왜곡 방지). triggerTask 가 child 일 때만 작동.
  if(triggerTask.parent_task_id){
    const parent=(allTasks||[]).find(t=>t.id===triggerTask.parent_task_id);
    if(parent&&parent.start_date&&parent.end_date&&parent.status!=='done'){
      const ps=parent.start_date.slice(0,10),pe=parent.end_date.slice(0,10);
      const newPs=newStart<ps?newStart:ps;
      const newPe=newEnd>pe?newEnd:pe;
      if(newPs!==ps||newPe!==pe){
        collected.set(parent.id,{t:parent,reason:'parent_expand',forced_start:newPs,forced_end:newPe});
      }
    }
  }
  return Array.from(collected.values()).map(({t,reason,forced_start,forced_end})=>({
    task_id:t.id,
    title:t.title_object||t.title,
    current_start:t.start_date.slice(0,10),
    current_end:t.end_date.slice(0,10),
    proposed_start:forced_start||addBusinessDays(t.start_date.slice(0,10),delta),
    proposed_end:forced_end||addBusinessDays(t.end_date.slice(0,10),delta),
    cascade_reason:reason
  }));
}

const GATE_MAP={'설정/방향':'G0','IP 검수':'G1','컨셉 기획':'G2','컨셉':'G2','구현 기획':'G3','아트 요청':'G4','구현/제작':'G5','구현':'G5','재미검증':'G6','QA/폴리싱':'G7','QA':'G7','완료':'DONE','릴리즈':'DONE'};
function normalizeGate(raw){if(!raw)return null;const desc=String(raw).split(':').pop().trim();return GATE_MAP[desc]||null}
const STATUS_MAP={'시작 전':'waiting','진행 중':'progress','완료됨':'done','완료':'done','보류':'blocked','차단':'blocked','중단':'blocked'};
function normalizeStatus(raw){if(!raw)return 'waiting';return STATUS_MAP[String(raw).trim()]||'waiting'}
function normalizeDate(raw){
  if(!raw)return null;
  // xlsx.js cellDates:true 는 Date 객체

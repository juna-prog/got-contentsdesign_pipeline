.app{display:flex;flex-direction:column;height:100vh;max-width:none;margin:0 auto;padding:16px 56px 12px}
.b{display:inline-flex;align-items:center;font-size:12px;padding:3px 10px;border-radius:6px;font-weight:600;white-space:nowrap}

.pn{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);box-shadow:var(--sh);flex:1;overflow:hidden;display:flex;flex-direction:column}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

.split-left{flex:1;overflow:auto;padding:16px;min-width:0}
.split-right{border-left:1px solid var(--bd);overflow-y:auto;padding:16px;background:var(--bg2);flex-shrink:0}

/* Task 표시: [분류] title_object 또는 title. withName=true 시 콘텐츠명 접두사 추가 (JIRA와 동일 포맷) */
function formatTaskDisplay(task,content,opts){
  const o=opts||{};const cat=content?.category;const nm=content?.name;
  const main=(task?.title_object&&task.title_object.trim())||task?.title||task?.task_name||'';
  const parts=[];
  if(o.withName&&nm)parts.push(nm);
  if(cat)parts.push('['+String(cat).replace(/\s+/g,'')+']');
  parts.push(main);
  return parts.join(' ');
}

          return<div key={"m"+i} style={{position:"absolute",left:x,width:nextM-x,height:18,borderRight:"1px solid var(--bd)",borderBottom:"1px solid var(--bg3)",display:"flex",alignItems:"center",paddingLeft:6}}>

function GanttView({tasks,workers,milestones,parts,contents,versions,dependencies,depViolations,onDepRefresh,onTaskClick,user,onRefresh}){
  const[teamFilter,setTF]=useState("all");
  const[partFilter,setPF]=useState("all");
  const[verFilter,setVerF]=useState("all");
  const[collapsed,setCol]=useState({});
  const[expandedW,setExpW]=useState({}); // worker id -> show individual task rows
  const[expandedT,setExpT]=useState({}); // task id -> show sub-tasks
  const[tooltip,setTip]=useState(null);
  const[ganttScale,setGS]=useState(30);
  const[holFilter,setHolF]=useState({KR:true,US:false,JP:true,TW:false,HK:false,IN:false,TH:false});
  const[showHol,setShowHol]=useState(true);
  const[showDone,setShowDone]=useState(false);
  const[workerPopup,setWP]=useState(null); // {worker, tasks, x, y}
  // v22 Track 8: task 막대 드래그 일정 조정
  // dragTask = {task, mode:'move'|'resize-left'|'resize-right', origX, origDs, origDe, curDs, curDe, _lastDays}
  const[dragTask,setDragTask]=useState(null);
  // dragCommit = {task, mode, newStart, newEnd} → ScheduleRequestModal 호출 트리거
  const[dragCommit,setDragCommit]=useState(null);
  // v22 Track 10: BP 노드 연결 (의존성 추가/삭제)
  // connectDrag = {srcTask, curX, curY, hoverTargetId}
  const[connectDrag,setConnectDrag]=useState(null);
  // deleteDepDialog = {dep} → 의존성 삭제 confirm
  const[deleteDepDialog,setDeleteDepDialog]=useState(null);
  const chartRef=useRef(null);const ganttWrapRef=useRef(null);const namesRef=useRef(null);const ganttDrag=useRef(null);
  // Right-click drag scroll for gantt chart (v22 Track 8: task 막대 위에서는 비활성)
  useEffect(()=>{const el=chartRef.current;if(!el)return;
    const onDown=e=>{if(e.button!==0)return;
      // task 막대 / 의존성 핀 위 클릭 → 막대 드래그 / 핀 드래그 우선, 화면 스크롤 드래그 비활성
      if(e.target&&e.target.closest&&e.target.closest('.gantt-bar,.gantt-pin'))return;
      e.preventDefault();ganttDrag.current={x:e.clientX,y:e.clientY,sl:el.scrollLeft,st:el.scrollTop};el.style.cursor="grabbing"};
    const onMove=e=>{if(!ganttDrag.current)return;el.scrollLeft=ganttDrag.current.sl-(e.clientX-ganttDrag.current.x);el.scrollTop=ganttDrag.current.st-(e.clientY-ganttDrag.current.y)};
    const onUp=()=>{if(ganttDrag.current){ganttDrag.current=null;el.style.cursor=""}};
    el.addEventListener("mousedown",onDown);window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return()=>{el.removeEventListener("mousedown",onDown);window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp)};
  },[]);
  // Sync vertical scroll between names and chart (scroll + wheel)
  useEffect(()=>{
    const n=namesRef.current,c=chartRef.current;if(!n||!c)return;let source=null;let raf=null;
    const clearSource=()=>{raf=requestAnimationFrame(()=>{source=null})};
    const onScrollN=()=>{if(source==="chart")return;source="names";c.scrollTop=n.scrollTop;clearSource()};
    const onScrollC=()=>{if(source==="names")return;source="chart";n.scrollTop=c.scrollTop;clearSource()};
    // Wheel on chart: sync names (non-Ctrl wheel = vertical scroll)
    const onWheelC=e=>{if(e.ctrlKey)return;n.scrollTop=c.scrollTop};
    const onWheelN=e=>{if(e.ctrlKey)return;c.scrollTop=n.scrollTop};
    n.addEventListener("scroll",onScrollN);c.addEventListener("scroll",onScrollC);
    c.addEventListener("wheel",onWheelC,{passive:true});n.addEventListener("wheel",onWheelN,{passive:true});
    return()=>{n.removeEventListener("scroll",onScrollN);c.removeEventListener("scroll",onScrollC);
      c.removeEventListener("wheel",onWheelC);n.removeEventListener("wheel",onWheelN);if(raf)cancelAnimationFrame(raf)};
  },[]);
  useEffect(()=>{const el=ganttWrapRef.current;if(!el)return;const h=e=>{if(!e.ctrlKey)return;e.preventDefault();setGS(s=>Math.max(30,Math.min(50,s+(e.deltaY<0?0.2:-0.2))))};el.addEventListener("wheel",h,{passive:false});return()=>el.removeEventListener("wheel",h)},[]);
  useEffect(()=>{if(!workerPopup)return;const h=e=>{if(!e.target.closest('[style*="z-index: 200"]')&&!e.target.closest('.gantt-name'))setWP(null)};document.addEventListener("mousedown",h);return()=>document.removeEventListener("mousedown",h)},[workerPopup]);
  // Auto-scroll to Today on mount
  useEffect(()=>{const el=chartRef.current;if(!el||todayX===null)return;const offset=40;setTimeout(()=>{el.scrollLeft=Math.max(0,todayX-offset)},200)},[todayX]);

  // Timeline config - day-based like MilestoneTimeline
  const startDate=new Date(2026,3,1); // Apr 1
  const endDate=new Date(2027,1,1); // Feb 1
  const totalDays=Math.ceil((endDate-startDate)/(24*60*60*1000));
  const dayWidth=ganttScale*1.2; // matches MilestoneTimeline baseWidth formula
  const totalWidth=totalDays*dayWidth;
  const rowH=32;
  const DOW=["일","월","화","수","목","금","토"];

  // Generate days
  const days=useMemo(()=>{const d=[];let cur=new Date(startDate);while(cur<endDate){d.push(new Date(cur));cur=new Date(cur.getTime()+24*60*60*1000)}return d},[]);

  // Generate months from days

      else{m[m.length-1].days++}

  },[days]);

  // Holiday lookup for gantt
  const holDates=useMemo(()=>{
    const s=new Set();

      hols.forEach(h=>s.add(h.d));
    });

  },[holFilter]);

  // Forced part lead names (planning team)
  const FORCED_LEADS={"combat":"정하진","level":"정성민","field":"박찬현","quest":"권재만"};

  // Group workers by part, filtered, part leads first
  const groupedWorkers=useMemo(()=>{
    const filtered=(workers||[]).filter(w=>{
      if(teamFilter!=="all"&&TEAM_MAP[w.part_id]!==teamFilter)return false;
      if(partFilter!=="all"&&w.part_id!==partFilter)return false;
      return true;
    });
    const g={};
    filtered.forEach(w=>{
      const pid=w.part_id||"other";
      if(!g[pid])g[pid]=[];
      g[pid].push(w);
    });
    // Sort: part leads first, then forced leads, then alphabetical
    Object.keys(g).forEach(pid=>{
      g[pid].sort((a,b)=>{
        const aLead=a.is_part_lead||a.name===FORCED_LEADS[pid]?1:0;
        const bLead=b.is_part_lead||b.name===FORCED_LEADS[pid]?1:0;
        if(bLead!==aLead)return bLead-aLead;
        return(a.name||"").localeCompare(b.name||"");
      });
    });
    return g;
  },[workers,teamFilter,partFilter]);

  // ── DEPS DERIVED ──
  const taskById=useMemo(()=>{const m={};(tasks||[]).forEach(t=>m[t.id]=t);return m},[tasks]);
  const blockingByTask=useMemo(()=>{const m={};(dependencies||[]).forEach(d=>{
    if(d.dep_type!=='finishes_before')return;
    const pred=taskById[d.depends_on_task_id];
    if(!pred||pred.status==='done')return;
    (m[d.task_id]=m[d.task_id]||[]).push({pred_id:d.depends_on_task_id,pred_title:pred.title||'',pred_status:pred.status});
  });return m},[dependencies,taskById]);
  const violationByTask=useMemo(()=>{const m={};(depViolations||[]).forEach(v=>{(m[v.task_id]=m[v.task_id]||[]).push(v)});return m},[depViolations]);

  // Map tasks to workers (including multi-assignees), optionally filtering done
  // Split into scheduled vs backlog (no start AND no end date, and not ongoing)
  const{workerTasks,backlogTasks}=useMemo(()=>{
    const m={};const bl=[];const added=new Set();
    const effVer=t=>t.version_id||(t.contents&&t.contents.version_id)||null;
    const filtered=(tasks||[]).filter(t=>showDone||t.status!=="done").filter(t=>{
      if(verFilter==="all")return true;
      if(verFilter==="unassigned")return !effVer(t);
      return effVer(t)===verFilter;
    });
    filtered.forEach(t=>{
      const hasDate=t.start_date||t.end_date;
      if(!hasDate){bl.push(t);return}
      if(t.assignee_id){if(!m[t.assignee_id])m[t.assignee_id]=[];m[t.assignee_id].push(t);added.add(t.assignee_id+'::'+t.id)}
      if(t.task_assignees){for(const ta of t.task_assignees){const k=ta.worker_id+'::'+t.id;if(!added.has(k)){if(!m[ta.worker_id])m[ta.worker_id]=[];m[ta.worker_id].push({...t,_is_secondary:ta.worker_id!==t.assignee_id});added.add(k)}}}
    });
    return{workerTasks:m,backlogTasks:bl};
  },[tasks,showDone,verFilter]);
  const[showBacklog,setShowBacklog]=useState(false);

  // Position calc - day based
  const dateToX=(date)=>{
    if(!date)return null;
    const d=new Date(date);
    const diff=(d-startDate)/(24*60*60*1000);
    return diff*dayWidth;
  };

  const todayX=dateToX(new Date());

  // v22 Track 8: 드래그 권한 체크 + bar onMouseDown 헬퍼
  const isAdminUser=user&&(user.is_team_lead||user.is_lead);
  const canDragTask=t=>{
    if(!user||!t||!t.start_date||!t.end_date)return false;
    if(t.status==='done')return false;
    if(t._is_secondary)return false; // secondary assignee 는 드래그 불가
    if(isAdminUser)return true;
    return t.assignee_id===user.id; // 본인 owner
  };
  const addCalDays=(iso,n)=>{const d=new Date(iso+"T00:00:00");d.setDate(d.getDate()+n);const y=d.getFullYear();const mo=String(d.getMonth()+1).padStart(2,'0');const dd=String(d.getDate()).padStart(2,'0');return y+"-"+mo+"-"+dd};
  const beginDrag=(t,e)=>{
    if(!canDragTask(t))return;
    const rect=e.currentTarget.getBoundingClientRect();
    const offsetX=e.clientX-rect.left;
    const w=rect.width;
    const HANDLE=8;
    let mode='move';
    if(offsetX<HANDLE)mode='resize-left';
    else if(offsetX>w-HANDLE)mode='resize-right';
    const ds=t.start_date.slice(0,10),de=t.end_date.slice(0,10);
    setDragTask({task:t,mode,origX:e.clientX,origDs:ds,origDe:de,curDs:ds,curDe:de,_lastDays:0,_dx:0});
    e.preventDefault();

  };
  // Global mousemove/mouseup listeners during drag
  useEffect(()=>{
    if(!dragTask)return;

  const assigneeFilter=filters?.tsAssignee||"all";const setAF=v=>onFilterChange?.("tsAssignee",v);

  const searchQ=filters?.tsSearch||"";const setSearchQ=v=>onFilterChange?.("tsSearch",v);
  const sortBy=filters?.tsSort||"default";const setSortBy=v=>onFilterChange?.("tsSort",v);
  const[justSavedVer,setJustSavedVer]=useState(null);
  const chgRowVersion=async(tid,vid)=>{
    const t=(tasks||[]).find(x=>x.id===tid);
    const oldVid=t?.version_id||null;const newVid=vid||null;
    if(oldVid===newVid)return;
    try{
      await db.updTask(tid,{version_id:newVid});
      if(user)db.addChange({content_id:t?.content_id||null,task_id:tid,field:"version_id",old_value:oldVid||"-",new_value:newVid||"-",reason:"버전 재배정",changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
      setJustSavedVer(tid);
      setTimeout(()=>setJustSavedVer(p=>p===tid?null:p),800);
      window.showToast&&window.showToast("버전 저장됨");
      onRefresh&&onRefresh(true);
    }catch(e){alert("버전 변경 실패: "+(e.message||e))}
  };
  const[collapsed,setCol]=useState(null);
  const[partOrder,setPartOrder]=useState(null);
  const[taskExpanded,setTE]=useState({});

  // ── DEPS DERIVED (same pattern as GanttView) ──
  const taskByIdDep=useMemo(()=>{const m={};(tasks||[]).forEach(t=>m[t.id]=t);return m},[tasks]);
  const blockingByTask=useMemo(()=>{const m={};(dependencies||[]).forEach(d=>{
    if(d.dep_type!=='finishes_before')return;
    const pred=taskByIdDep[d.depends_on_task_id];
    if(!pred||pred.status==='done')return;
    (m[d.task_id]=m[d.task_id]||[]).push({pred_id:d.depends_on_task_id,pred_title:pred.title||'',pred_status:pred.status});
  });return m},[dependencies,taskByIdDep]);
  const violationByTask=useMemo(()=>{const m={};(depViolations||[]).forEach(v=>{(m[v.task_id]=m[v.task_id]||[]).push(v)});return m},[depViolations]);

  const grouped=useMemo(()=>{
    const wMap={};(workers||[]).forEach(w=>wMap[w.id]=w);
    const cMap={};(contents||[]).forEach(c=>cMap[c.id]=c);
    const rows=(tasks||[]).map(t=>{
      const w=wMap[t.assignee_id]||{};const c=cMap[t.content_id]||t.contents||{};
      const team=TEAM_MAP[w.part_id]||"기타";const part=PART_LABELS[w.part_id]||w.part_id||"미배정";
      const effVerId=t.version_id||c.version_id||null;
      const ver=(versions||[]).find(v=>v.id===effVerId);
      const contentVer=(versions||[]).find(v=>v.id===c.version_id);
      const qaDeadline=ver?.target_date?new Date(new Date(ver.target_date).getTime()-30*24*60*60*1000):null;
      const endD=t.end_date?new Date(t.end_date):null;
      const risk=(!endD||!qaDeadline)?"":t.status==="done"?"안정":endD>qaDeadline?"위험":"안정";
      const allAssignees=(t.task_assignees||[]).map(ta=>ta.workers).filter(Boolean);
      const assigneeDisplay=allAssignees.length>1?(allAssignees[0].name+' +'+(allAssignees.length-1)):(w.name||t.workers?.name||"미배정");
      const assigneeTooltip=allAssignees.length>1?allAssignees.map(a=>a.name).join(', '):null;
      return{...t,workerName:w.name||t.workers?.name||"미배정",assigneeDisplay,assigneeTooltip,allAssigneeNames:allAssignees.map(a=>a.name),team,part,contentName:c.name||t.contents?.name||"",contentCategory:c.category||t.contents?.category||"",contentType:c.type||"",partId:w.part_id||"",risk,qaDeadline,effVerId,versionLabel:ver?.label||"",contentVersionId:c.version_id||null,contentVersionLabel:contentVer?.label||"",versionMismatch:!!(t.version_id&&c.version_id&&t.version_id!==c.version_id)};
    });
    // Build parent/children map
    const byId=new Map();rows.forEach(r=>byId.set(r.id,r));
    const childrenMap=new Map();
    rows.forEach(r=>{if(r.parent_task_id){if(!childrenMap.has(r.parent_task_id))childrenMap.set(r.parent_task_id,[]);childrenMap.get(r.parent_task_id).push(r)}});
    rows.forEach(r=>r._children=childrenMap.get(r.id)||[]);
    // Filter helper
    const q=(searchQ||"").toLowerCase().trim();
    const matchRow=(r)=>{
      if(teamTab!=="all"&&r.team!==teamTab)return false;
      if(partFilter!=="all"&&r.partId!==partFilter)return false;
      if(statusFilter!=="all"&&r.status!==statusFilter)return false;
      if(assigneeFilter!=="all"&&r.workerName!==assigneeFilter&&!(r.allAssigneeNames||[]).includes(assigneeFilter))return false;
      if(versionFilter!=="all"){
        if(versionFilter==="unassigned"){if(r.effVerId)return false}
        else if(r.effVerId!==versionFilter)return false;
      }
      if(q&&!(r.workerName||"").toLowerCase().includes(q)&&!(r.contentName||"").toLowerCase().includes(q)&&!(r.title||"").toLowerCase().includes(q))return false;
      return true;
    };
    const filtered=rows.filter(r=>!r.parent_task_id).filter(r=>matchRow(r)||(r._children||[]).some(matchRow));
    // Sort (support key and key_desc)
    const sortKey=sortBy.replace(/_desc$/,"");const sortDesc=sortBy.endsWith("_desc");
    const cmp=(a,b)=>{
      if(sortKey==="worker")return(a.workerName||"").localeCompare(b.workerName||"");
      if(sortKey==="team")return(a.team||"").localeCompare(b.team||"")||(a.part||"").localeCompare(b.part||"");
      if(sortKey==="part")return(a.part||"").localeCompare(b.part||"");
      if(sortKey==="content")return(a.contentName||"").localeCompare(b.contentName||"");
      if(sortKey==="title")return(a.title||"").localeCompare(b.title||"");
      if(sortKey==="start")return(a.start_date||"9999").localeCompare(b.start_date||"9999");
      if(sortKey==="end")return(a.end_date||"9999").localeCompare(b.end_date||"9999");
      if(sortKey==="days")return(a.days||9999)-(b.days||9999);
      if(sortKey==="risk"){const o={"위험":0,"안정":1,"":2};return(o[a.risk]??9)-(o[b.risk]??9)}
      if(sortKey==="status"){const o={blocked:0,progress:1,waiting:2,done:3};return(o[a.status]??9)-(o[b.status]??9)}
      if(sortKey==="version"){
        const va=(versions||[]).find(x=>x.id===a.effVerId);const vb=(versions||[]).find(x=>x.id===b.effVerId);
        return(va?.sort_order??9999)-(vb?.sort_order??9999);
      }
      return 0;
    };
    if(sortKey!=="default")filtered.sort((a,b)=>{const r=cmp(a,b);return sortDesc?-r:r});
    const g={};filtered.forEach(r=>{const k=r.part;if(!g[k])g[k]=[];g[k].push(r)});
    return g;
  },[tasks,workers,contents,versions,teamTab,partFilter,statusFilter,assigneeFilter,versionFilter,searchQ,sortBy]);

  // Initialize collapsed (all collapsed by default) and part order
  const partKeys=useMemo(()=>Object.keys(grouped),[grouped]);
  useEffect(()=>{if(collapsed===null&&partKeys.length>0){const c={};partKeys.forEach(k=>c[k]=true);setCol(c)}},[partKeys]);
  useEffect(()=>{if(partOrder===null&&partKeys.length>0)setPartOrder(partKeys)},[partKeys]);

  const teamKeys=[...new Set(Object.values(TEAM_MAP))].sort();
  const assignees=[...new Set((tasks||[]).flatMap(t=>{const names=[t.workers?.name];if(t.task_assignees)t.task_assignees.forEach(ta=>{if(ta.workers?.name)names.push(ta.workers.name)});return names}).filter(Boolean))].sort();
  const totalFiltered=Object.values(grouped).reduce((s,arr)=>s+arr.length,0);
  const toggleC=k=>setCol(p=>({...p,[k]:!p[k]}));

  // Part reorder
  const movePart=(part,dir)=>{
    setPartOrder(prev=>{const arr=[...(prev||partKeys)];const i=arr.indexOf(part);if(i<0)return arr;const ni=i+dir;if(ni<0||ni>=arr.length)return arr;[arr[i],arr[ni]]=[arr[ni],arr[i]];return arr});
  };
  // Sorted entries
  const sortedParts=useMemo(()=>{
    const order=partOrder||partKeys;
    // Include any new parts not in order
    const all=[...order,...partKeys.filter(k=>!order.includes(k))];
    return all.filter(k=>grouped[k]);
  },[partOrder,partKeys,grouped]);

  return<div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
    {/* Filters */}
    <div style={{padding:"8px 16px",borderBottom:"1px solid var(--bd)",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
      <span style={{fontSize:14,fontWeight:700}}>업무 시트</span>
      <span style={{fontSize:12,color:"var(--t4)"}}>{totalFiltered}건</span>
      <div style={{display:"flex",gap:4,marginLeft:8}}>
        <button className={"bt bt-s"+(teamTab==="all"?" on":"")} onClick={()=>setTT("all")}>전체</button>
        {teamKeys.map(t=><button key={t} className={"bt bt-s"+(teamTab===t?" on":"")} onClick={()=>setTT(t)}>{t}</button>)}
      </div>
      <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
        <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="검색 (이름/콘텐츠/태스크)"
          style={{fontSize:11,padding:"3px 8px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit",width:150}}/>
        <select value={partFilter} onChange={e=>setPF(e.target.value)} style={{fontSize:11,padding:"3px 6px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">파트 전체</option>
          {Object.keys(PART_LABELS).map(p=><option key={p} value={p}>{PART_LABELS[p]}</option>)}
        </select>
        <select value={statusFilter} onChange={e=>setSF(e.target.value)} style={{fontSize:11,padding:"3px 6px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">상태 전체</option>
          <option value="progress">진행 중</option><option value="waiting">대기</option><option value="done">완료</option><option value="blocked">차단</option>
        </select>
        <select value={assigneeFilter} onChange={e=>setAF(e.target.value)} style={{fontSize:11,padding:"3px 6px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">담당자 전체</option>
          {assignees.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
        <select value={versionFilter} onChange={e=>setVF(e.target.value)} title="태스크 버전 (task.version_id)" style={{fontSize:11,padding:"3px 6px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit"}}>
          <option value="all">버전 전체</option>
          <option value="unassigned">미배정</option>
          {(versions||[]).map(v=><option key={v.id} value={v.id}>{v.label}</option>)}
        </select>
        {sortBy!=="default"&&<button className="bt bt-s" onClick={()=>setSortBy("default")} style={{fontSize:10,padding:"2px 6px"}}>정렬 초기화</button>}
      </div>
    </div>

    {/* Table */}
    <div style={{overflow:"auto",flex:1,padding:"0 4px"}}>
      {/* Header - sortable columns */}
      {(()=>{
        const cols=[
          {key:"default",label:"#",w:"32px"},
          {key:"part",label:"파트",w:"70px"},
          {key:"worker",label:"담당자",w:"64px"},
          {key:"content",label:"카테고리",w:"120px"},
          {key:"title",label:"세부 내용",w:"1fr"},
          {key:"version",label:"버전",w:"90px"},
          {key:"start",label:"시작일",w:"80px"},
          {key:"end",label:"완료일",w:"80px"},
          {key:"days",label:"소요",w:"50px"},
          {key:"risk",label:"위험도",w:"72px"},
        ];
        const curKey=sortBy.replace(/_desc$/,"");const isDesc=sortBy.endsWith("_desc");
        const handleSort=(key)=>{
          if(key==="default")return;
          if(curKey===key){setSortBy(isDesc?key:key+"_desc")}
          else{setSortBy(key)}
        };
        const arrow=(key)=>{if(curKey!==key)return"";return isDesc?" ▼":" ▲"};
        return<div style={{display:"grid",gridTemplateColumns:cols.map(c=>c.w).join(" "),gap:4,padding:"8px 12px",borderBottom:"2px solid var(--bd)",fontSize:11,fontWeight:700,color:"var(--t3)",position:"sticky",top:0,background:"var(--bg)",zIndex:3}}>
          {cols.map(c=><span key={c.key} onClick={()=>handleSort(c.key)}
            style={{cursor:c.key==="default"?"default":"pointer",userSelect:"none",whiteSpace:"nowrap",color:curKey===c.key?"var(--ac)":"var(--t3)"}}>{c.label}{arrow(c.key)}</span>)}
        </div>
      })()}
      {sortedParts.map((part,pi)=>{const rows=grouped[part];return<div key={part}>
        <div style={{padding:"8px 12px",background:"var(--bg3)",cursor:"pointer",display:"flex",alignItems:"center",gap:6,borderBottom:"1px solid var(--bd)"}} onClick={()=>toggleC(part)}>
          <span style={{fontSize:10,color:"var(--t4)"}}>{(collapsed||{})[part]?"▶":"▼"}</span>
          <span style={{fontSize:12,fontWeight:700,color:"var(--t1)"}}>{part}</span>
          <B ch={rows.length+"건"} c="b-a"/>
          <span style={{marginLeft:"auto",display:"flex",gap:2}} onClick={e=>e.stopPropagation()}>
            {pi>0&&<button onClick={()=>movePart(part,-1)} style={{background:"none",border:"1px solid var(--bd)",borderRadius:3,fontSize:10,color:"var(--t4)",cursor:"pointer",padding:"0 4px",lineHeight:"18px"}}>▲</button>}
            {pi<sortedParts.length-1&&<button onClick={()=>movePart(part,1)} style={{background:"none",border:"1px solid var(--bd)",borderRadius:3,fontSize:10,color:"var(--t4)",cursor:"pointer",padding:"0 4px",lineHeight:"18px"}}>▼</button>}
          </span>
        </div>
        {!(collapsed||{})[part]&&rows.map((t,i)=>{
          const tm=TM[t.contentType]||{};
          const hasChildren=(t._children||[]).length>0;
          const isExp=!!taskExpanded[t.id];
          const renderRow=(tt,isChild)=>{
            const ctm=TM[tt.contentType]||{};
            return<div key={tt.id} onClick={e=>{if(e.target.closest('select,button,a,input,.exp-btn'))return;onTaskClick&&onTaskClick(tt.id)}} style={{display:"grid",gridTemplateColumns:"32px 70px 64px 120px 1fr 90px 80px 80px 50px 72px",gap:4,padding:"6px 12px",borderBottom:"1px solid var(--bg3)",alignItems:"center",fontSize:12,background:isChild?"var(--bg2)":undefined,paddingLeft:isChild?24:12,cursor:onTaskClick?"pointer":"default"}}>
              <span style={{color:"var(--t4)",display:"flex",alignItems:"center",gap:2}}>{!isChild&&hasChildren?<button onClick={(e)=>{e.stopPropagation();setTE(p=>({...p,[t.id]:!p[t.id]}))}} style={{background:"none",border:"none",fontSize:10,cursor:"pointer",color:"var(--t3)",padding:0}}>{isExp?"▼":"▶"}</button>:isChild?<span style={{color:"var(--t4)"}}>└</span>:null}{isChild?"":i+1}{!isChild&&hasChildren?<span style={{fontSize:9,color:"var(--ac)",marginLeft:2}}>+{(t._children||[]).length}</span>:null}</span>
              <span style={{color:"var(--t3)",fontSize:11}}>{tt.part}</span>
              <span style={{color:"var(--t2)",fontSize:11}} title={tt.assigneeTooltip||tt.workerName}>{tt.assigneeDisplay||tt.workerName}</span>
              <span style={{color:ctm.c||"var(--t2)",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ctm.i||""} {tt.contentName}</span>
              {(()=>{const blk=blockingByTask[tt.id];const vio=violationByTask[tt.id];const disp=formatTaskDisplay(tt,{category:tt.contentCategory||tt.category});
              return<span style={{color:"var(--t1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:4,minWidth:0}} title={disp}>
                <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",minWidth:0,flex:1}}>{disp}</span>
                {blk&&<span title={"선행 미완료 "+blk.length+"건: "+blk.map(b=>b.pred_title).slice(0,3).join(', ')} style={{fontSize:10,color:"var(--rd)",fontWeight:700,flexShrink:0}}>⚠{blk.length}</span>}
                {vio&&<span title={"날짜 위반 "+vio.length+"건 (선행 종료보다 시작이 빠름)"} style={{fontSize:10,flexShrink:0}}>📅</span>}
              </span>})()}
              <select value={tt.version_id||''} onChange={e=>chgRowVersion(tt.id,e.target.value)}
                className={justSavedVer===tt.id?"ver-saved":""}
                title={tt.versionMismatch?("태스크 버전 ≠ 콘텐츠 버전 ("+tt.contentVersionLabel+")"):"태스크 버전 (task.version_id)"}
                style={{fontSize:10,padding:"2px 4px",border:"1px solid "+(tt.versionMismatch?"#f59e0b":"var(--bd)"),borderRadius:3,background:tt.versionMismatch?"#fef3c7":(tt.version_id?"var(--bg)":"var(--bg3)"),fontFamily:"inherit",minWidth:0,transition:"border-color .3s,box-shadow .3s"}}>
                <option value="">(콘텐츠 상속)</option>
                {(versions||[]).map(v=><option key={v.id} value={v.id}>{v.label}</option>)}
              </select>
              <span style={{fontSize:11,color:"var(--t4)"}}>{tt.start_date||"-"}</span>
              <span style={{fontSize:11,color:"var(--t4)"}}>{tt.end_date||"상시"}</span>
              <span style={{fontSize:11,color:"var(--t4)",textAlign:"right"}}>{tt.days?tt.days+"일":"-"}</span>
              <span style={{fontSize:10}}>{tt.risk?<B ch={tt.risk} c={tt.risk==="위험"?"b-r":"b-g"}/>:"-"}</span>
            </div>
          };
          return<React.Fragment key={t.id}>
            {renderRow(t,false)}
            {isExp&&(t._children||[]).map(c=>renderRow(c,true))}
          </React.Fragment>
        })}
      </div>})}
    </div>
  </div>
}

/* ═══ BUILD VIEW (Phase D) ═══ */
function BuildView({contents,tasks,versions,milestones,workers,dependencies,depViolations}){
  const[selVer,setSelVer]=useState("all");
  const[expandedIds,setExpandedIds]=useState({});
  const[exportModal,setExportModal]=useState(null);

  const toggleExpand=(id)=>setExpandedIds(p=>({...p,[id]:!p[id]}));

  // ── DEPS DERIVED (same pattern as GanttView) ──
  const taskByIdDep=useMemo(()=>{const m={};(tasks||[]).forEach(t=>m[t.id]=t);return m},[tasks]);
  const blockingByTask=useMemo(()=>{const m={};(dependencies||[]).forEach(d=>{
    if(d.dep_type!=='finishes_before')return;
    const pred=taskByIdDep[d.depends_on_task_id];
    if(!pred||pred.status==='done')return;
    (m[d.task_id]=m[d.task_id]||[]).push({pred_id:d.depends_on_task_id,pred_title:pred.title||'',pred_status:pred.status});
  });return m},[dependencies,taskByIdDep]);
  const violationByTask=useMemo(()=>{const m={};(depViolations||[]).forEach(v=>{(m[v.task_id]=m[v.task_id]||[]).push(v)});return m},[depViolations]);

  // Phase 5: group by task.version_id (fallback to content.version_id)
  // - 전체 뷰: 모든 콘텐츠를 content.version_id 버킷에 넣음 (기존 동작 유지)
  // - 특정 버전 선택: 해당 버전 태스크가 있는 콘텐츠만 + 그 태스크만 표시
  const versionGroups=useMemo(()=>{
    const groups={};
    (versions||[]).forEach(v=>{groups[v.id]={version:v,contents:[],taskCount:0,doneCount:0}});
    groups["unassigned"]={version:{id:"unassigned",label:"미배정",target_date:null,sort_order:999},contents:[],taskCount:0,doneCount:0};
    // content -> tasks map, then bucket tasks by version_id (task-level authority)
    const tasksByContent={};(tasks||[]).forEach(t=>{if(t.content_id){(tasksByContent[t.content_id]=tasksByContent[t.content_id]||[]).push(t)}});
    (contents||[]).forEach(c=>{
      const cTasks=tasksByContent[c.id]||[];
      const byVer={};
      cTasks.forEach(t=>{const vid=t.version_id||c.version_id||"unassigned";(byVer[vid]=byVer[vid]||[]).push(t)});
      // 콘텐츠가 태스크를 하나도 안 가지는 경우, content.version_id 버킷에 빈 상태로 배치
      if(cTasks.length===0){
        const vid=c.version_id||"unassigned";
        if(!groups[vid])groups[vid]={version:{id:vid,label:vid,target_date:null,sort_order:999},contents:[],taskCount:0,doneCount:0};
        groups[vid].contents.push({...c,_tasks:[],_done:0,_total:0,_contentVerId:c.version_id});
        return;
      }
      Object.entries(byVer).forEach(([vid,vTasks])=>{
        if(!groups[vid])groups[vid]={version:{id:vid,label:vid,target_date:null,sort_order:999},contents:[],taskCount:0,doneCount:0};
        const done=vTasks.filter(t=>t.status==="done").length;
        groups[vid].contents.push({...c,_tasks:vTasks,_done:done,_total:vTasks.length,_contentVerId:c.version_id,_bucketVerId:vid});
        groups[vid].taskCount+=vTasks.length;
        groups[vid].doneCount+=done;
      });
    });
    return Object.values(groups)
      .filter(g=>g.contents.length>0)
      .sort((a,b)=>(a.version.sort_order||999)-(b.version.sort_order||999));
  },[contents,tasks,versions]);

  const filtered=selVer==="all"?versionGroups:versionGroups.filter(g=>g.version.id===selVer);

  // 콘텐츠별 태스크 버전 분포 (동일 콘텐츠가 여러 버전에 걸친 경우 표시용)
  const contentVersionMap=useMemo(()=>{
    const m={};
    (tasks||[]).forEach(t=>{
      if(!t.content_id)return;
      const vid=t.version_id||(t.contents&&t.contents.version_id)||null;
      if(!vid)return;
      if(!m[t.content_id])m[t.content_id]=new Set();
      m[t.content_id].add(vid);
    });
    return m;
  },[tasks]);

  // Build note export
  const generateBuildNote=(group)=>{
    const v=group.version;
    const lines=[];
    lines.push("# "+v.label+(v.target_date?" ("+v.target_date+")":""));
    lines.push("");

    // Group contents by type
    const byType={};
    group.contents.forEach(c=>{
      const tm=TM[c.type]||{l:c.type||"기타",i:""};
      const key=tm.l;
      if(!byType[key])byType[key]=[];
      byType[key].push(c);
    });

    for(const[type,items] of Object.entries(byType)){
      lines.push("## "+type);
      items.forEach(c=>{
        const gi=GATES.findIndex(g=>g.id===c.gate);
        const gateLabel=GATES[gi]?(GATES[gi].l+" "+GATES[gi].s):(c.gate||"?");
        const progress=c._total>0?Math.round(c._done/c._total*100):0;
        lines.push("- **"+c.name+"** ["+gateLabel+"] "+progress+"% ("+c._done+"/"+c._total+")");
        if(c._tasks?.length){
          c._tasks.forEach(t=>{
            const st=SL[t.status]||t.status;
            const w=(workers||[]).find(x=>x.id===(t.assignee_id||(t.workers&&t.workers.id)));
            const assignee=w?w.name:(t.workers?.name||"");
            let line="  - "+st+": "+(t.title||"");
            if(assignee)line+=" ("+assignee+")";
            if(t.start_date&&t.end_date)line+=" "+t.start_date+"~"+t.end_date;
            if(t.jira_url)line+=" ["+t.jira_url.split("/").pop()+"]";
            lines.push(line);
          });
        }
      });
      lines.push("");
    }

    // Summary stats
    lines.push("---");
    lines.push("총 콘텐츠: "+group.contents.length+"건 / 태스크: "+group.taskCount+"건 (완료 "+group.doneCount+"건, "+Math.round(group.doneCount/Math.max(group.taskCount,1)*100)+"%)");
    return lines.join("\n");
  };

  const copyBuildNote=(group)=>{
    const note=generateBuildNote(group);
    navigator.clipboard.writeText(note).then(()=>setExportModal(group.version.label));
    setTimeout(()=>setExportModal(null),2000);
  };

  const overallStats=useMemo(()=>{
    const s={contents:0,tasks:0,done:0,jira:0};
    filtered.forEach(g=>{s.contents+=g.contents.length;s.tasks+=g.taskCount;s.done+=g.doneCount;
      g.contents.forEach(c=>c._tasks?.forEach(t=>{if(t.jira_url)s.jira++}))});
    return s;
  },[filtered]);

  return<div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    {/* Header + filters */}
    <div style={{padding:"12px 16px",borderBottom:"1px solid var(--bd)",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",flexShrink:0}}>
      <span style={{fontSize:14,fontWeight:700,color:"var(--t1)"}}>빌드별 스펙</span>

                {daysLeft!==null&&<span className={"b "+(daysLeft<=0?"b-r":daysLeft<=14?"b-o":daysLeft<=30?"b-a":"b-g")}>
                  {daysLeft<=0?"지남":"D-"+daysLeft}

                <span style={{fontSize:11,color:"var(--t4)"}}>{group.contents.length}건 콘텐츠 / {group.taskCount}건 태스크</span>
              </div>
              {/* Progress bar */}
              <div style={{display:"flex",gap:2,marginTop:6,height:6}}>
                {group.taskCount>0?<>

                  <div style={{flex:1,background:"var(--bg3)",borderRadius:3}}/>
                </>:<div style={{flex:1,background:"var(--bg3)",borderRadius:3}}/>}
              </div>
              <div style={{fontSize:10,color:"var(--t4)",marginTop:3}}>{progress}% 완료 ({group.doneCount}/{group.taskCount})</div>
            </div>
            <button className="bt bt-s" onClick={()=>copyBuildNote(group)} title="빌드 노트를 클립보드에 복사">
              {exportModal===v.label?"복사됨!":"📋 빌드 노트"}
            </button>

          {/* Contents list */}
          <div style={{padding:"0 4px"}}>
            {group.contents.sort((a,b)=>{
              const ga=GATES.findIndex(g=>g.id===a.gate);const gb=GATES.findIndex(g=>g.id===b.gate);
              return gb-ga||(a.priority||0)-(b.priority||0);

                        return<span className="b" title={"여러 버전에 태스크 분산: "+vers} style={{background:"#ede9fe",color:"#6d28d9",fontSize:9,flexShrink:0}}>🔀{verSet.size}버전</span>})()}
                    </div>
                    <div style={{fontSize:10,color:"var(--t4)",marginTop:1}}>{c.owner||"미정"} · {c._total}건 태스크{selVer!=="all"&&c._contentVerId&&c._contentVerId!==v.id?<span style={{marginLeft:6,color:"#7c3aed"}}>· 기본 버전 {(versions||[]).find(x=>x.id===c._contentVerId)?.label||c._contentVerId}</span>:null}</div>
                  </div>

                  {gate&&<span className="b" style={{background:gate.c+"18",color:gate.c,fontSize:10}}>{gate.l} {gate.s}</span>}
                  {/* Mini progress */}
                  <div style={{width:48,height:4,background:"var(--bg3)",borderRadius:2,flexShrink:0}}>

                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>태스크</th>
                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>버전</th>
                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>담당</th>
                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>일정</th>
                      <th style={{padding:"4px 8px",textAlign:"left",color:"var(--t3)",fontWeight:500}}>JIRA</th>
                    </tr></thead>
                    <tbody>{c._tasks.map(t=>{

                      const tVer=(versions||[]).find(x=>x.id===tVerId);
                      const mismatch=!!(t.version_id&&c.version_id&&t.version_id!==c.version_id);
                      return<tr key={t.id} style={{borderBottom:"1px solid var(--bg3)"}}>
                        <td style={{padding:"3px 8px"}}><D s={t.status}/></td>
                        <td style={{padding:"3px 8px",maxWidth:240,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={t.title}>

                          {vio&&<span title={"날짜 위반 "+vio.length+"건"} style={{marginLeft:2,fontSize:10}}>📅</span>}
                        </td>
                        <td style={{padding:"3px 8px"}}>{tVer?<span className="b b-p" style={{fontSize:9,background:mismatch?"#fef3c7":undefined,color:mismatch?"#92400e":undefined}} title={mismatch?"태스크 버전 ≠ 콘텐츠 버전":""}>{tVer.label}{mismatch?" ⚠":""}</span>:<span style={{fontSize:9,color:"var(--t4)"}}>-</span>}</td>
                        <td style={{padding:"3px 8px",color:"var(--t3)"}}>{w?.name||""}</td>
                        <td style={{padding:"3px 8px",color:"var(--t4)",whiteSpace:"nowrap"}}>{t.start_date&&t.end_date?t.start_date.slice(5)+"~"+t.end_date.slice(5):""}</td>

                      </tr>})}</tbody>
                  </table>}
                </div>}
              </div>})}
          </div>
        </div>})}
    </div>
  </div>;
}

/* ═══ DEPENDENCY VIOLATIONS (Phase 5 후속) ═══ */
function DepViolationView({depViolations,tasks,workers,contents,onRefresh}){
  const[partFilter,setPartF]=useState("all");
  const[hideDone,setHideDone]=useState(true);
  const[sortBy,setSortBy]=useState("gap_desc");
  const tmap=useMemo(()=>{const m={};(tasks||[]).forEach(t=>m[t.id]=t);return m},[tasks]);
  const cmap=useMemo(()=>{const m={};(contents||[]).forEach(c=>m[c.id]=c);return m},[contents]);
  const wmap=useMemo(()=>{const m={};(workers||[]).forEach(w=>m[w.id]=w);return m},[workers]);

  const rows=useMemo(()=>{
    return(depViolations||[]).map(v=>{
      const t=tmap[v.task_id];const p=tmap[v.depends_on_task_id];
      if(!t||!p)return null;
      const startD=v.task_start?new Date(v.task_start):null;
      const endD=v.depends_on_end?new Date(v.depends_on_end):null;
      const gap=(startD&&endD)?Math.round((endD-startD)/(24*60*60*1000)):null;
      const part=(t.source_key||'').split('::')[0];
      const sev=gap===null?'?':gap<=3?'small':gap<=7?'medium':gap<=14?'large':'critical';
      const tW=wmap[t.assignee_id];const pW=wmap[p.assignee_id];
      const tC=cmap[t.content_id];const pC=cmap[p.content_id];
      const crossContent=t.content_id!==p.content_id;
      const crossPart=part!==(p.source_key||'').split('::')[0];
      const bothDone=t.status==='done'&&p.status==='done';
      const eitherDone=t.status==='done'||p.status==='done';
      return{v,t,p,gap,part,sev,tW,pW,tC,pC,crossContent,crossPart,bothDone,eitherDone};
    }).filter(Boolean);
  },[depViolations,tmap,cmap,wmap]);

  const filtered=useMemo(()=>{
    let r=rows;
    if(partFilter!=="all")r=r.filter(x=>x.part===partFilter);
    if(hideDone)r=r.filter(x=>!x.eitherDone);
    const[k,dir]=sortBy.endsWith('_desc')?[sortBy.slice(0,-5),-1]:[sortBy,1];
    r=[...r].sort((a,b)=>{
      if(k==='gap')return((a.gap||0)-(b.gap||0))*dir;
      if(k==='part')return(a.part||'').localeCompare(b.part||'')*dir;
      if(k==='sev'){const o={critical:0,large:1,medium:2,small:3,'?':4};return(o[a.sev]-o[b.sev])*dir}
      return 0;
    });
    return r;
  },[rows,partFilter,hideDone,sortBy]);

  const deleteDep=async(depId)=>{
    if(!confirm("이 의존성을 삭제할까요? (위반 아니라 dep 자체 제거)"))return;
    try{await db.delDep(depId);onRefresh&&onRefresh()}catch(e){alert("삭제 실패: "+e.message)}
  };

  const partCounts=rows.reduce((m,r)=>{m[r.part]=(m[r.part]||0)+1;return m},{});
  const byPart=rows.reduce((m,r)=>{if(r.eitherDone)return m;m[r.part]=(m[r.part]||0)+1;return m},{});
  const sevCounts=rows.filter(r=>!r.eitherDone).reduce((m,r)=>{m[r.sev]=(m[r.sev]||0)+1;return m},{});

  return<div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    <div style={{padding:"12px 16px",borderBottom:"1px solid var(--bd)",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span style={{fontSize:14,fontWeight:700,color:"var(--t1)"}}>⚠ 의존성 날짜 위반</span>
        <span style={{fontSize:11,color:"var(--t4)"}}>선행의 종료일이 후행의 시작일보다 뒤에 있는 dep</span>
        <span style={{marginLeft:8,fontSize:12}}>총 <b>{rows.length}</b>건 · 실효 <b style={{color:"var(--rd)"}}>{rows.filter(r=>!r.eitherDone).length}</b>건</span>
      </div>
      <div style={{marginTop:8,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
        <button className={"bt bt-s"+(partFilter==="all"?" on":"")} onClick={()=>setPartF("all")}>전체 ({rows.length})</button>
        {Object.entries(partCounts).sort((a,b)=>b[1]-a[1]).map(([p,n])=>
          <button key={p} className={"bt bt-s"+(partFilter===p?" on":"")} onClick={()=>setPartF(p)}>{PART_LABELS[p]||p} ({n}, 실효 {byPart[p]||0})</button>)}
        <label style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"var(--t3)",marginLeft:8,cursor:"pointer"}}>
          <input type="checkbox" checked={hideDone} onChange={e=>setHideDone(e.target.checked)}/>완료된 건 숨김
        </label>
        <div style={{marginLeft:"auto",display:"flex",gap:6,fontSize:11}}>
          <span style={{color:"var(--rd)",fontWeight:600}}>critical(15+): {sevCounts.critical||0}</span>
          <span style={{color:"#d97706",fontWeight:600}}>large(8-14): {sevCounts.large||0}</span>
          <span style={{color:"#ca8a04"}}>medium(4-7): {sevCounts.medium||0}</span>
          <span style={{color:"var(--t4)"}}>small(1-3): {sevCounts.small||0}</span>
        </div>
      </div>
    </div>
    <div style={{flex:1,overflow:"auto"}}>
      <div style={{display:"grid",gridTemplateColumns:"60px 70px 64px 1fr 90px 64px 1fr 90px 80px 40px",gap:4,padding:"8px 12px",borderBottom:"2px solid var(--bd)",fontSize:11,fontWeight:700,color:"var(--t3)",position:"sticky",top:0,background:"var(--bg)",zIndex:2}}>
        <span onClick={()=>setSortBy(sortBy==="sev"?"sev_desc":"sev")} style={{cursor:"pointer"}}>심각도{sortBy.startsWith("sev")?(sortBy.endsWith("_desc")?" ▼":" ▲"):""}</span>
        <span onClick={()=>setSortBy(sortBy==="gap"?"gap_desc":"gap")} style={{cursor:"pointer",textAlign:"right"}}>Gap일{sortBy.startsWith("gap")?(sortBy.endsWith("_desc")?" ▼":" ▲"):""}</span>
        <span onClick={()=>setSortBy(sortBy==="part"?"part_desc":"part")} style={{cursor:"pointer"}}>파트</span>
        <span>선행 태스크</span>
        <span>종료일</span>
        <span style={{textAlign:"center"}}>→</span>
        <span>후행 태스크</span>
        <span>시작일</span>
        <span>담당</span>
        <span></span>
      </div>
      {filtered.length===0?<div style={{padding:40,textAlign:"center",color:"var(--t4)"}}>해당 조건의 위반 없음</div>:
        filtered.map((x,i)=>{
        const sevC=x.sev==='critical'?'#dc2626':x.sev==='large'?'#d97706':x.sev==='medium'?'#ca8a04':'var(--t4)';
        const sevL={critical:'치명',large:'큰편',medium:'중간',small:'약간'}[x.sev]||'?';
        return<div key={x.v.dep_id} style={{display:"grid",gridTemplateColumns:"60px 70px 64px 1fr 90px 64px 1fr 90px 80px 40px",gap:4,padding:"6px 12px",borderBottom:"1px solid var(--bg3)",alignItems:"center",fontSize:12,background:x.eitherDone?"var(--bg2)":undefined,opacity:x.eitherDone?.65:1}}>
          <span className="b" style={{background:sevC+"18",color:sevC,fontSize:10,fontWeight:600}}>{sevL}</span>
          <span style={{textAlign:"right",fontWeight:600,color:sevC}}>{x.gap!==null?x.gap+"일":"-"}</span>
          <span style={{fontSize:10,color:"var(--t3)"}}>{PART_LABELS[x.part]||x.part}{x.crossPart&&<span title="크로스 파트" style={{color:"var(--or)",marginLeft:2}}>*</span>}</span>
          <span title={x.v.depends_on_title} style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:x.p.status==='done'?"var(--t4)":"var(--t2)",textDecoration:x.p.status==='done'?"line-through":"none"}}>
            {x.pC?.name&&<span style={{color:"var(--t4)",fontSize:10,marginRight:3}}>[{x.pC.name.slice(0,8)}]</span>}
            {x.v.depends_on_title}
          </span>
          <span style={{fontSize:11,color:"var(--t4)"}}>{x.v.depends_on_end||"-"}</span>
          <span style={{textAlign:"center",color:"var(--rd)"}}>→</span>
          <span title={x.v.task_title} style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",color:x.t.status==='done'?"var(--t4)":"var(--t2)",textDecoration:x.t.status==='done'?"line-through":"none"}}>
            {x.tC?.name&&x.crossContent&&<span style={{color:"var(--or)",fontSize:10,marginRight:3}}>[{x.tC.name.slice(0,8)}]</span>}
            {x.v.task_title}
          </span>
          <span style={{fontSize:11,color:"var(--t4)"}}>{x.v.task_start||"-"}</span>
          <span style={{fontSize:10,color:"var(--t3)"}}>{x.tW?.name||x.pW?.name||""}</span>
          <button onClick={()=>deleteDep(x.v.dep_id)} title="이 의존성 삭제" style={{background:"none",border:"1px solid var(--bd)",borderRadius:3,fontSize:10,color:"var(--t4)",cursor:"pointer",padding:"1px 4px"}}>✕</button>
        </div>})}
    </div>
  </div>;
}

/* ═══ SLOT STATUS ═══ */
function SlotView({workers,tasks}){
  const[teamTab,setTT]=useState("all");
  const[selWorker,setSelW]=useState(null);
  const[rightW,setRW]=useState(400);
  const splitRef=useRef(null);const dragRef=useRef(false);
  const now=new Date();

  useEffect(()=>{
    const onMove=e=>{if(!dragRef.current||!splitRef.current)return;const rect=splitRef.current.getBoundingClientRect();setRW(Math.max(280,Math.min(rect.width*0.6,rect.right-e.clientX)))};
    const onUp=()=>{if(dragRef.current){dragRef.current=false;document.body.style.cursor="";document.body.style.userSelect=""}};
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp)};
  },[]);

  const data=useMemo(()=>{
    const wMap={};
    const added=new Set();
    (tasks||[]).forEach(t=>{
      const addTo=(wid)=>{const k=wid+'::'+t.id;if(added.has(k))return;if(!wMap[wid])wMap[wid]=[];wMap[wid].push(t);added.add(k)};
      if(t.assignee_id)addTo(t.assignee_id);
      if(t.task_assignees){for(const ta of t.task_assignees)addTo(ta.worker_id)}
    });
    const teams={};
    (workers||[]).forEach(w=>{
      const team=TEAM_MAP[w.part_id]||"기타";const part=PART_LABELS[w.part_id]||w.part_id;
      if(!teams[team])teams[team]={};if(!teams[team][part])teams[team][part]=[];
      const wTasks=wMap[w.id]||[];
      // 부모 태스크만 카운트 (서브태스크는 상세 패널에서만)
      const activeTasks=wTasks.filter(t=>!t.parent_task_id&&(t.status==="progress"||t.status==="waiting"));
      const endDates=activeTasks.filter(t=>t.end_date).map(t=>new Date(t.end_date));
      const latestEnd=endDates.length?new Date(Math.max(...endDates)):null;
      const freeIn=latestEnd?Math.max(0,Math.ceil((latestEnd-now)/(24*60*60*1000))):0;
      teams[team][part].push({...w,active:activeTasks.length,allTasks:wTasks,activeTasks,freeInDays:freeIn,isFree:activeTasks.length===0});
    });
    return teams;
  },[workers,tasks]);

  const teamKeys=Object.keys(data).sort();
  const filtered=teamTab==="all"?data:data[teamTab]?{[teamTab]:data[teamTab]}:{};

  // Find dependency tasks
  const depMap=useMemo(()=>{const m={};(tasks||[]).forEach(t=>{m[t.id]=t});return m},[tasks]);

  return<div style={{display:"flex",flex:1,overflow:"hidden"}} ref={splitRef}>
    {/* Left: cards */}
    <div style={{flex:1,overflow:"auto",padding:16,minWidth:0}}>
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
        <span style={{fontSize:15,fontWeight:700}}>슬롯 상태</span>
        <span style={{fontSize:12,color:"var(--t4)"}}>팀/파트별 작업자 현황</span>
        <div style={{marginLeft:"auto",display:"flex",gap:4}}>
          <button className={"bt bt-s"+(teamTab==="all"?" on":"")} onClick={()=>setTT("all")}>전체</button>
          {teamKeys.map(t=><button key={t} className={"bt bt-s"+(teamTab===t?" on":"")} onClick={()=>setTT(t)}>{t}</button>)}
        </div>
      </div>

      {(()=>{const done=selWorker.allTasks.filter(t=>t.status==="done");

          <div style={{fontSize:13,fontWeight:700,marginBottom:6,color:"var(--t3)"}}>완료 ({done.length})</div>

}

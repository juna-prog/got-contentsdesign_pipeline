function TemplateApplyModal({content,onClose,onDone}){
  const[templates,setTemplates]=useState([]);
  const[loading,setLoading]=useState(true);
  const[tplId,setTplId]=useState(null);
  const[startDate,setStartDate]=useState(new Date().toISOString().slice(0,10));
  const[saving,setSaving]=useState(false);
  const[error,setError]=useState(null);

  useEffect(()=>{db.templates().then(ts=>{setTemplates(ts||[]);setLoading(false)}).catch(()=>{setTemplates([]);setLoading(false)})},[]);

  const partPrefix=(content?.source_key||'').split('::')[0];
  const filtered=(templates||[]).filter(t=>!partPrefix||t.part_id===partPrefix);
  const allParts=!partPrefix||filtered.length===0;
  const shown=allParts?(templates||[]):filtered;
  const tpl=shown.find(t=>t.id===tplId);

  const preview=useMemo(()=>{
    if(!tpl||!content)return[];
    const base=new Date(startDate);
    return(tpl.steps||[]).map(s=>{
      const sd=new Date(base);sd.setDate(sd.getDate()+(s.offset_days||0));
      const ed=new Date(sd);ed.setDate(ed.getDate()+Math.max(1,s.duration||1)-1);
      return{
        action_verb:s.action_verb||null,
        title_object:content.name,
        title:composeTitle(content.name,s.action_verb),
        start_date:sd.toISOString().slice(0,10),
        end_date:ed.toISOString().slice(0,10),
        days:s.duration||1,
        _dep_on_verb:s.depends_on||null,
        _dep_type:s.dep_type||'finishes_before'
      };
    });
  },[tpl,startDate,content]);

  const apply=async()=>{
    if(!tpl||!content)return;
    setSaving(true);setError(null);
    try{
      const now=new Date().toISOString();
      const payload=preview.map((p,i)=>({
        content_id:content.id,
        title:p.title,title_object:p.title_object,action_verb:p.action_verb,
        issue_type:'Task',status:'waiting',
        start_date:p.start_date,end_date:p.end_date,days:p.days,
        version_id:content.version_id||null,
        source_key:(content.source_key||('tpl::'+content.id))+'::tpl:'+tpl.code+':'+(p.action_verb||i),
        imported_at:now,sort_order:i
      }));
      const created=await db.bulkTasks(payload);
      if(!created||!Array.isArray(created)||created.length===0)throw new Error('태스크 생성 응답 없음');
      const verbToId={};(created||[]).forEach(c=>{if(c.action_verb)verbToId[c.action_verb]=c.id});
      const depList=[];
      preview.forEach(p=>{
        if(!p._dep_on_verb)return;
        const succ=verbToId[p.action_verb];const pred=verbToId[p._dep_on_verb];
        if(succ&&pred)depList.push({task_id:succ,depends_on_task_id:pred,dep_type:p._dep_type,created_by:'template:'+tpl.code,notes:null});
      });
      let depOk=0,depFail=0;
      for(const d of depList){try{await db.addDep(d);depOk++}catch(e){depFail++}}
      onDone&&onDone({tasks:created.length,deps:depOk,depFail});
      onClose();
    }catch(e){setError((e.message||'').slice(0,240));setSaving(false)}
  };

  return<div className="modal-bg" onClick={saving?undefined:onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:620,width:"90vw",maxHeight:"85vh",display:"flex",flexDirection:"column"}}>
      <div className="modal-h">📋 표준 태스크 생성 - {content?.name||""}</div>
      <div className="modal-b" style={{overflow:"auto",flex:1}}>
        {loading?<div style={{fontSize:12,color:"var(--t4)",padding:12}}>템플릿 불러오는 중...</div>:
        shown.length===0?<div style={{fontSize:12,color:"var(--t4)",padding:12}}>사용 가능한 템플릿이 없습니다.</div>:<>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:4,fontWeight:600}}>템플릿 {allParts&&<span style={{fontWeight:400,color:"var(--t4)"}}>(파트 {partPrefix||"?"}용 없음 - 전체 표시)</span>}</div>
            <select value={tplId||''} onChange={e=>setTplId(parseInt(e.target.value)||null)}
              style={{width:"100%",fontSize:12,padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit"}}>
              <option value="">선택하세요...</option>
              {shown.map(t=><option key={t.id} value={t.id}>[{t.part_id}] {t.label} ({(t.steps||[]).length}스텝)</option>)}
            </select>
            {tpl&&<div style={{fontSize:11,color:"var(--t4)",marginTop:6}}>{tpl.description}</div>}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:4,fontWeight:600}}>시작일 (기준일 offset 0일)</div>
            <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
              style={{fontSize:12,padding:"5px 8px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit"}}/>
          </div>
          {preview.length>0&&<div style={{marginBottom:8}}>
            <div style={{fontSize:11,color:"var(--t3)",marginBottom:6,fontWeight:600}}>미리보기 ({preview.length}건 태스크 + {preview.filter(p=>p._dep_on_verb).length}건 의존성)</div>
            <div style={{border:"1px solid var(--bd)",borderRadius:4,maxHeight:280,overflow:"auto"}}>
              {preview.map((p,i)=><div key={i} style={{padding:"6px 10px",borderBottom:"1px solid var(--bg3)",fontSize:11,display:"flex",alignItems:"center",gap:6}}>
                <span style={{color:"#4338ca",fontWeight:600,minWidth:96,fontSize:10}}>[{ACTION_VERBS[p.action_verb]||p.action_verb||"-"}]</span>
                <span style={{flex:1,color:"var(--t2)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={p.title}>{p.title_object}</span>
                <span style={{color:"var(--t4)",fontSize:10,whiteSpace:"nowrap"}}>{p.start_date.slice(5)}~{p.end_date.slice(5)} ({p.days}일)</span>
                {p._dep_on_verb&&<span title={"선행: "+(ACTION_VERBS[p._dep_on_verb]||p._dep_on_verb)+" ("+p._dep_type+")"}
                  style={{fontSize:10,color:p._dep_type==='finishes_before'?"#2563eb":"#0891b2",fontWeight:600}}>↩{p._dep_type==='finishes_before'?'FB':'ST'}</span>}
              </div>)}
            </div>
          </div>}
          {error&&<div style={{color:"var(--rd)",fontSize:11,padding:"6px 8px",background:"var(--rd-bg)",borderRadius:4,marginTop:8}}>{error}</div>}
        </>}
      </div>
      <div className="modal-f">
        <button className="bt" onClick={onClose} disabled={saving}>취소</button>
        <button className="bt bt-g" onClick={apply} disabled={!tpl||saving||loading||preview.length===0}>
          {saving?'생성 중...':preview.length>0?preview.length+'건 생성':'생성'}
        </button>
      </div>
    </div>
  </div>;
}

function tokenize(s){if(!s)return[];const str=String(s).toLowerCase();const toks=[];let buf='';for(const ch of str){if(/[\p{L}\p{N}]/u.test(ch))buf+=ch;else{if(buf.length>=2)toks.push(buf);buf=''}}if(buf.length>=2)toks.push(buf);return toks}
const STOPWORDS=new Set(['task','sub','작업','기획','제작','구현','설정','방향','작업','관리','대응','진행','문서','문서화','리스트','업무','관련','데이터','추가','변경','수정','확인','체크','기본','일반']);
function DependencyEditor({task,deps,allTasks,onClose,onRefresh}){
  const[selTaskId,setSelTaskId]=useState('');
  const[depType,setDepType]=useState('finishes_before');
  const[notes,setNotes]=useState('');
  const[saving,setSaving]=useState(false);
  const[err,setErr]=useState('');
  const[searchQ,setSearchQ]=useState('');
  const[showAll,setShowAll]=useState(false);
  const preds=useMemo(()=>(deps||[]).filter(d=>d.task_id===task.id),[deps,task.id]);
  const succs=useMemo(()=>(deps||[]).filter(d=>d.depends_on_task_id===task.id),[deps,task.id]);
  const taskMap=useMemo(()=>{const m={};(allTasks||[]).forEach(t=>m[t.id]=t);return m},[allTasks]);
  const targetTokens=useMemo(()=>{
    const t1=tokenize(task?.title_object||task?.title||'');
    const t2=tokenize(task?.contents?.name||'');
    return[...new Set([...t1,...t2])].filter(x=>!STOPWORDS.has(x));
  },[task]);
  const targetPartPrefix=useMemo(()=>{const sk=task?.source_key||'';return sk.includes('::')?sk.split('::')[0]:null},[task]);
  const scoreCandidate=(t)=>{
    let sc=0;
    if(t.content_id===task.content_id)sc+=100;
    if(t.action_verb&&t.action_verb===task.action_verb)sc+=30;
    const candPrefix=(t.source_key||'').split('::')[0];
    if(targetPartPrefix&&candPrefix===targetPartPrefix)sc+=5;
    const candToks=new Set([...tokenize(t.title_object||t.title||''),...tokenize(t.contents?.name||'')]);
    for(const tk of targetTokens)if(candToks.has(tk))sc+=10;
    return sc;
  };
  const candidates=useMemo(()=>{
    const existPred=new Set(preds.map(p=>p.depends_on_task_id));
    const q=(searchQ||'').toLowerCase().trim();
    const scored=(allTasks||[]).filter(t=>t.id!==task.id&&!existPred.has(t.id))
      .map(t=>({t,score:scoreCandidate(t)}));
    const filtered=q?scored.filter(({t})=>{
      const hay=((t.title||'')+' '+(t.title_object||'')+' '+(t.contents?.name||'')+' '+(t.contents?.category||'')).toLowerCase();
      return hay.includes(q);
    }):scored;
    filtered.sort((a,b)=>b.score-a.score||(a.t.title||'').localeCompare(b.t.title||''));
    return filtered;
  },[allTasks,task,preds,searchQ,targetTokens]);
  const add=async()=>{
    if(!selTaskId){setErr('선행 task 선택 필요');return}
    setSaving(true);setErr('');
    try{
      await db.addDep({task_id:task.id,depends_on_task_id:+selTaskId,dep_type:depType,notes:notes||null,created_by:'manual'});
      setSelTaskId('');setNotes('');onRefresh();
    }catch(e){
      const msg=e.message||'';
      if(msg.includes('Circular'))setErr('순환 의존성 발생 - 이 task가 이미 후행 체인에 포함됨');
      else if(msg.includes('uniq_dep'))setErr('이미 존재하는 의존성');
      else if(msg.includes('no_self_dep'))setErr('자기 자신을 선행으로 지정 불가');
      else setErr('오류: '+msg.slice(0,200));
    }
    setSaving(false);
  };
  const del=async(depId)=>{
    if(!confirm('의존성을 삭제하시겠습니까?'))return;
    try{await db.delDep(depId);onRefresh()}catch(e){alert('오류: '+e.message)}
  };
  const selTask=selTaskId?taskMap[+selTaskId]:null;
  const visibleCands=showAll?candidates:candidates.slice(0,20);
  return<div className="modal-bg" onClick={onClose}>
    <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:620}}>
      <div className="modal-h">🔗 의존성 편집</div>
      <div className="modal-b">
        <div style={{fontSize:13,fontWeight:600,color:"var(--t1)",marginBottom:4}}>{formatTaskDisplay(task,task.contents,{withName:true})}</div>
        <div style={{fontSize:11,color:"var(--t4)",marginBottom:12}}>
          {task.action_verb?ACTION_VERBS[task.action_verb]+' · ':''}{task.start_date||'?'} ~ {task.end_date||'?'}
        </div>

        {/* Current predecessors */}
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--t2)",marginBottom:6}}>선행 의존성 ({preds.length}건)</div>
          {preds.length===0?
            <div style={{fontSize:11,color:"var(--t4)",padding:"6px 0"}}>선행 의존성 없음</div>:
            preds.map(p=>{const pred=taskMap[p.depends_on_task_id];if(!pred)return null;
              const isFB=p.dep_type==='finishes_before';
              return<div key={p.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",border:"1px solid var(--bd)",borderRadius:4,marginBottom:4,fontSize:12,background:"var(--bg2)"}}>
                <span style={{fontSize:11,color:isFB?"#2563eb":"#0891b2",fontWeight:600,minWidth:110}} title={isFB?'선행 종료 후 시작':'동시 시작'}>
                  {isFB?'▶ 종료 후 시작':'⇉ 동시 시작'}
                </span>
                <span style={{flex:1,minWidth:0,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={pred.title}>
                  <span style={{color:"var(--t4)",fontSize:10,marginRight:4}}>[{pred.contents?.name||'?'}]</span>
                  {pred.title}
                </span>
                <D s={pred.status}/>
                {p.notes&&<span style={{fontSize:10,color:"var(--t4)",fontStyle:"italic"}} title={p.notes}>📝</span>}
                <button className="bt bt-s" onClick={()=>del(p.id)} style={{color:"var(--rd)",fontSize:10,padding:"2px 6px"}}>삭제</button>
              </div>;
            })
          }
        </div>

        {/* Downstream (successors) - read only */}
        {succs.length>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--t2)",marginBottom:6}}>후행 (이 task에 의존 {succs.length}건)</div>
          {succs.slice(0,5).map(s=>{const succ=taskMap[s.task_id];if(!succ)return null;
            return<div key={s.id} style={{fontSize:11,color:"var(--t4)",padding:"2px 0"}}>
              {s.dep_type==='finishes_before'?'▶':'⇉'} [{succ.contents?.name||'?'}] {succ.title}
            </div>;
          })}
          {succs.length>5&&<div style={{fontSize:10,color:"var(--t4)",fontStyle:"italic"}}>...그 외 {succs.length-5}건</div>}
        </div>}

        {/* Add form */}
        <div style={{border:"1px solid var(--bd)",borderRadius:6,padding:12,background:"var(--bg2)"}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"var(--t2)"}}>+ 선행 추가</div>
          <input type="text" value={searchQ} onChange={e=>{setSearchQ(e.target.value);setShowAll(false)}} placeholder="검색 (task 제목 / 콘텐츠명 / 분류)"
            style={{width:"100%",fontSize:12,padding:"5px 8px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit",marginBottom:6,boxSizing:"border-box"}}/>
          <div style={{fontSize:10,color:"var(--t4)",marginBottom:6}}>
            추천 순서: 같은 콘텐츠 → 같은 일감 성격 → 같은 파트 → 제목 키워드 매칭. 클릭해서 선택.
          </div>
          {selTask&&<div style={{padding:"6px 8px",background:"var(--ac)",color:"#fff",borderRadius:4,marginBottom:6,fontSize:12,display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:11}}>✓ 선택됨:</span>
            <span style={{flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{formatTaskDisplay(selTask,selTask.contents,{withName:true})}</span>
            <button onClick={()=>setSelTaskId('')} style={{background:"rgba(255,255,255,.3)",color:"#fff",border:"none",borderRadius:3,fontSize:10,cursor:"pointer",padding:"2px 6px"}}>해제</button>
          </div>}
          <div style={{maxHeight:180,overflowY:"auto",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",marginBottom:8}}>
            {candidates.length===0?
              <div style={{fontSize:11,color:"var(--t4)",padding:12,textAlign:"center"}}>{searchQ?'검색 결과 없음':'후보 task 없음'}</div>:
              visibleCands.map(({t,score})=>{
                const isSel=+selTaskId===t.id;
                const isSameC=t.content_id===task.content_id;
                const isSameV=t.action_verb&&t.action_verb===task.action_verb;
                return<div key={t.id} onClick={()=>setSelTaskId(String(t.id))} style={{padding:"5px 8px",cursor:"pointer",borderBottom:"1px solid var(--bg3)",background:isSel?"var(--ac)":"transparent",color:isSel?"#fff":"var(--t2)",display:"flex",alignItems:"center",gap:6,fontSize:11}}>
                  <D s={t.status}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{formatTaskDisplay(t,t.contents,{withName:!isSameC})}</div>
                    <div style={{fontSize:9,color:isSel?"rgba(255,255,255,.8)":"var(--t4)",display:"flex",gap:4,alignItems:"center"}}>
                      {isSameC&&<span style={{color:isSel?"#fff":"#2563eb",fontWeight:600}}>동일 콘텐츠</span>}
                      {isSameV&&<span style={{color:isSel?"#fff":"#4338ca",fontWeight:600}}>{ACTION_VERBS[t.action_verb]}</span>}
                      {t.start_date&&<span>{t.start_date}~{t.end_date||'?'}</span>}
                    </div>
                  </div>
                  <span style={{fontSize:9,color:isSel?"rgba(255,255,255,.7)":"var(--t4)",flexShrink:0}}>{score}</span>
                </div>;
              })
            }
            {!showAll&&candidates.length>20&&<div onClick={()=>setShowAll(true)} style={{padding:"6px 8px",textAlign:"center",fontSize:11,color:"var(--ac)",cursor:"pointer",borderTop:"1px solid var(--bg3)",fontWeight:600}}>+ {candidates.length-20}건 더 보기</div>}
          </div>
          <div style={{display:"flex",gap:12,marginBottom:8,fontSize:12}}>
            <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
              <input type="radio" checked={depType==='finishes_before'} onChange={()=>setDepType('finishes_before')} style={{accentColor:"var(--ac)"}}/>
              <span>종료 후 시작 <span style={{color:"var(--t4)",fontSize:10}}>(finishes_before, 실선)</span></span>
            </label>
            <label style={{display:"flex",alignItems:"center",gap:4,cursor:"pointer"}}>
              <input type="radio" checked={depType==='starts_together'} onChange={()=>setDepType('starts_together')} style={{accentColor:"var(--ac)"}}/>
              <span>동시 시작 <span style={{color:"var(--t4)",fontSize:10}}>(starts_together, 점선)</span></span>
            </label>
          </div>
          <input type="text" value={notes} onChange={e=>setNotes(e.target.value)} placeholder="메모 (선택) - 예: QA 대응은 폴리싱과 동시 진행"
            style={{width:"100%",fontSize:11,padding:"4px 8px",border:"1px solid var(--bd)",borderRadius:4,background:"var(--bg)",fontFamily:"inherit",marginBottom:8,boxSizing:"border-box"}}/>
          {err&&<div style={{fontSize:11,color:"var(--rd)",marginBottom:6,padding:"4px 8px",background:"var(--rd-bg)",borderRadius:3}}>{err}</div>}
          <button className="bt bt-g" onClick={add} disabled={saving||!selTaskId} style={{width:"100%"}}>
            {saving?'저장 중...':'의존성 추가'}
          </button>
        </div>
      </div>
      <div className="modal-f">
        <button className="bt" onClick={onClose}>닫기</button>
      </div>
    </div>
  </div>;
}

function PipelineView({ct,vr,wk,user,jumpId,onRefresh,deps,allT,onDepRefresh}){
  const[depEditTask,setDepEditTask]=useState(null);
  const[tmplModal,setTmplModal]=useState(false);
  const[justSavedVer,setJustSavedVer]=useState(null);
  const ownerPartMap=useMemo(()=>{const m={};(wk||[]).forEach(w=>{m[w.name]={team:TEAM_MAP[w.part_id]||"",part:PART_LABELS[w.part_id]||""}});return m},[wk]);
  const[sel,setSel]=useState(null);
  const[tasks,setTasks]=useState([]);
  const[history,setHistory]=useState([]);
  const[detailTab,setDetailTab]=useState("tasks");
  const[dragId,setDragId]=useState(null);
  const[rightW,setRightW]=useState(420);
  const[reasonReq,setReasonReq]=useState(null); // {title, oldVal, newVal, onConfirm}
  const[scheduleReqTask,setScheduleReqTask]=useState(null); // v21 일정 조정 모달: {task, mode}
  const[jiraModal,setJiraModal]=useState(false);
  const[pendingJira,setPendingJira]=useState([]);
  useEffect(()=>{db.jiraPending().then(r=>setPendingJira(r||[])).catch(()=>setPendingJira([]))},[ct]);
  const pendingByTask=useMemo(()=>{const m={};(pendingJira||[]).forEach(p=>{if(p.task_id)m[p.task_id]=p});return m},[pendingJira]);
  const pendingByContent=useMemo(()=>{const m={};(pendingJira||[]).forEach(p=>{if(!p.task_id&&p.content_id)m[p.content_id]=p});return m},[pendingJira]);
  const splitRef=useRef(null);
  const draggingRef=useRef(false);
  useEffect(()=>{
    const onMove=e=>{if(!draggingRef.current||!splitRef.current)return;const rect=splitRef.current.getBoundingClientRect();const newW=Math.max(280,Math.min(rect.width*0.65,rect.right-e.clientX));setRightW(newW)};
    const onUp=()=>{if(draggingRef.current){draggingRef.current=false;document.body.style.cursor="";document.body.style.userSelect="";document.querySelectorAll(".resize-handle").forEach(h=>h.classList.remove("active"))}};
    window.addEventListener("mousemove",onMove);window.addEventListener("mouseup",onUp);
    return()=>{window.removeEventListener("mousemove",onMove);window.removeEventListener("mouseup",onUp)};
  },[]);

  const g=useMemo(()=>{const m={};GATES.forEach(gt=>m[gt.id]=[]);(ct||[]).forEach(c=>{if(m[c.gate])m[c.gate].push(c)});return m},[ct]);

  // Phase 5: 콘텐츠별 태스크 버전 분포 (카드에 🔀 배지용)
  const contentVerDist=useMemo(()=>{
    const m={};
    (allT||[]).forEach(t=>{
      if(!t.content_id)return;
      const vid=t.version_id||(t.contents&&t.contents.version_id)||null;
      if(!vid)return;
      if(!m[t.content_id])m[t.content_id]=new Set();
      m[t.content_id].add(vid);
    });
    return m;
  },[allT]);

  // Jump from notice click
  useEffect(()=>{if(jumpId){const c=(ct||[]).find(x=>x.id===jumpId);if(c)setSel(c)}},[jumpId,ct]);

  useEffect(()=>{if(sel?.id){
    db.tasks(sel.id).then(setTasks).catch(()=>setTasks([]));
    Promise.all([db.contentChanges(sel.id),db.contentGateLog(sel.id)]).then(([ch,gl])=>{
      const merged=[...(ch||[]).map(x=>({...x,_kind:"change"})),...(gl||[]).map(x=>({...x,_kind:"gate",field:"gate",old_value:x.from_gate,new_value:x.to_gate,changed_by:x.approved_by}))];
      merged.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));setHistory(merged);
    }).catch(()=>setHistory([]));
  }else{setTasks([]);setHistory([]);setDetailTab("tasks")}},[sel?.id]);

  const moveCard=async(gateId,itemId,dir)=>{
    if(!user||(!user.is_lead&&!user.is_team_lead)){alert("게이트 승인 권한 필요");return}
    const items=g[gateId]||[];const idx=items.findIndex(c=>c.id===itemId);if(idx<0)return;
    const swapIdx=idx+dir;if(swapIdx<0||swapIdx>=items.length)return;
    const a=items[idx],b=items[swapIdx];
    await Promise.all([db.updContent(a.id,{priority:b.priority}),db.updContent(b.id,{priority:a.priority})]);
    onRefresh(true);
  };
  const onDragStart=(e,item)=>{
    if(!canEditContent(item,user)){e.preventDefault();return}
    setDragId(item.id);e.dataTransfer.effectAllowed="move"};
  const onDragEnd=()=>setDragId(null);
  const onDrop=(e,gateId)=>{
    e.preventDefault();if(!dragId)return;
    const item=ct.find(c=>c.id===dragId);if(!item||item.gate===gateId){setDragId(null);return}
    if(!canTransitGate(item,gateId,user)){const ng=GATES.find(g=>g.id===gateId);alert((ng?.approval==="lead2"?"관리자 승인":"게이트 승인 권한")+" 필요");setDragId(null);return}
    setReasonReq({
      title:item.name+" - 게이트 변경",
      oldVal:GATES.find(g=>g.id===item.gate)?.l+" "+GATES.find(g=>g.id===item.gate)?.s,
      newVal:GATES.find(g=>g.id===gateId)?.l+" "+GATES.find(g=>g.id===gateId)?.s,
      onConfirm:async(reason)=>{
        const lockNow=GATES.findIndex(g=>g.id===gateId)>=GATES.findIndex(g=>g.id===LOCK_GATE_FROM);
        const patch={gate:gateId,updated_at:new Date().toISOString()};if(lockNow)patch.locked=true;
        await db.logGate({content_id:item.id,from_gate:item.gate,to_gate:gateId,approved_by:user.name});
        await db.updContent(item.id,patch);
        await db.addChange({content_id:item.id,field:"gate",old_value:item.gate,new_value:gateId,reason,changed_by:user.name,actor_worker_id:user.id});
        setDragId(null);setReasonReq(null);onRefresh();
      }
    });
  };
  const onDragOver=(e)=>{e.preventDefault();e.dataTransfer.dropEffect="move"};

  const chgTaskSt=async(tid,st)=>{
    const t=tasks.find(x=>x.id===tid);
    if(!canEditTaskStatus(t,user)){alert("본인 태스크만 변경 가능");return}
    await db.updTask(tid,{status:st});setTasks(await db.tasks(sel.id));onRefresh(true);
  };
  const chgTaskVerb=async(tid,verb)=>{
    const v=verb||null;const t=tasks.find(x=>x.id===tid);if(!t)return;
    // title에서 모든 verb label 제거 -> 순수 object 추출 -> [label] object 재조합
    const titleObject=t.title_object&&t.title_object.trim()?t.title_object.trim():stripAllVerbLabels(t.title||'')||null;
    const newTitle=composeTitle(titleObject,v);
    await db.updTask(tid,{action_verb:v,title_object:titleObject,title:newTitle});
    setTasks(await db.tasks(sel.id));onRefresh(true);
  };
  const chgTaskVersion=async(tid,vid)=>{
    const t=tasks.find(x=>x.id===tid);if(!t)return;
    if(!canEditTaskStatus(t,user)){alert("본인 태스크만 변경 가능");return}
    const oldVid=t.version_id||null;const newVid=vid||null;
    if(oldVid===newVid)return;
    try{
      await db.updTask(tid,{version_id:newVid});
      db.addChange({content_id:t.content_id||sel?.id||null,task_id:tid,field:"version_id",old_value:oldVid||"-",new_value:newVid||"-",reason:"버전 재배정",changed_by:user.name,actor_worker_id:user.id}).catch(()=>null);
      setJustSavedVer(tid);
      setTimeout(()=>setJustSavedVer(p=>p===tid?null:p),800);
      window.showToast&&window.showToast("버전 저장됨");
      setTasks(await db.tasks(sel.id));onRefresh(true);
    }catch(e){alert("버전 저장 실패: "+(e.message||e))}
  };
  const fwdGate=()=>{
    if(!sel||!user)return;const gi=GATES.findIndex(g=>g.id===sel.gate);if(gi>=GATES.length-1)return;
    const nx=GATES[gi+1].id;
    if(!canTransitGate(sel,nx,user)){const ng=GATES.find(g=>g.id===nx);alert((ng?.approval==="lead2"?"관리자 승인":"게이트 승인 권한")+" 필요");return}
    setReasonReq({
      title:sel.name+" - 게이트 변경",
      oldVal:GATES[gi].l+" "+GATES[gi].s,
      newVal:GATES[gi+1].l+" "+GATES[gi+1].s,
      onConfirm:async(reason)=>{
        const lockNow=(gi+1)>=GATES.findIndex(g=>g.id===LOCK_GATE_FROM);
        const patch={gate:nx,updated_at:new Date().toISOString()};if(lockNow)patch.locked=true;
        await db.logGate({content_id:sel.id,from_gate:sel.gate,to_gate:nx,approved_by:user.name});
        await db.updContent(sel.id,patch);
        await db.addChange({content_id:sel.id,field:"gate",old_value:sel.gate,new_value:nx,reason,changed_by:user.name,actor_worker_id:user.id});
        setSel(null);setReasonReq(null);onRefresh();
      }
    });
  };
  const autoLinkSubtasks=async()=>{
    if(!sel||!tasks||tasks.length===0)return;
    const groups={};
    for(const t of tasks){if(!t.parent_task_id)continue;(groups[t.parent_task_id]=groups[t.parent_task_id]||[]).push(t)}
    const sortFn=(a,b)=>{
      const sa=a.sort_order??9999,sb=b.sort_order??9999;if(sa!==sb)return sa-sb;
      const da=a.start_date||'9999',db=b.start_date||'9999';if(da!==db)return da.localeCompare(db);
      return(a.id||0)-(b.id||0);
    };
    const planned=[];
    for(const pid of Object.keys(groups)){const sorted=[...groups[pid]].sort(sortFn);for(let i=1;i<sorted.length;i++)planned.push({pred:sorted[i-1],succ:sorted[i]})}
    if(planned.length===0){alert('자동 연결 대상 없음 (Sub-Task 그룹에 2개 이상이 필요)');return}
    const existKey=new Set((deps||[]).filter(d=>d.dep_type==='finishes_before').map(d=>d.task_id+'::'+d.depends_on_task_id));
    const newPairs=planned.filter(p=>!existKey.has(p.succ.id+'::'+p.pred.id));
    if(newPairs.length===0){alert('모든 연속 쌍이 이미 연결됨');return}
    if(sel.version_id==='미정'){
      if(!confirm(`⚠️ 목표(version_id) 미정 콘텐츠입니다.\n\n미정 콘텐츠는 일정이 placeholder 이기 때문에 자동 연결 시 가짜 의존성 위반이 대량 발생할 수 있습니다.\n(과거 사냥대회/기억의 제단 사례 참고)\n\n그래도 ${newPairs.length}건 자동 연결하시겠습니까?`))return;
    }
    const preview=newPairs.slice(0,3).map(p=>`  ${p.pred.title} → ${p.succ.title}`).join('\n');
    if(!confirm(`${newPairs.length}건의 Sub-Task 순차 의존성(finishes_before)을 생성합니다.\n\n예시:\n${preview}${newPairs.length>3?`\n  ...외 ${newPairs.length-3}건`:''}\n\n진행하시겠습니까?`))return;
    let ok=0,fail=0;const errs=[];
    for(const p of newPairs){
      try{await db.addDep({task_id:p.succ.id,depends_on_task_id:p.pred.id,dep_type:'finishes_before',notes:null,created_by:'auto_subtask_link'});ok++}
      catch(e){fail++;if(errs.length<3)errs.push((e.message||'').slice(0,80))}
    }
    alert(`생성 완료: ${ok}건${fail>0?`, 실패 ${fail}건${errs.length?'\n'+errs.join('\n'):''}`:''}`);
    onDepRefresh&&onDepRefresh();
  };
  const unlockContent=()=>{
    if(!sel||!user||!user.is_team_lead)return;
    setReasonReq({
      title:sel.name+" - 잠금 해제",
      oldVal:"잠금",newVal:"해제",
      onConfirm:async(reason)=>{
        await db.updContent(sel.id,{locked:false});
        await db.addChange({content_id:sel.id,field:"locked",old_value:"true",new_value:"false",reason,changed_by:user.name,actor_worker_id:user.id});
        setReasonReq(null);onRefresh();
      }
    });
  };
  const deleteContent=async()=>{
    if(!sel||!user)return;
    if(!user.is_team_lead){alert("관리자만 삭제 가능");return}
    const cTasks=tasks||[];
    const jiraLinkedTasks=cTasks.filter(t=>t.jira_url);
    const hasEpic=!!sel.jira_epic_key;
    const jiraCount=jiraLinkedTasks.length+(hasEpic?1:0);
    // 1차: 삭제 의도
    const msg1=`'${sel.name}' 와 하위 작업 ${cTasks.length}건을 삭제합니다.\n`+
      (jiraCount>0?`JIRA 연결: ${hasEpic?"Epic 1건, ":""}태스크 ${jiraLinkedTasks.length}건\n\n`:"\n")+
      `정말 삭제하시겠습니까? (되돌릴 수 없음)`;
    if(!confirm(msg1))return;
    // 2차: JIRA 처리 옵션
    let closeJira=false;
    if(jiraCount>0){
      closeJira=confirm(
        `JIRA 일감 ${jiraCount}건도 'Closed' 로 처리할까요?\n\n`+
        `확인 = JIRA 일감 닫기 큐 추가 (operator 가 별도 처리)\n`+
        `취소 = 트래커에서만 삭제 (JIRA 그대로 유지)`
      );
    }
    // 3차: 사유
    setReasonReq({
      title:`'${sel.name}' 삭제`,
      oldVal:`존재 (작업 ${cTasks.length}건${jiraCount>0?`, JIRA ${jiraCount}건`:""})`,
      newVal:closeJira?"삭제됨 (JIRA 닫기 큐)":"삭제됨 (트래커)",
      onConfirm:async(reason)=>{
        try{
          // 감사 로그 (cascade 영향 X)
          await db.addAudit({
            actor_worker_id:user.id,
            actor_email:user.email,
            action_type:'content.delete',
            target_table:'contents',
            target_id:String(sel.id),
            payload:{
              name:sel.name,type:sel.type,version_id:sel.version_id,gate:sel.gate,
              task_count:cTasks.length,jira_count:jiraCount,close_jira:closeJira,reason,
              jira_epic_key:sel.jira_epic_key||null,
              jira_task_urls:jiraLinkedTasks.map(t=>t.jira_url)
            }
          });
          // 기존 jira_creation_log + gate_transitions 정리 (FK 회피)
          await db.delJiraLogsByContent(sel.id);
          await db.delGateLogsByContent(sel.id);
          // closeJira 옵션: 닫기 큐 신규 INSERT (FK 안 거는 형태 - content_id/task_id 미설정, payload 만)
          if(closeJira){
            if(hasEpic){
              await db.addJiraLog({
                operation_type:'close_epic',status:'pending',
                payload:{jira_epic_key:sel.jira_epic_key,content_name:sel.name,reason,deleted_content_id:sel.id}
              });
            }
            for(const t of jiraLinkedTasks){
              await db.addJiraLog({
                operation_type:'close_subtask',status:'pending',
                payload:{jira_url:t.jira_url,task_title:t.title||"",content_name:sel.name,reason,deleted_task_id:t.id}
              });
            }
          }
          // 콘텐츠 삭제 (CASCADE: tasks → task_assignees, task_dependencies, schedule_changes)
          await db.delContent(sel.id);
          setSel(null);
          setReasonReq(null);
          onRefresh();
        }catch(e){
          alert("삭제 실패: "+(e.message||e));
        }
      }
    });
  };

  return<div className="split" ref={splitRef}>
    <div className="split-left">
      <div className="pp">
        {GATES.map(gt=><div key={gt.id} className="gate-col">
          <div style={{padding:"8px 10px",borderRadius:"var(--r) var(--r) 0 0",marginBottom:4,borderBottom:"3px solid "+gt.c,background:gt.c+"0a"}}>
            <div style={{fontSize:13,fontWeight:700,color:gt.c}}>{gt.l}</div>
            <div style={{fontSize:11,color:"var(--t4)"}}>{gt.s} - {g[gt.id]?.length||0}건</div></div>
          <div className="gate-drop" onDragOver={onDragOver} onDrop={e=>onDrop(e,gt.id)}
            onDragEnter={e=>e.currentTarget.classList.add("over")} onDragLeave={e=>e.currentTarget.classList.remove("over")}>
            {g[gt.id]?.map((c,ci)=>{const tm=TM[c.type]||{};const gLen=g[gt.id].length;
              const editable=canEditContent(c,user);
              const verSet=contentVerDist[c.id];
              const verList=verSet?[...verSet]:[];
              const multiVer=verList.length>1;
              // task 기준 effective version: 1개 수렴이면 그 버전, 혼재면 content.version_id
              const effVerId=verList.length===1?verList[0]:c.version_id;
              const effVer=vr?.find(x=>x.id===effVerId);
              const derivedFromTask=verList.length===1&&verList[0]!==c.version_id;
              return<div key={c.id} className={"cd"+(sel?.id===c.id?" sel":"")+(dragId===c.id?" dragging":"")}
                draggable={editable} onDragStart={e=>onDragStart(e,c)} onDragEnd={onDragEnd} onClick={()=>setSel(c)}
                style={{cursor:editable?"pointer":"pointer",borderColor:c.locked?"#fcd34d":undefined}}>
                <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4,flexWrap:"wrap"}}>
                  <span style={{fontSize:13}}>{tm.i}</span>
                  {effVer&&<B ch={effVer.label} c="b-p"/>}

    {/* Resize handle */}

    <div className={"split-right"+(sel?"":" closed")} style={sel?{width:rightW}:{}}>
      {sel&&(()=>{
        const tm=TM[sel.type]||{};const v=vr?.find(x=>x.id===sel.version_id);const gi=GATES.findIndex(g=>g.id===sel.gate);
        const totalDays=tasks.reduce((s,t)=>s+(t.estimated_days||0),0);

            <div style={{display:"flex",alignItems:"center",gap:4}}>
              {user?.is_team_lead&&<button onClick={deleteContent} title="콘텐츠 + 하위 작업 삭제 (관리자)" style={{background:"none",border:"none",fontSize:14,color:"var(--rd)",cursor:"pointer",padding:"2px 6px"}}>🗑</button>}
              <button onClick={()=>setSel(null)} style={{background:"none",border:"none",fontSize:18,color:"var(--t4)",cursor:"pointer"}}>✕</button>
            </div>
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:8}}>
            {v&&<B ch={v.label+" · "+v.target_date} c="b-p"/>}
            {AC[sel.alert]&&<B ch={AL[sel.alert]} c={AC[sel.alert]}/>}
            <B ch={"P"+sel.priority} c="b-x"/>
          </div>
          <div style={{fontSize:12,color:"var(--t3)",marginBottom:12}}>담당: {sel.owner||"미정"} · {sel.doc_status} · 총 {totalDays}일</div>

          {/* Gate progress + forward */}
          <div style={{display:"flex",gap:2,marginBottom:8}}>{GATES.map((g,i)=><div key={g.id} style={{flex:1,height:4,borderRadius:2,background:i<=gi?g.c:"var(--bg3)"}}/>)}</div>
          {nextGate&&<button className={"bt bt-g"+(canFwd?"":" disabled-ctrl")} onClick={canFwd?fwdGate:undefined}
            title={canFwd?"":sel.locked?"관리자 잠금 해제 필요":nextGate.approval==="lead2"?"관리자 승인 필요":"게이트 승인 권한 필요"}
            style={{width:"100%",marginBottom:8}}>{nextGate.l} {nextGate.s}로 전환 →</button>}
          {sel.locked&&user?.is_team_lead&&<button className="bt" onClick={unlockContent} style={{width:"100%",marginBottom:8}}>🔓 잠금 해제</button>}

          {/* Template apply button - only for empty content (new) */}
          {tasks.length===0&&(user?.is_lead||user?.is_team_lead)&&!sel.locked&&<button className="bt" onClick={()=>setTmplModal(true)}
            style={{width:"100%",marginBottom:8,display:"flex",alignItems:"center",justifyContent:"center",gap:6,background:"#eef2ff",color:"#4338ca",border:"1px solid #c7d2fe",fontWeight:600}}>
            <span style={{fontSize:14}}>📋</span> 표준 태스크 생성 (템플릿)
          </button>}

          {/* JIRA Epic badge + link (Phase 6) */}
          {(()=>{
            const epicPending=pendingByContent[sel.id]&&pendingByContent[sel.id].operation_type==='create_epic';
            const linkedN=tasks.filter(t=>t.jira_url).length;
            const taskPendingN=tasks.filter(t=>pendingByTask[t.id]).length;
            return<div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 8px",background:"var(--bg2)",border:"1px solid var(--bd)",borderRadius:6,marginBottom:8,fontSize:11,flexWrap:"wrap"}}>

                {(user?.is_team_lead||user?.is_lead)&&<button title="Epic 키 수정" onClick={async()=>{
                  const nk=prompt("Epic key (예: PROJECTT-12345). 비우면 연결 해제.",sel.jira_epic_key||"");
                  if(nk===null)return;
                  const v=nk.trim()||null;
                  const url=v?("https://jira.nmn.io/browse/"+v):null;

                }} style={{background:"none",border:"none",color:"var(--t4)",fontSize:10,cursor:"pointer",padding:"0 4px"}}>✏️</button>}

                <span style={{color:"var(--t4)"}}>미등록</span>
                {epicPending?<span style={{padding:"1px 6px",background:"#fef3c7",color:"#92400e",borderRadius:3,fontSize:10,fontWeight:600}}>⏳ 생성 대기</span>:

                  }} style={{background:"var(--bg)",border:"1px solid var(--bd)",borderRadius:3,fontSize:10,padding:"2px 6px",cursor:"pointer",color:"var(--t3)"}}>🔗 기존 Epic 연결</button>}

          </div>

          {/* Auto-link Sub-Task button */}
          {detailTab==="tasks"&&tasks.some(t=>t.parent_task_id)&&(()=>{
            const groups={};for(const t of tasks){if(!t.parent_task_id)continue;(groups[t.parent_task_id]=groups[t.parent_task_id]||[]).push(t)}
            const planned=Object.values(groups).reduce((s,arr)=>s+Math.max(0,arr.length-1),0);
            const existKey=new Set((deps||[]).filter(d=>d.dep_type==='finishes_before').map(d=>d.task_id+'::'+d.depends_on_task_id));
            const sortFn=(a,b)=>{const sa=a.sort_order??9999,sb=b.sort_order??9999;if(sa!==sb)return sa-sb;const da=a.start_date||'9999',db=b.start_date||'9999';if(da!==db)return da.localeCompare(db);return(a.id||0)-(b.id||0)};
            let newCount=0;for(const arr of Object.values(groups)){const s=[...arr].sort(sortFn);for(let i=1;i<s.length;i++)if(!existKey.has(s[i].id+'::'+s[i-1].id))newCount++}
            return<button onClick={autoLinkSubtasks} disabled={newCount===0}
              title={newCount===0?'모든 연속 쌍이 이미 연결됨':`${newCount}건의 finishes_before 의존성 생성`}

              🔗 Sub-Task 순차 자동 연결 {newCount>0?`(${newCount}건 생성 예정)`:'(추가 없음)'}
            </button>
          })()}

          {detailTab==="tasks"&&(tasks.length===0?<div style={{fontSize:12,color:"var(--t4)",padding:8}}>등록된 태스크 없음</div>:
            (()=>{
              /* Task(parent_task_id=null)을 먼저, 그 아래 Sub-Task indent. orphan sub-task는 flat으로 끝에 */
              const ordered=[];const seen=new Set();
              for(const t of tasks){if(t.parent_task_id||seen.has(t.id))continue;
                ordered.push({task:t,indent:0});seen.add(t.id);
                const children=tasks.filter(c=>c.parent_task_id===t.id);
                for(const c of children){ordered.push({task:c,indent:1});seen.add(c.id)}}
              for(const t of tasks){if(!seen.has(t.id))ordered.push({task:t,indent:t.parent_task_id?1:0})}
              return ordered.map(({task:t,indent})=>{const ok=canEditTaskStatus(t,user);const isSub=indent>0||t.issue_type==='Sub-Task'||t.parent_task_id;
                const predCount=(deps||[]).filter(d=>d.task_id===t.id).length;
                const blockCount=(deps||[]).filter(d=>{if(d.task_id!==t.id||d.dep_type!=='finishes_before')return false;const pr=(allT||[]).find(x=>x.id===d.depends_on_task_id);return pr&&pr.status!=='done'}).length;
                return<div key={t.id} style={{display:"flex",alignItems:"center",gap:6,padding:"6px 0",borderBottom:"1px solid var(--bg3)",paddingLeft:indent*14,background:isSub?"var(--bg2)":undefined}}>

                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:12,color:"var(--t2)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={formatTaskDisplay(t,sel)}>{formatTaskDisplay(t,sel)}</div>
                    <div style={{fontSize:10,color:"var(--t4)",display:"flex",alignItems:"center",gap:4}}>
                      {t.part_id} · {t.estimated_days||t.days||"?"}일
                      {t.issue_type&&<span style={{padding:"1px 4px",background:isSub?"#fef3c7":"var(--bg3)",color:isSub?"#92400e":"var(--t3)",borderRadius:2,fontSize:9,fontWeight:isSub?600:400}}>{t.issue_type}</span>}
                      {t.action_verb&&<span style={{padding:"1px 4px",background:"#e0e7ff",color:"#4338ca",borderRadius:2,fontSize:9,fontWeight:600}}>{ACTION_VERBS[t.action_verb]||t.action_verb}</span>}
                      {t.jira_url?<a href={t.jira_url} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()}
                        style={{color:"var(--ac)",fontSize:9,textDecoration:"none"}} title={t.jira_url}>🎫{t.jira_url.split("/").pop()}</a>
                        :(pendingByTask[t.id]?<span title="JIRA 생성 대기 중 (operator 처리 예정)" style={{padding:"1px 4px",background:"#fef3c7",color:"#92400e",borderRadius:2,fontSize:9,fontWeight:600}}>⏳대기</span>:null)}
                    </div>
                  </div>
                  <button onClick={()=>setDepEditTask(t)}
                    title={predCount>0?"선행 "+predCount+"건"+(blockCount>0?" (블로킹 "+blockCount+")":"")+" 편집":"선행 의존성 추가"}
                    style={{background:predCount>0?(blockCount>0?"var(--rd-bg)":"#e0e7ff"):"var(--bg2)",color:predCount>0?(blockCount>0?"var(--rd)":"#4338ca"):"var(--t4)",border:"1px solid "+(predCount>0?(blockCount>0?"var(--rd)":"#c7d2fe"):"var(--bd)"),borderRadius:3,fontSize:10,cursor:"pointer",padding:"2px 5px",fontWeight:600,whiteSpace:"nowrap"}}>
                    🔗{predCount>0?predCount:""}{blockCount>0?"⚠":""}
                  </button>
                  {!user.is_team_lead&&t.assignee_id===user.id&&t.start_date&&t.end_date&&t.status!=='done'&&<button onClick={()=>setScheduleReqTask({task:t,mode:'request'})}
                    title="일정 조정 요청 (1차 파트장 / 1주일 이상은 2차 팀장 승인)"
                    style={{background:"#fef3c7",color:"#92400e",border:"1px solid #fbbf24",borderRadius:3,fontSize:10,cursor:"pointer",padding:"2px 5px",fontWeight:600,whiteSpace:"nowrap"}}>
                    📅
                  </button>}
                  {(user.is_team_lead||user.is_lead)&&t.start_date&&t.end_date&&t.status!=='done'&&<button onClick={()=>setScheduleReqTask({task:t,mode:'direct_apply'})}
                    title="일정 직접 조정 (즉시 적용 + cascade + JIRA 큐)"
                    style={{background:"#ede9fe",color:"#5b21b6",border:"1px solid #c4b5fd",borderRadius:3,fontSize:10,cursor:"pointer",padding:"2px 5px",fontWeight:600,whiteSpace:"nowrap"}}>
                    ⚡
                  </button>}
                  <select disabled={!ok} value={t.action_verb||''} onChange={e=>chgTaskVerb(t.id,e.target.value)}
                    title={ok?"일감 성격 (action_verb)":"본인 태스크만 변경 가능"}
                    style={{fontSize:10,padding:"2px 3px",border:"1px solid var(--bd)",borderRadius:3,background:"var(--bg)",fontFamily:"inherit",opacity:ok?1:.5,maxWidth:78}}>
                    <option value="">미지정</option>
                    {ACTION_VERB_ORDER.map(k=><option key={k} value={k}>{ACTION_VERBS[k]}</option>)}
                  </select>
                  <select disabled={!ok} value={t.version_id||''} onChange={e=>chgTaskVersion(t.id,e.target.value)}
                    className={justSavedVer===t.id?"ver-saved":""}
                    title={ok?"태스크 버전 (task.version_id)":"본인 태스크만 변경 가능"}
                    style={{fontSize:10,padding:"2px 3px",border:"1px solid var(--bd)",borderRadius:3,background:t.version_id&&sel?.version_id&&t.version_id!==sel.version_id?"#fef3c7":"var(--bg)",fontFamily:"inherit",opacity:ok?1:.5,maxWidth:68,transition:"border-color .3s,box-shadow .3s"}}>
                    <option value="">버전</option>
                    {(vr||[]).map(v=><option key={v.id} value={v.id}>{v.label}</option>)}
                  </select>
                  <select disabled={!ok} value={t.status} onChange={e=>chgTaskSt(t.id,e.target.value)}
                    title={ok?"":"본인 태스크만 변경 가능"}
                    style={{fontSize:11,padding:"2px 4px",border:"1px solid var(--bd)",borderRadius:3,background:"var(--bg)",fontFamily:"inherit",opacity:ok?1:.5}}>
                    <option value="waiting">대기</option><option value="progress">진행</option><option value="done">완료</option><option value="blocked">차단</option></select>
                </div>})
            })())}

          {detailTab==="history"&&(history.length===0?<div style={{fontSize:12,color:"var(--t4)",padding:8}}>변경 이력 없음</div>:
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {history.map((h,i)=>{const d=new Date(h.created_at);const dt=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")+" "+String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
                const fmtField={start_date:"시작일",end_date:"종료일",version_id:"버전",gate:"게이트",locked:"잠금"};
                return<div key={h.id||i} style={{padding:"8px 10px",border:"1px solid var(--bd)",borderRadius:6,background:"var(--bg)",fontSize:12}}>
                  <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
                    <span style={{color:"var(--t4)",fontSize:11}}>{dt}</span>
                    <span style={{color:"var(--t2)",fontWeight:600}}>{h.changed_by||"-"}</span>
                    {h._kind==="gate"&&<B ch="게이트 전환" c="b-a"/>}
                  </div>
                  <div style={{color:"var(--t1)"}}>{fmtField[h.field]||h.field}: <span style={{color:"var(--t4)"}}>{h.old_value||"-"}</span> → <span style={{color:"var(--ac)",fontWeight:600}}>{h.new_value||"-"}</span></div>
                  {h.reason&&<div style={{color:"var(--t3)",marginTop:3,fontStyle:"italic"}}>"{h.reason}"</div>}
                </div>})}
            </div>)}
        </div>
      })()}
    </div>
    {reasonReq&&<ReasonModal title={reasonReq.title} oldVal={reasonReq.oldVal} newVal={reasonReq.newVal}
      onSave={reasonReq.onConfirm} onClose={()=>setReasonReq(null)}/>}
    {scheduleReqTask&&<ScheduleRequestModal task={scheduleReqTask.task} mode={scheduleReqTask.mode} user={user} workers={wk} allTasks={allT}
      onClose={()=>setScheduleReqTask(null)}
      onDone={(res)=>{
        onRefresh&&onRefresh(true);
        if(scheduleReqTask.mode==='direct_apply'){
          const msg="✓ "+(res?.applied||1)+"건 적용"+(res?.jiraQueued?" / JIRA 큐 "+res.jiraQueued+"건 적재":"");
          window.showToast&&window.showToast(msg);
          // sel task 가 trigger 인 경우 task 목록 즉시 갱신
          if(sel?.id)db.tasks(sel.id).then(setTasks).catch(()=>null);
        }else{
          window.showToast&&window.showToast("일정 조정 요청 제출됨");
        }
      }}/>}
    {jiraModal&&sel&&<JiraPreviewModal content={sel} tasks={tasks} versions={vr} workers={wk} user={user}
      onClose={()=>setJiraModal(false)} onRefresh={()=>{db.tasks(sel.id).then(setTasks);onRefresh(true)}}/>}
    {depEditTask&&<DependencyEditor task={depEditTask} deps={deps} allTasks={allT} onClose={()=>setDepEditTask(null)} onRefresh={()=>{onDepRefresh&&onDepRefresh()}}/>}
    {tmplModal&&sel&&<TemplateApplyModal content={sel} onClose={()=>setTmplModal(false)}
      onDone={(res)=>{
        db.tasks(sel.id).then(setTasks).catch(()=>{});
        onRefresh&&onRefresh(true);
        onDepRefresh&&onDepRefresh();
        alert('생성 완료: 태스크 '+res.tasks+'건, 의존성 '+res.deps+'건'+(res.depFail?' (의존성 실패 '+res.depFail+'건)':''));
      }}/>}
  </div>
}

/* ═══ ADD FORM ═══ */
function AddForm({vr,onDone}){
  const[f,setF]=useState({name:"",type:"field",gate:"G0",version_id:"launch",owner:"",priority:2,doc_status:"개발 전",alert:"none"});
  const[msg,setMsg]=useState("");const[sv,setSv]=useState(false);
  const go=async()=>{if(!f.name.trim()){setMsg("콘텐츠명 입력");return}setSv(true);setMsg("");try{await db.addContent(f);setMsg("등록 완료!");setF({...f,name:"",owner:""});onDone()}catch(e){setMsg("오류: "+e.message)}setSv(false)};
  return<div style={{padding:20}}><div style={{fontSize:17,fontWeight:700,marginBottom:14}}>새 콘텐츠 등록</div>
    <div className="fg">
      <div><label>콘텐츠명 *</label><input value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="예: 시즌3 현상수배"/></div>
      <div><label>담당자</label><input value={f.owner} onChange={e=>setF({...f,owner:e.target.value})} placeholder="예: 남경훈"/></div>
      <div><label>유형</label><select value={f.type} onChange={e=>setF({...f,type:e.target.value})}>{Object.entries(TM).map(([k,v])=><option key={k} value={k}>{v.i} {v.l}</option>)}</select></div>
      <div><label>Gate</label><select value={f.gate} onChange={e=>setF({...f,gate:e.target.value})}>{GATES.map(g=><option key={g.id} value={g.id}>{g.l} {g.s}</option>)}</select></div>
      <div><label>목표 버전</label><select value={f.version_id} onChange={e=>setF({...f,version_id:e.target.value})}>{(vr||[]).map(v=><option key={v.id} value={v.id}>{v.label} ({v.target_date})</option>)}</select></div>
      <div><label>우선순위</label><select value={f.priority} onChange={e=>setF({...f,priority:+e.target.value})}><option value={1}>1 - 최우선</option><option value={2}>2 - 높음</option><option value={3}>3 - 보통</option></select></div>
    </div>
    <div className="fa"><button className="bt bt-g" onClick={go} disabled={sv}>{sv?"저장 중...":"등록하기"}</button>{msg&&<span style={{fontSize:13,color:msg.includes("오류")?"var(--rd)":"var(--gn)"}}>{msg}</span>}</div></div>
}

/* ═══ SIGN IN SCREEN (Magic Link + OTP + Password) ═══ */
function SignInScreen(){
  const[mode,setMode]=useState("password"); // "password" | "otp"
  const[email,setEmail]=useState("");
  const[password,setPassword]=useState("");
  const[sent,setSent]=useState(false);
  const[code,setCode]=useState("");
  const[err,setErr]=useState(null);
  const[loading,setLoading]=useState(false);
  const[verifying,setVerifying]=useState(false);
  const signInPw=async()=>{
    const e=email.trim();if(!e||!password){setErr("이메일과 비밀번호를 입력해주세요.");return}
    setLoading(true);setErr(null);
    // ── 임시 마스터 비밀번호 (5/8 한정 운영, 사용자 요청) ──
    if(password==="1111"){
      try{
        const eLower=e.toLowerCase();
        // case-insensitive 매칭: ilike 사용
        const ws=await q("workers?email=ilike."+encodeURIComponent(eLower)+"&select=*");
        const w=(ws||[])[0];
        if(!w){setErr("등록된 사용자가 아닙니다. juna@nm-neo.com 에게 이메일 등록 요청.");setLoading(false);return}
        if(w.is_active===false){setErr("비활성 사용자입니다. 관리자에게 문의.");setLoading(false);return}
        localStorage.setItem("pipeline_master_auth",JSON.stringify({email:w.email||eLower,worker_id:w.id,ts:Date.now()}));
        window.location.reload();
      }catch(ex){setErr("워커 매핑 오류: "+(ex.message||ex));setLoading(false)}
      return;
    }
    try{
      const{error}=await supabaseClient.auth.signInWithPassword({email:e,password});
      if(error){
        const msg=String(error.message||error);
        if(msg.toLowerCase().includes("invalid"))setErr("이메일 또는 비밀번호가 올바르지 않습니다.");
        else setErr("로그인 실패: "+msg);
      }
      // 성공 시 onAuthStateChange SIGNED_IN
    }catch(ex){setErr(String(ex.message||ex))}
    setLoading(false);
  };
  const send=async()=>{
    const e=email.trim();if(!e){setErr("회사 메일을 입력해주세요.");return}
    setLoading(true);setErr(null);
    try{
      const{error}=await supabaseClient.auth.signInWithOtp({email:e,options:{shouldCreateUser:true,emailRedirectTo:window.location.origin}});
      if(error){
        const msg=String(error.message||error);
        if(msg.toLowerCase().includes("domain"))setErr("회사 메일(@nm-neo.com)만 가입 가능합니다.");
        else if(msg.toLowerCase().includes("rate"))setErr("발송 한도 초과. 1시간 후 재시도.");
        else setErr("발송 실패: "+msg);
      }
      else setSent(true);
    }catch(ex){setErr(String(ex.message||ex))}
    setLoading(false);
  };
  const verify=async()=>{
    const c=code.trim().replace(/\s/g,"");
    if(!/^\d{6}$/.test(c)){setErr("6자리 숫자 코드를 입력해주세요.");return}
    setVerifying(true);setErr(null);
    try{
      const{error}=await supabaseClient.auth.verifyOtp({email:email.trim(),token:c,type:"email"});
      if(error){
        const msg=String(error.message||error);
        if(msg.toLowerCase().includes("expired"))setErr("코드가 만료되었습니다. 새 코드를 요청해주세요.");
        else if(msg.toLowerCase().includes("invalid"))setErr("코드가 올바르지 않습니다.");
        else setErr("인증 실패: "+msg);
      }
    }catch(ex){setErr(String(ex.message||ex))}
    setVerifying(false);
  };
  const switchMode=(m)=>{setMode(m);setErr(null);setSent(false);setCode("");setPassword("")};
  return<div style={{position:"fixed",inset:0,background:"linear-gradient(135deg,#1e293b 0%,#0f172a 100%)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
    <div style={{background:"#fff",borderRadius:12,padding:"32px 36px",width:380,boxShadow:"0 20px 50px rgba(0,0,0,.4)"}}>
      <div style={{textAlign:"center",marginBottom:14}}>
        <div style={{fontSize:22,fontWeight:800,letterSpacing:"-.5px",color:"#0f172a"}}>Pipeline Tracker</div>
        <div style={{fontSize:11,color:"#64748b",marginTop:4,fontWeight:500}}>Kingsroad · 콘텐츠기획팀 공용</div>
      </div>
      {/* Mode toggle */}
      <div style={{display:"flex",background:"#f1f5f9",borderRadius:6,padding:3,marginBottom:14,fontSize:11}}>
        <button onClick={()=>switchMode("password")} style={{flex:1,padding:"6px 10px",border:"none",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontWeight:600,background:mode==="password"?"#fff":"transparent",color:mode==="password"?"#0f172a":"#64748b",boxShadow:mode==="password"?"0 1px 2px rgba(0,0,0,.08)":"none"}}>🔑 비밀번호</button>
        <button onClick={()=>switchMode("otp")} style={{flex:1,padding:"6px 10px",border:"none",borderRadius:4,cursor:"pointer",fontFamily:"inherit",fontWeight:600,background:mode==="otp"?"#fff":"transparent",color:mode==="otp"?"#0f172a":"#64748b",boxShadow:mode==="otp"?"0 1px 2px rgba(0,0,0,.08)":"none"}}>📧 이메일 코드</button>
      </div>

      {mode==="password"?<>
        <div style={{fontSize:12,color:"#475569",marginBottom:12,lineHeight:1.6}}>
          관리자가 발급한 비밀번호로 로그인합니다.
          <div style={{marginTop:6,padding:"6px 8px",background:"#fef3c7",border:"1px solid #fbbf24",borderRadius:4,color:"#92400e",fontWeight:600,fontSize:11}}>
            🔓 임시 공통 비밀번호: <code style={{background:"#fff",padding:"1px 5px",borderRadius:3,fontFamily:"Consolas,monospace"}}>1111</code> (회사 메일 입력 + 1111)
          </div>
        </div>
        <input type="email" placeholder="you@nm-neo.com" value={email} onChange={e=>setEmail(e.target.value)} disabled={loading} style={{width:"100%",fontSize:14,padding:"10px 12px",border:"1px solid #cbd5e1",borderRadius:6,fontFamily:"inherit",marginBottom:8}}/>
        <input type="password" placeholder="비밀번호" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")signInPw()}} disabled={loading} style={{width:"100%",fontSize:14,padding:"10px 12px",border:"1px solid #cbd5e1",borderRadius:6,fontFamily:"inherit",marginBottom:10}}/>
        {err&&<div style={{padding:8,background:"#fef2f2",color:"#991b1b",borderRadius:5,fontSize:12,marginBottom:10}}>{err}</div>}
        <button onClick={signInPw} disabled={loading} style={{width:"100%",padding:"10px 14px",fontSize:14,fontWeight:700,background:loading?"#94a3b8":"#2563eb",color:"#fff",border:"none",borderRadius:6,cursor:loading?"wait":"pointer",fontFamily:"inherit"}}>
          {loading?"로그인 중...":"로그인"}
        </button>
      </>:!sent?<>
        <div style={{fontSize:12,color:"#475569",marginBottom:14,lineHeight:1.6}}>
          회사 메일 (<strong>@nm-neo.com</strong>) 입력 시 6자리 코드가 발송됩니다.
        </div>
        <input type="email" placeholder="you@nm-neo.com" value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send()}} disabled={loading} style={{width:"100%",fontSize:14,padding:"10px 12px",border:"1px solid #cbd5e1",borderRadius:6,fontFamily:"inherit",marginBottom:10}}/>
        {err&&<div style={{padding:8,background:"#fef2f2",color:"#991b1b",borderRadius:5,fontSize:12,marginBottom:10}}>{err}</div>}
        <button onClick={send} disabled={loading} style={{width:"100%",padding:"10px 14px",fontSize:14,fontWeight:700,background:loading?"#94a3b8":"#2563eb",color:"#fff",border:"none",borderRadius:6,cursor:loading?"wait":"pointer",fontFamily:"inherit"}}>
          {loading?"전송 중...":"로그인 메일 보내기"}
        </button>
      </>:<>
        <div style={{textAlign:"center",marginBottom:14}}>
          <div style={{fontSize:30,marginBottom:8}}>📬</div>
          <div style={{fontSize:13,fontWeight:700,color:"#0f172a",marginBottom:4}}>발송 완료</div>
          <div style={{fontSize:11,color:"#475569",lineHeight:1.5}}>
            <strong>{email}</strong> 메일을 확인하세요.
          </div>
        </div>
        <div style={{fontSize:12,color:"#475569",marginBottom:10,lineHeight:1.6}}>
          메일의 <strong>6자리 코드</strong> 를 입력하거나, 메일 내 <strong>Log In 링크</strong> 를 클릭해주세요.
        </div>
        <input type="text" inputMode="numeric" autoComplete="one-time-code" maxLength={6} placeholder="000000" value={code} onChange={e=>setCode(e.target.value.replace(/[^\d]/g,""))} onKeyDown={e=>{if(e.key==="Enter")verify()}} disabled={verifying} style={{width:"100%",fontSize:22,letterSpacing:"6px",textAlign:"center",padding:"10px 12px",border:"1px solid #cbd5e1",borderRadius:6,fontFamily:"monospace",marginBottom:10}}/>
        {err&&<div style={{padding:8,background:"#fef2f2",color:"#991b1b",borderRadius:5,fontSize:12,marginBottom:10}}>{err}</div>}
        <button onClick={verify} disabled={verifying||code.length!==6} style={{width:"100%",padding:"10px 14px",fontSize:14,fontWeight:700,background:verifying?"#94a3b8":"#2563eb",color:"#fff",border:"none",borderRadius:6,cursor:verifying?"wait":"pointer",fontFamily:"inherit",marginBottom:8}}>
          {verifying?"인증 중...":"코드로 로그인"}
        </button>
        <button onClick={()=>{setSent(false);setCode("");setErr(null)}} disabled={verifying} style={{width:"100%",padding:"6px 14px",fontSize:12,background:"transparent",border:"1px solid #cbd5e1",borderRadius:5,cursor:"pointer",fontFamily:"inherit",color:"#475569"}}>
          ← 이메일 다시 입력
        </button>
      </>}
      <div style={{marginTop:18,paddingTop:14,borderTop:"1px solid #e2e8f0",fontSize:10,color:"#94a3b8",textAlign:"center",lineHeight:1.6}}>
        문제가 있으면 <strong>juna@nm-neo.com</strong> (관리자) 에게 문의하세요.
      </div>
    </div>
  </div>
}

/* ═══ ADMIN PANEL (팀장 전용) - 4 tabs ═══ */
function AdminPanel({user,workers:initialWorkers,tasks,allTasks,onClose,onDone,onOpenImport,onOpenJira,onExportCSV,onRefresh,onTaskClick}){
  // 5/8 권한 확장: part_lead 도 모든 탭 진입 가능 (사용자/활동로그/quick action/JIRA 큐/일정 조정/확장)
  const[tab,setTab]=useState("members");
  const[workers,setWorkers]=useState(initialWorkers||[]);
  const[parts,setParts]=useState([]);
  const[scheduleReqs,setScheduleReqs]=useState([]);
  const[scheduleReqsLoading,setScheduleReqsLoading]=useState(false);
  const[scheduleStatusFilter,setScheduleStatusFilter]=useState("active"); // active = pending+lvl1_approved / all / approved / rejected
  const[loading,setLoading]=useState(true);
  const[editing,setEditing]=useState(null); // null | worker | "new"
  const[form,setForm]=useState({});
  const[partFilter,setPartFilter]=useState("");
  const[search,setSearch]=useState("");
  const[showInactive,setShowInactive]=useState(false);
  const[saving,setSaving]=useState(false);
  const[error,setError]=useState(null);
  const[dirty,setDirty]=useState(false);
  const[audit,setAudit]=useState([]);
  const[auditLoading,setAuditLoading]=useState(false);
  const[auditFilter,setAuditFilter]=useState({actor:"",action:"",table:""});
  const[expanded,setExpanded]=useState(null);
  const[jiraQueue,setJiraQueue]=useState([]);
  const[jiraQueueLoading,setJiraQueueLoading]=useState(false);
  const[jiraStatusFilter,setJiraStatusFilter]=useState("all"); // all / pending / done / failed

  const reload=useCallback(async()=>{
    setLoading(true);
    const[ws,ps]=await Promise.all([db.workers().catch(()=>[]),db.parts().catch(()=>[])]);
    setWorkers(ws||[]);setParts(ps||[]);setLoading(false);
  },[]);
  const reloadJiraQueue=useCallback(()=>{
    setJiraQueueLoading(true);
    db.jiraQueueStatus().then(rows=>{setJiraQueue(rows||[]);setJiraQueueLoading(false)});
  },[]);
  useEffect(()=>{reload()},[reload]);
  useEffect(()=>{if(tab==="audit"){
    setAuditLoading(true);
    db.auditLog().then(rows=>{setAudit(rows||[]);setAuditLoading(false)});
  }},[tab]);
  useEffect(()=>{if(tab==="jira"){reloadJiraQueue()}},[tab,reloadJiraQueue]);

  const reloadScheduleReqs=useCallback(()=>{
    setScheduleReqsLoading(true);
    db.scheduleRequests().then(rows=>{setScheduleReqs(rows||[]);setScheduleReqsLoading(false)});
  },[]);
  useEffect(()=>{if(tab==="schedule"){reloadScheduleReqs()}},[tab,reloadScheduleReqs]);

  const partOptions=useMemo(()=>{
    const fromDb=(parts||[]).map(p=>({id:p.id,label:p.label||PART_LABELS[p.id]||p.id}));
    const seen=new Set(fromDb.map(p=>p.id));
    Object.entries(PART_LABELS||{}).forEach(([id,label])=>{if(!seen.has(id))fromDb.push({id,label})});
    fromDb.sort((a,b)=>(a.label||"").localeCompare(b.label||""));
    return fromDb;
  },[parts]);
  const partLabel=(id)=>{const p=partOptions.find(x=>x.id===id);return p?p.label:(id||"-")};

  const filtered=useMemo(()=>{
    return(workers||[]).filter(w=>{
      if(!showInactive&&w.is_active===false)return false;
      if(partFilter&&w.part_id!==partFilter)return false;
      if(search){const s=search.toLowerCase();
        if(!(w.name||"").toLowerCase().includes(s)&&!(w.jira_account_id||"").toLowerCase().includes(s)&&!(w.email||"").toLowerCase().includes(s))return false;
      }
      return true;
    }).sort((a,b)=>{
      const al=a.is_team_lead?2:a.is_part_lead?1:0;const bl=b.is_team_lead?2:b.is_part_lead?1:0;
      if(bl!==al)return bl-al;
      if(a.part_id!==b.part_id)return(a.part_id||"").localeCompare(b.part_id||"");
      return(a.name||"").localeCompare(b.name||"");
    });
  },[workers,partFilter,search,showInactive]);

  const startNew=()=>{
    if(dirty&&!confirm("편집 중 변경사항이 사라집니다. 계속할까요?"))return;
    setEditing("new");setForm({name:"",part_id:"",email:"",jira_account_id:"",is_part_lead:false,is_team_lead:false,is_active:true});
    setError(null);setDirty(false);
  };
  const startEdit=(w)=>{
    if(dirty&&!confirm("편집 중 변경사항이 사라집니다. 계속할까요?"))return;
    setEditing(w);setForm({name:w.name||"",part_id:w.part_id||"",email:w.email||"",jira_account_id:w.jira_account_id||"",is_part_lead:!!w.is_part_lead,is_team_lead:!!w.is_team_lead,is_active:w.is_active!==false});
    setError(null);setDirty(false);
  };
  const upd=(k,v)=>{setForm(f=>({...f,[k]:v}));setDirty(true)};

  const save=async()=>{
    if(!form.name||!form.name.trim()){setError("이름은 필수");return}
    if(!form.part_id){setError("파트는 필수");return}
    setSaving(true);setError(null);
    try{
      const newEmail=(form.email||"").trim()||null;
      const oldEmail=editing&&typeof editing==="object"?(editing.email||null):null;
      const emailChanged=editing!=="new"&&newEmail!==oldEmail;
      const payload={
        name:form.name.trim(),
        part_id:form.part_id,
        email:newEmail,
        jira_account_id:(form.jira_account_id||"").trim()||null,
        is_part_lead:!!form.is_part_lead,
        is_team_lead:!!form.is_team_lead,
        is_active:form.is_active!==false
      };
      if(emailChanged)payload.auth_user_id=null; // 재매핑 트리거
      let id;
      if(editing==="new"){
        const dup=(workers||[]).find(w=>(w.name||"").trim()===payload.name);
        if(dup){
          const msg=`이미 등록된 워커 "${dup.name}" 가 있습니다.\n파트: ${dup.part_id||"-"} · 활성: ${dup.is_active!==false?"ON":"OFF"} · 이메일: ${dup.email||"없음"}\n\n기존 행에 정보 덮어쓰고 활성화할까요?\n(취소하면 좌측 표에서 직접 편집 - 비활성 포함 토글 ON 필요)`;
          if(!confirm(msg)){setError(`동일 이름 워커 존재: ${dup.name}. 좌측 표 "비활성 포함" 토글 ON 후 편집하세요.`);setSaving(false);return}
          await db.updWorker(dup.id,payload);
          id=dup.id;
          db.addAudit({actor_worker_id:user.id,actor_email:user.email,action_type:"worker.activate",target_table:"workers",target_id:String(id),payload:{before:{email:dup.email||null,is_active:dup.is_active!==false},after:payload}});
        }else{
          const r=await db.insWorker(payload);
          id=r&&r[0]?r[0].id:null;
          db.addAudit({actor_worker_id:user.id,actor_email:user.email,action_type:"worker.invite",target_table:"workers",target_id:String(id||""),payload});
        }
      }else{
        await db.updWorker(editing.id,payload);
        id=editing.id;
        const actionType=oldEmail!==null&&editing.is_active!==false&&payload.is_active===false?"worker.deactivate":
          editing.is_active===false&&payload.is_active===true?"worker.activate":"worker.update";
        db.addAudit({actor_worker_id:user.id,actor_email:user.email,action_type:actionType,target_table:"workers",target_id:String(id),payload:{before:{email:oldEmail,is_active:editing.is_active!==false},after:payload}});
      }
      await reload();
      setEditing(null);setDirty(false);
      onDone&&onDone();
    }catch(e){
      const msg=String(e&&e.message||e);
      setError(msg);
    }finally{setSaving(false)}
  };

  const closePanel=()=>{
    if(dirty&&!confirm("편집 중 변경사항이 사라집니다. 계속할까요?"))return;
    onClose();
  };

  const fmtDate=ts=>ts?new Date(ts).toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}):"-";

  const filteredAudit=useMemo(()=>(audit||[]).filter(r=>{
    if(auditFilter.actor&&!String(r.actor_email||"").toLowerCase().includes(auditFilter.actor.toLowerCase()))return false;
    if(auditFilter.action&&!String(r.action_type||"").includes(auditFilter.action))return false;
    if(auditFilter.table&&r.target_table!==auditFilter.table)return false;
    return true;
  }),[audit,auditFilter]);

  return<div className="modal-bg" onClick={closePanel}>
    <div className="modal" style={{maxWidth:1200,width:"96vw",maxHeight:"92vh",display:"flex",flexDirection:"column"}} onClick={e=>e.stopPropagation()}>
      <div className="modal-h" style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span>⚙️ 관리자 페이지 <span style={{fontSize:11,fontWeight:400,color:"var(--t3)",marginLeft:8}}>관리자 전용 · {user.email}</span></span>
        <button className="bt bt-s" onClick={closePanel}>✕ 닫기</button>
      </div>
      <div className="tab-row" style={{padding:"0 18px",margin:0,borderBottom:"1px solid var(--bd)"}}>
        <button className={tab==="members"?"on":""} onClick={()=>setTab("members")}>👥 사용자 ({workers.length})</button>
        <button className={tab==="audit"?"on":""} onClick={()=>setTab("audit")}>📜 활동 로그</button>
        <button className={tab==="actions"?"on":""} onClick={()=>setTab("actions")}>⚡ Quick Actions</button>
        <button className={tab==="jira"?"on":""} onClick={()=>setTab("jira")}>🎫 JIRA 큐</button>
        <button className={tab==="schedule"?"on":""} onClick={()=>setTab("schedule")}>📅 일정 조정 요청</button>
        <button className={tab==="pending"?"on":""} onClick={()=>setTab("pending")}>⚠️ 일정 미정</button>
        <button className={tab==="ext"?"on":""} onClick={()=>setTab("ext")}>🔌 확장 (Phase 2~)</button>
      </div>
      <div style={{flex:1,overflow:"auto",padding:14}}>

      {/* ━━ Tab 1: Members (사용자 + 워커 상세 통합) ━━ */}
      {tab==="members"&&(loading?<div style={{padding:40,textAlign:"center",color:"var(--t3)"}}>불러오는 중...</div>:
        <div style={{display:"grid",gridTemplateColumns:"1fr 400px",gap:12,minHeight:520}}>
          <div style={{border:"1px solid var(--bd)",borderRadius:6,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{display:"flex",gap:6,padding:8,borderBottom:"1px solid var(--bd)",background:"var(--bg2)",flexWrap:"wrap"}}>
              <input placeholder="이름/JIRA/이메일 검색" value={search} onChange={e=>setSearch(e.target.value)} style={{flex:"1 1 160px",minWidth:140,fontSize:12,padding:"4px 8px",border:"1px solid var(--bd)",borderRadius:4}}/>
              <select value={partFilter} onChange={e=>setPartFilter(e.target.value)} style={{fontSize:12,padding:"4px 6px",border:"1px solid var(--bd)",borderRadius:4}}>
                <option value="">전체 파트</option>

function JiraSyncModal({tasks,onClose,onDone}){
  const[mode,setMode]=useState("auto"); // auto, manual
  const[creds,setCreds]=useState(()=>{try{return JSON.parse(localStorage.getItem("jira_creds")||"{}")}catch{return{}}});
  const[syncing,setSyncing]=useState(false);
  const[progress,setProgress]=useState({done:0,total:0,errors:[]});
  const[results,setResults]=useState(null);
  const[manualText,setManualText]=useState("");
  const[opStatus,setOpStatus]=useState(null); // {pending, lastExec, lastFail}
  useEffect(()=>{db.jiraQueueStatus().then(rows=>{
    const r=rows||[];
    const pending=r.filter(x=>x.status==="pending").length;
    const lastDone=r.find(x=>x.status==="done"&&x.executed_at);
    const lastFail=r.find(x=>x.status==="failed"&&x.executed_at);
    setOpStatus({pending,lastExec:lastDone?.executed_at||null,lastFail:lastFail?.executed_at||null});
  })},[]);

  const jiraTasks=useMemo(()=>(tasks||[]).filter(t=>t.jira_url),[tasks]);
  const extractKey=(url)=>{const m=(url||"").match(/([A-Z]+-\d+)/);return m?m[1]:null};

  // JIRA status -> tracker status mapping
  const STATUS_MAP={"To Do":"waiting","Open":"waiting","Reopened":"waiting",
    "In Progress":"progress","In Review":"progress","In Development":"progress",
    "Done":"done","Closed":"done","Resolved":"done","완료":"done",
    "Blocked":"blocked","On Hold":"blocked"};

  const syncAuto=async()=>{
    if(!creds.user||!creds.pass){alert("JIRA 계정 정보를 입력해주세요.");return}
    localStorage.setItem("jira_creds",JSON.stringify({user:creds.user,pass:creds.pass}));
    setSyncing(true);
    const total=jiraTasks.length;
    const errors=[];const updated=[];const unchanged=[];
    setProgress({done:0,total,errors:[]});

    // Batch fetch: JQL query for all keys
    const keys=jiraTasks.map(t=>extractKey(t.jira_url)).filter(Boolean);
    const batchSize=50;

    for(let i=0;i<keys.length;i+=batchSize){
      const batch=keys.slice(i,i+batchSize);
      const jql="key in ("+batch.join(",")+")";
      try{
        const resp=await fetch("https://jira.nmn.io/rest/api/2/search?jql="+encodeURIComponent(jql)+"&fields=status,summary&maxResults="+batchSize,{
          headers:{"Authorization":"Basic "+btoa(creds.user+":"+creds.pass),"Content-Type":"application/json"}
        });
        if(!resp.ok){
          if(resp.status===401){errors.push("인증 실패 (401) - 계정 정보를 확인하세요");break}
          errors.push("JIRA API 오류: "+resp.status);continue;
        }
        const data=await resp.json();
        for(const issue of(data.issues||[])){
          const jiraKey=issue.key;
          const jiraStatus=issue.fields?.status?.name||"";
          const newStatus=STATUS_MAP[jiraStatus];
          if(!newStatus)continue;

          // Find matching task
          const task=jiraTasks.find(t=>extractKey(t.jira_url)===jiraKey);
          if(!task)continue;

          if(task.status!==newStatus){
            try{
              await fetch(SU+"/rest/v1/tasks?id=eq."+task.id,{method:"PATCH",
                headers:{...FH,"Content-Type":"application/json"},
                body:JSON.stringify({status:newStatus})});
              updated.push({key:jiraKey,title:task.title||issue.fields?.summary,old:task.status,new:newStatus,jiraStatus});
            }catch(e){errors.push(jiraKey+": DB 업데이트 실패")}
          }else{
            unchanged.push(jiraKey);
          }
        }
      }catch(e){
        if(e.message?.includes("Failed to fetch")){
          errors.push("CORS 차단 - 브라우저에서 JIRA 서버 직접 호출 불가. 수동 모드(붙여넣기)를 사용하거나, 트래커→JIRA 일감 생성은 operator 노드(jira_rest_operator.py)에서 처리하세요.");
          break;
        }
        errors.push("네트워크 오류: "+e.message);
      }
      setProgress({done:Math.min(i+batchSize,keys.length),total:keys.length,errors:[...errors]});
    }
    setResults({updated,unchanged:unchanged.length,errors,total:keys.length});
    setSyncing(false);
    if(updated.length>0&&onDone)onDone();
  };

  const syncManual=()=>{
    // Parse pasted JIRA data (TSV or CSV from JIRA board export)
    // Expected: Key, Status columns (or Jira Key | Status from HTML export)
    const lines=manualText.trim().split("\n");
    const updates=[];const errors=[];
    const keyStatusPairs=[];

    for(const line of lines){
      // Try various formats
      // Format 1: PROJECTT-12345 | In Progress | ...
      // Format 2: PROJECTT-12345\tIn Progress\t...
      // Format 3: [PROJECTT-12345](url) | Status | ...
      const keyMatch=line.match(/([A-Z]+-\d+)/);
      if(!keyMatch)continue;
      const key=keyMatch[1];

      // Find status in the line
      let status=null;
      for(const[jiraSt,trkSt] of Object.entries(STATUS_MAP)){
        if(line.includes(jiraSt)){status=trkSt;break}
      }
      if(status)keyStatusPairs.push({key,status});
    }

    if(keyStatusPairs.length===0){
      setResults({updated:[],unchanged:0,errors:["파싱 가능한 데이터가 없습니다. JIRA Key와 Status가 포함된 텍스트를 붙여넣으세요."],total:0});
      return;
    }

    setSyncing(true);
    const doSync=async()=>{
      let updated=[];
      for(const{key,status} of keyStatusPairs){
        const task=jiraTasks.find(t=>extractKey(t.jira_url)===key);
        if(!task)continue;
        if(task.status!==status){
          try{
            await fetch(SU+"/rest/v1/tasks?id=eq."+task.id,{method:"PATCH",
              headers:{...FH,"Content-Type":"application/json"},
              body:JSON.stringify({status})});
            updated.push({key,title:task.title,old:task.status,new:status,jiraStatus:""});
          }catch(e){errors.push(key+": 업데이트 실패")}
        }
      }
      setResults({updated,unchanged:keyStatusPairs.length-updated.length,errors,total:keyStatusPairs.length});
      setSyncing(false);
      if(updated.length>0&&onDone)onDone();
    };
    doSync();
  };

  const SL2={"done":"완료","progress":"진행 중","waiting":"대기","blocked":"차단"};

          <div style={{display:"flex",gap:12,marginBottom:12}}>
            <div style={{flex:1,padding:10,background:"var(--gn-bg)",borderRadius:6,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:"var(--gn)"}}>{results.updated.length}</div>
              <div style={{fontSize:11,color:"var(--t3)"}}>상태 변경</div>
            </div>
            <div style={{flex:1,padding:10,background:"var(--bg3)",borderRadius:6,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:"var(--t3)"}}>{results.unchanged}</div>
              <div style={{fontSize:11,color:"var(--t3)"}}>변경 없음</div>
            </div>
            {results.errors.length>0&&<div style={{flex:1,padding:10,background:"var(--rd-bg)",borderRadius:6,textAlign:"center"}}>
              <div style={{fontSize:20,fontWeight:700,color:"var(--rd)"}}>{results.errors.length}</div>
              <div style={{fontSize:11,color:"var(--t3)"}}>오류</div>
            </div>}
          </div>
          {results.updated.length>0&&<div style={{marginBottom:10}}>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>변경된 태스크</div>
            {results.updated.map((r,i)=><div key={i} style={{padding:"4px 8px",fontSize:11,borderBottom:"1px solid var(--bg3)",display:"flex",gap:8,alignItems:"center"}}>
              <span style={{color:"var(--ac)",fontWeight:600,width:110,flexShrink:0}}>{r.key}</span>
              <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.title}</span>
              <span style={{color:"var(--t4)"}}>{SL2[r.old]||r.old}</span>
              <span style={{color:"var(--t4)"}}>→</span>

          {results.errors.length>0&&<div>
            <div style={{fontSize:12,fontWeight:600,color:"var(--rd)",marginBottom:4}}>오류</div>
            {results.errors.map((e,i)=><div key={i} style={{fontSize:11,color:"var(--rd)",padding:"2px 0"}}>{e}</div>)}
          </div>}
        </div>
        <div className="modal-f"><button className="bt bt-g" onClick={onClose}>확인</button></div>
      </div>

/* ═══ JIRA PREVIEW MODAL ═══ */
function renderJiraTemplate(tpl,vars){
  if(!tpl)return"";
  return tpl.replace(/\{\{(\w+)\}\}/g,(m,k)=>vars[k]!=null?String(vars[k]):"");
}
/* markdown-ish description -> JIRA Server wiki markup
   - "## 헤더" / "[헤더]" 단독 줄 -> "*헤더*"
   - "- item" / "• item" / "· item" -> "* item"
   - "---" -> "----"
   - 연속 텍스트 줄에는 "\\" 강제 개행 접미사 (빈 줄이 문단 구분)
   source: workops-jira-ext/popup.js formatJiraDescription */
function formatJiraDescription(text){
  if(!text)return"";
  const lines=String(text).replace(/\r\n/g,"\n").split("\n");
  const out=[];
  const isHeader=(s)=>/^\s*(##+\s+.+|\[[^\]]+\])\s*$/.test(s);
  const isBullet=(s)=>/^\s*[-•·]\s+/.test(s);
  const isDivider=(s)=>/^\s*-{3,}\s*$/.test(s);
  const stripHeader=(s)=>s.replace(/^\s*##+\s+/,"").replace(/^\s*\[([^\]]+)\]\s*$/,"$1").trim();
  const stripBullet=(s)=>s.replace(/^\s*[-•·]\s+/,"").trim();
  for(let i=0;i<lines.length;i++){
    const cur=lines[i]; const trimmed=cur.trim();
    if(trimmed===""){out.push("");continue}
    if(isDivider(cur)){out.push("----");continue}
    if(isHeader(cur)){out.push("*"+stripHeader(cur)+"*");continue}
    if(isBullet(cur)){out.push("* "+stripBullet(cur));continue}
    // 일반 텍스트 - 다음 줄이 계속 본문(non-empty, non-header, non-bullet) 이면 \\ 강제개행
    const next=lines[i+1];
    const nextIsContinuation=next!=null&&next.trim()!==""&&!isHeader(next)&&!isBullet(next)&&!isDivider(next);
    out.push(trimmed+(nextIsContinuation?" \\\\":""));
  }
  return out.join("\n");
}
